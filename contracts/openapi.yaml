openapi: 3.1.0
info:
  title: MVP Kho Bac - Payment Order API (VDBAS Lenh Thanh Toan)
  description: |
    OpenAPI 3.1 contract for FT-001 covering CRUD operations, Maker-Checker-Approver
    workflow, attachment management, role management, and reporting for Payment Orders
    (Lenh Thanh Toan) in the KBNN system.

    ## Key Design Decisions
    - Optimistic locking via `If-Match` header (F-VER field)
    - Soft delete with audit trail
    - Separation of Duties (SoD) enforcement
    - Pagination via cursor-based approach with page/size params
    - Error codes follow MSG-ERR-* convention from spec
    - State machine: Draft -> Ready_For_Approval -> Pending_Approver -> Approved -> Posted
  version: 1.0.0
  contact:
    name: SA Agent - MVP Kho Bac
  license:
    name: Internal Use Only

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.khobac.local
    description: Staging

tags:
  - name: Payment Orders
    description: CRUD and workflow operations for payment orders (Lenh Thanh Toan)
  - name: Payment Order Approval
    description: Maker-Checker-approver approval workflow
  - name: Payment Order Attachments
    description: Attachment management for payment orders
  - name: Roles
    description: Role management with approval workflow
  - name: Reports
    description: Report query and export operations

# ============================================================
# PATHS
# ============================================================
paths:
  # ----------------------------------------------------------
  # Payment Order CRUD
  # ----------------------------------------------------------
  /api/v1/payment-orders:
    get:
      tags: [Payment Orders]
      operationId: listPaymentOrders
      summary: List payment orders with pagination, filtering, and sorting
      description: |
        Retrieve a paginated list of payment orders. Supports multi-criteria filtering,
        sorting, and pagination. Results respect role-based access (VAL-13, VAL-14).
      parameters:
        # --- Pagination ---
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: "Page number (0-indexed)"
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
          description: "Page size. Allowed values: 20, 50, 100, 200"
        # --- Filter: Channel ---
        - name: channel
          in: query
          required: false
          schema:
            type: string
            enum: [LIEN_NGAN_HANG, THANH_TOAN_SONG_PHUONG]
          description: "Kenh (Channel): Lien ngan hang / Thanh toan song phuong"
        # --- Filter: Transaction Type ---
        - name: transactionType
          in: query
          required: false
          schema:
            type: string
          description: "Loai lenh - cascading by channel"
        # --- Filter: LNH Transaction Type ---
        - name: lnhTransactionType
          in: query
          required: false
          schema:
            type: string
            enum: [GT_CAO_CO, GT_CAO_NO, GT_THAP_CO, GT_THAP_NO]
          description: "Loai giao dich LNH - only applicable when channel=LIEN_NGAN_HANG"
        # --- Filter: REF_NO ---
        - name: refNo
          in: query
          required: false
          schema:
            type: string
            maxLength: 50
          description: "So YCTT / So but toan - exact or starts-with match"
        # --- Filter: Origin Number ---
        - name: originNum
          in: query
          required: false
          schema:
            type: string
          description: "So chung tu goc"
        # --- Filter: Status (multi-select) ---
        - name: status
          in: query
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
              enum:
                - DRAFT
                - READY_FOR_APPROVAL
                - PENDING_APPROVER
                - APPROVED
                - RETURNED_TO_MAKER
                - REJECTED
                - DELETED
          description: "F-STATUS filter. DELETED records hidden unless explicitly included."
        # --- Filter: Sender / Receiver ---
        - name: sender
          in: query
          required: false
          schema:
            type: string
          description: "NH/KB chuyen (sender code)"
        - name: receiver
          in: query
          required: false
          schema:
            type: string
          description: "NH/KB nhan (receiver code)"
        - name: senderAccount
          in: query
          required: false
          schema:
            type: string
          description: "TK chuyen (sender natural account)"
        - name: receiverAccount
          in: query
          required: false
          schema:
            type: string
          description: "TK nhan (receiver natural account)"
        # --- Filter: Date Range ---
        - name: dateField
          in: query
          required: false
          schema:
            type: string
            enum: [CREATED_DATE, PAYMENT_DATE, CHECKED_DATE, APPROVED_DATE]
            default: CREATED_DATE
          description: "Which date field to filter on"
        - name: fromDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: "Tu ngay (YYYY-MM-DD). Required. Max range 90 days."
        - name: toDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: "Den ngay (YYYY-MM-DD). Must be >= fromDate."
        # --- Filter: Amount Range ---
        - name: amountFrom
          in: query
          required: false
          schema:
            type: number
            format: double
            minimum: 0
          description: "So tien tu"
        - name: amountTo
          in: query
          required: false
          schema:
            type: number
            format: double
            minimum: 0
          description: "So tien den (must be >= amountFrom)"
        # --- Filter: Currency ---
        - name: currencyCode
          in: query
          required: false
          schema:
            type: string
          description: "Loai tien (currency code)"
        # --- Filter: People ---
        - name: createdBy
          in: query
          required: false
          schema:
            type: string
          description: "Nguoi lap"
        - name: checkedBy
          in: query
          required: false
          schema:
            type: string
          description: "Nguoi kiem soat"
        - name: approvedBy
          in: query
          required: false
          schema:
            type: string
          description: "Nguoi phe duyet"
        # --- Filter: DVQHNS ---
        - name: glSegment3
          in: query
          required: false
          schema:
            type: string
            maxLength: 7
          description: "DVQHNS filter on detail lines"
        # --- Sorting ---
        - name: sort
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: |
            Sort criteria. Format: field,direction. Default: createdDate,desc.
            Example: sort=createdDate,desc&sort=amount,asc
            Sortable fields: createdDate, paymentDate, refNo, amount, channel, status
      responses:
        "200":
          description: Paginated list of payment orders
          headers:
            X-Total-Count:
              schema:
                type: integer
              description: Total matching records
            X-Total-Amount:
              schema:
                type: object
                additionalProperties:
                  type: number
              description: "Total AMOUNT grouped by CURRENCY_CODE (excludes DELETED)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrderPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [Payment Orders]
      operationId: createPaymentOrder
      summary: Create a new payment order (Maker only)
      description: |
        Maker creates a new payment order. System auto-generates F-ID, sets F-VER=1,
        F-STATUS=DRAFT, and autofills F-AUDIT (createdBy, createdDate).
        Event: LTT.NEW.OPEN + LTT.NEW.SAVE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentOrderCreateRequest"
      responses:
        "201":
          description: Payment order created as DRAFT
          headers:
            ETag:
              schema:
                type: string
              description: "Current F-VER for optimistic locking (e.g., \"1\")"
            Location:
              schema:
                type: string
              description: URI of the newly created payment order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrderDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/payment-orders/{id}:
    get:
      tags: [Payment Orders]
      operationId: getPaymentOrder
      summary: View payment order detail (read-only)
      description: |
        Retrieve full detail of a payment order including all tabs:
        General Info, Detail Lines, Sender Info, Receiver Info,
        Attachments, History, Approval Status.
        Event: LTT.VIEW.OPEN
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
      responses:
        "200":
          description: Payment order detail
          headers:
            ETag:
              schema:
                type: string
              description: "Current F-VER for optimistic locking"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrderDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      tags: [Payment Orders]
      operationId: updatePaymentOrder
      summary: Update a payment order (Maker only, Draft/Returned_To_Maker)
      description: |
        Update an existing payment order. Only allowed when F-STATUS is DRAFT or
        RETURNED_TO_MAKER and current user is the original Maker (VAL-13, VAL-14).
        Requires If-Match header for optimistic locking (VAL-15).
        On success, F-VER increments by 1 and audit log records old->new values.
        Event: LTT.EDIT.SAVE
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentOrderUpdateRequest"
      responses:
        "200":
          description: Payment order updated. F-VER incremented.
          headers:
            ETag:
              schema:
                type: string
              description: "New F-VER after update"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrderDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Optimistic lock conflict (VAL-15) or concurrent edit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                lock_conflict:
                  summary: Record modified by another session
                  value:
                    code: MSG-ERR-LOCK
                    message: "Ban ghi da bi thay doi tu phien khac. Vui long tai lai truoc khi tiep tuc"
                    traceId: "abc-123-def"
                concurrent_edit:
                  summary: Record being edited by another user
                  value:
                    code: MSG-ERR-CONCURRENT
                    message: "Giao dich dang duoc [userX] chinh sua, vui long thu lai sau"
                    traceId: "abc-123-def"
        "412":
          description: Precondition failed - If-Match does not match current F-VER
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: MSG-ERR-LOCK
                message: "Ban ghi da bi thay doi tu phien khac. Vui long tai lai truoc khi tiep tuc"
                traceId: "abc-123-def"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags: [Payment Orders]
      operationId: deletePaymentOrder
      summary: Soft-delete a payment order (Maker only, Draft/Returned_To_Maker)
      description: |
        Soft-delete (F-STATUS=DELETED) a payment order. Only allowed when F-STATUS is
        DRAFT or RETURNED_TO_MAKER and current user is the original Maker.
        Requires reason >= 10 chars and confirmation checkbox (VAL-16).
        Event: LTT.DELETE.CONFIRM
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteRequest"
      responses:
        "200":
          description: Payment order soft-deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                code: MSG-OK-DELETE
                message: "Xoa giao dich thanh cong"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/payment-orders/{id}/submit:
    post:
      tags: [Payment Orders]
      operationId: submitPaymentOrder
      summary: Submit payment order for approval (Maker only)
      description: |
        Submit a payment order to transition from DRAFT/RETURNED_TO_MAKER to
        READY_FOR_APPROVAL. Full validation is performed (VAL-01 through VAL-18).
        Sends notification to Checker upon success (BIZ-009).
        Event: LTT.NEW.SUBMIT
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitRequest"
      responses:
        "200":
          description: Payment order submitted for approval
          headers:
            ETag:
              schema:
                type: string
              description: "Updated F-VER"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                code: MSG-OK-SUBMIT
                message: "Da gui giao dich de kiem soat/phe duyet"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                required_field:
                  summary: Missing required field (VAL-01)
                  value:
                    code: MSG-ERR-REQUIRED
                    message: "Vui long nhap [So YCTT]"
                    traceId: "abc-123"
                cross_field:
                  summary: Cross-field validation failed (VAL-05)
                  value:
                    code: MSG-ERR-CROSS-FIELD
                    message: "[TK chuyen] va [TK nhan] khong hop le: Khong duoc trung tai khoan"
                    traceId: "abc-123"
                status_invalid:
                  summary: Status does not allow submit (VAL-13)
                  value:
                    code: MSG-ERR-STATUS
                    message: "Giao dich dang o trang thai [APPROVED], khong cho phep Sua/Xoa"
                    traceId: "abc-123"
                maker_violation:
                  summary: Not original maker (VAL-14)
                  value:
                    code: MSG-ERR-MAKER
                    message: "Chi Nguoi lap goc moi duoc phep Sua/Xoa"
                    traceId: "abc-123"
                amount_mismatch:
                  summary: Detail total != header amount (VAL-07)
                  value:
                    code: MSG-ERR-CROSS-FIELD
                    message: "Tong tien dong chi tiet khong bang so tien chuyen"
                    traceId: "abc-123"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/payment-orders/{id}/copy:
    post:
      tags: [Payment Orders]
      operationId: copyPaymentOrder
      summary: Copy from an existing payment order (Maker only)
      description: |
        Create a new payment order by copying data from an existing one.
        System generates a new F-ID, sets F-STATUS=DRAFT, F-VER=1,
        and autofills createdBy/createdDate. Does NOT copy attachments.
        Event: LTT.NEW.COPY
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
      responses:
        "201":
          description: New payment order created from copy
          headers:
            ETag:
              schema:
                type: string
              description: "F-VER of the new record (\"1\")"
            Location:
              schema:
                type: string
              description: URI of the newly created payment order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrderDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ----------------------------------------------------------
  # Payment Order Approval Workflow
  # ----------------------------------------------------------
  /api/v1/payment-orders/{id}/approval/check:
    post:
      tags: [Payment Order Approval]
      operationId: checkerApprove
      summary: Checker approves (checks) a payment order
      description: |
        Checker approves the payment order. Transitions status from READY_FOR_APPROVAL
        to PENDING_APPROVER. Checker must be different from Maker (SoD - BIZ-001).
        Sends notification to Approver.
        Event: LTT.APPROVE.CHECKER
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckRequest"
      responses:
        "200":
          description: Checker approval successful. Status now PENDING_APPROVER.
          headers:
            ETag:
              schema:
                type: string
              description: "Updated F-VER"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                code: MSG-INF-NOTIFY-CHECKER
                message: "Da gui thong bao den Nguoi kiem soat"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/payment-orders/{id}/approval/reject:
    post:
      tags: [Payment Order Approval]
      operationId: rejectPaymentOrder
      summary: Reject a payment order (Checker or Approver)
      description: |
        Reject a payment order. Sets F-STATUS=REJECTED, locks the record.
        Applicable at READY_FOR_APPROVAL (Checker rejects) or PENDING_APPROVER
        (Approver rejects). Rejector must not be Maker (SoD - BIZ-001).
        Reason >= 10 chars required (BIZ-006).
        Event: LTT.APPROVE.REJECT
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectRequest"
      responses:
        "200":
          description: Payment order rejected. Status now REJECTED.
          headers:
            ETag:
              schema:
                type: string
              description: "Updated F-VER"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/payment-orders/{id}/approval/return:
    post:
      tags: [Payment Order Approval]
      operationId: returnPaymentOrder
      summary: Return payment order to Maker (Checker or Approver)
      description: |
        Return a payment order to the original Maker. Transitions status to
        RETURNED_TO_MAKER. Applicable at READY_FOR_APPROVAL or PENDING_APPROVER.
        Reason >= 10 chars required (BIZ-006). Notifies Maker.
        Event: LTT.APPROVE.RETURN
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReturnRequest"
      responses:
        "200":
          description: Payment order returned to Maker. Status now RETURNED_TO_MAKER.
          headers:
            ETag:
              schema:
                type: string
              description: "Updated F-VER"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/payment-orders/{id}/approval/approve:
    post:
      tags: [Payment Order Approval]
      operationId: approverApprove
      summary: Approver approves a payment order
      description: |
        Final approval. Transitions status from PENDING_APPROVER to APPROVED.
        Approver must be different from Maker and Checker (SoD - BIZ-001).
        Triggers downstream business flow and notifies Maker.
        For high-value transactions (>= 500M VND), digital signature or OTP required.
        Event: LTT.APPROVE.APPROVER
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveRequest"
      responses:
        "200":
          description: Payment order approved. Status now APPROVED.
          headers:
            ETag:
              schema:
                type: string
              description: "Updated F-VER"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ----------------------------------------------------------
  # Payment Order Attachments
  # ----------------------------------------------------------
  /api/v1/payment-orders/{id}/attachments:
    get:
      tags: [Payment Order Attachments]
      operationId: listAttachments
      summary: List attachments for a payment order
      description: |
        Retrieve the list of attachments for a payment order.
        Includes file metadata (name, size, hash, upload date, uploader).
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
      responses:
        "200":
          description: List of attachments
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AttachmentDetail"
                  totalFiles:
                    type: integer
                    description: "Total file count"
                  totalSizeMB:
                    type: number
                    description: "Total size in MB"
                  maxSizeMB:
                    type: number
                    description: "Max total size limit (50MB)"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [Payment Order Attachments]
      operationId: uploadAttachment
      summary: Upload attachment(s) for a payment order
      description: |
        Upload file(s) to a payment order. Only allowed when F-STATUS is DRAFT or
        RETURNED_TO_MAKER and current user is the original Maker.
        Constraints: <= 10MB/file, allowed formats pdf/jpg/png/docx/xlsx.
        Max total 50MB per record (BIZ-005).
        Event: LTT.ATTACH.UPLOAD
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - docType
              properties:
                file:
                  type: string
                  format: binary
                  description: "File to upload (<=10MB, pdf/jpg/png/docx/xlsx)"
                docType:
                  type: string
                  enum: [CHUNG_TU_GOC, HOP_DONG, HOA_DON, BANG_KE, VAN_BAN_KHAC]
                  description: "Loai tai lieu"
                note:
                  type: string
                  maxLength: 250
                  description: "Mo ta (optional, max 250 chars)"
      responses:
        "201":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentDetail"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                file_too_large:
                  summary: File exceeds size limit (VAL-09)
                  value:
                    code: MSG-ERR-FILE
                    message: "File vuot gioi han hoac sai dinh dang"
                    traceId: "abc-123"
                file_format:
                  summary: Invalid file format (VAL-09)
                  value:
                    code: MSG-ERR-FILE
                    message: "File vuot gioi han hoac sai dinh dang"
                    traceId: "abc-123"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/payment-orders/{id}/attachments/{attachmentId}:
    delete:
      tags: [Payment Order Attachments]
      operationId: deleteAttachment
      summary: Delete an attachment (soft-delete)
      description: |
        Soft-delete an attachment. Only allowed when F-STATUS is DRAFT or
        RETURNED_TO_MAKER and current user is the original Maker.
        Event: LTT.ATTACH.DELETE
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "Attachment ID"
      responses:
        "200":
          description: Attachment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                code: MSG-OK-SAVE
                message: "Xoa file dinh kem thanh cong"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ----------------------------------------------------------
  # Role Management
  # ----------------------------------------------------------
  /api/v1/roles:
    get:
      tags: [Roles]
      operationId: listRoles
      summary: List roles with pagination
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: keyword
          in: query
          schema:
            type: string
          description: "Search by role name or code"
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE]
      responses:
        "200":
          description: Paginated list of roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RolePage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [Roles]
      operationId: createRole
      summary: Create a new role
      description: "Create a new role. Status defaults to DRAFT."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleCreateRequest"
      responses:
        "201":
          description: Role created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/roles/{id}:
    get:
      tags: [Roles]
      operationId: getRole
      summary: Get role detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Role detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      tags: [Roles]
      operationId: updateRole
      summary: Update a role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleCreateRequest"
      responses:
        "200":
          description: Role updated
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags: [Roles]
      operationId: deleteRole
      summary: Soft-delete a role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200":
          description: Role deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/roles/{id}/submit:
    post:
      tags: [Roles]
      operationId: submitRole
      summary: Submit role for approval
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200":
          description: Role submitted for approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/roles/{id}/approve:
    post:
      tags: [Roles]
      operationId: approveRole
      summary: Approve a role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleApprovalRequest"
      responses:
        "200":
          description: Role approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ----------------------------------------------------------
  # Reports
  # ----------------------------------------------------------
  /api/v1/reports/query:
    post:
      tags: [Reports]
      operationId: queryReport
      summary: Query/report with search parameters
      description: |
        Submit report query with dynamic parameters. Returns either synchronous results
        (for small datasets < 50k rows) or an async job ID (for large datasets).
        Report code RPT-TT-LIST-001 for payment order listing report.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportQueryRequest"
      responses:
        "200":
          description: |
            Synchronous result. For small datasets, returns data directly.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportQueryResult"
        "202":
          description: |
            Accepted for async processing. Returns job ID for polling.
            Client should poll GET /api/v1/reports/export/{jobId}.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportJobResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/reports/export/{jobId}:
    get:
      tags: [Reports]
      operationId: downloadReport
      summary: Download exported report file by job ID
      description: |
        Download the result of an async report export. Returns the file if the job
        is complete, or the current job status if still processing.
        URL is signed with TTL <= 15 minutes (BIZ-RPT-09).
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
          description: "Report job ID (F-RPT-RUN-ID)"
      responses:
        "200":
          description: Report file ready for download
          headers:
            Content-Disposition:
              schema:
                type: string
              description: "attachment; filename=\"<RPT_CODE>_<ORG>_<period>_<timestamp>.<ext>\""
            X-File-Hash:
              schema:
                type: string
              description: "SHA-256 hash of the file (8 chars shown in UI)"
            X-File-Size:
              schema:
                type: integer
              description: "File size in bytes"
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            text/csv:
              schema:
                type: string
                format: binary
        "202":
          description: Job still processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportJobResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Job not found or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: MSG-ERR-RPT-LINK-EXPIRED
                message: "Link tai bao cao da het han"
                traceId: "abc-123"
        "410":
          description: Download link expired (TTL exceeded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: MSG-ERR-RPT-LINK-EXPIRED
                message: "Link tai bao cao da het han"
                traceId: "abc-123"
        "500":
          $ref: "#/components/responses/InternalServerError"

# ============================================================
# COMPONENTS
# ============================================================
components:
  # ----------------------------------------------------------
  # Reusable Parameters
  # ----------------------------------------------------------
  parameters:
    PaymentOrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: "Payment order unique identifier (F-ID)"
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
      description: "Optimistic locking - current F-VER value (e.g., \"3\")"

  # ----------------------------------------------------------
  # Reusable Responses
  # ----------------------------------------------------------
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: MSG-ERR-FORMAT
            message: "Dinh dang [Truong] khong hop le"
            traceId: "abc-123-def"

    Unauthorized:
      description: Session expired or not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: MSG-ERR-SESSION
            message: "Phien dang nhap da het han, vui long dang nhap lai"
            traceId: "abc-123-def"

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: MSG-ERR-PERMISSION
            message: "Ban khong co quyen thuc hien thao tac nay"
            traceId: "abc-123-def"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: MSG-ERR-SYSTEM
            message: "Khong tim thay tai nguyen"
            traceId: "abc-123-def"

    Conflict:
      description: Conflict (duplicate, status mismatch, concurrent edit)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            duplicate:
              summary: Duplicate record (VAL-11)
              value:
                code: MSG-ERR-DUPLICATE
                message: "Da ton tai ban ghi co [So YCTT] = [REF001]"
                traceId: "abc-123"
            status_conflict:
              summary: Status does not allow operation (VAL-13)
              value:
                code: MSG-ERR-STATUS
                message: "Giao dich dang o trang thai [APPROVED], khong cho phep Sua/Xoa"
                traceId: "abc-123"

    PreconditionFailed:
      description: If-Match header does not match current version
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: MSG-ERR-LOCK
            message: "Ban ghi da bi thay doi tu phien khac. Vui long tai lai truoc khi tiep tuc"
            traceId: "abc-123-def"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: MSG-ERR-SYSTEM
            message: "Loi he thong, traceId: abc-123-def. Vui long thu lai hoac lien he Quan tri"
            traceId: "abc-123-def"

  # ----------------------------------------------------------
  # Schemas
  # ----------------------------------------------------------
  schemas:
    # --------------------------------------------------------
    # Payment Order Schemas
    # --------------------------------------------------------
    PaymentOrderCreateRequest:
      type: object
      description: "Request to create a new payment order (LTT.NEW.SAVE / LTT.NEW.SUBMIT)"
      required:
        - channel
        - transactionType
        - sender
        - receiver
        - refNo
        - paymentDate
        - amount
        - currencyCode
        - description
        - details
        - senderInfo
        - receiverInfo
      properties:
        channel:
          type: string
          enum: [LIEN_NGAN_HANG, THANH_TOAN_SONG_PHUONG]
          description: "Kenh (Channel)"
        transactionType:
          type: string
          description: "Loai lenh - depends on channel"
        lnhTransactionType:
          type: string
          enum: [LENH_THONG_THUONG, LENH_TRAI_PHIEU_CHINH_PHU, LENH_CO_THONG_TIN_THU_NSNN]
          description: "Loai giao dich LNH - only when channel=LIEN_NGAN_HANG"
        sender:
          type: string
          description: "NH/KB chuyen"
        receiver:
          type: string
          description: "NH/KB nhan"
        refNo:
          type: string
          maxLength: 50
          description: "So YCTT / So but toan"
        paymentDate:
          type: string
          format: date
          description: "Ngay thanh toan (YYYY-MM-DD)"
        amount:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: 0
          description: "So tien chuyen - must equal sum of detail amounts"
        currencyCode:
          type: string
          default: "VND"
          description: "Loai tien"
        exchangeRate:
          type: number
          format: double
          description: "Ty gia - required if currencyCode != VND"
        originNum:
          type: string
          description: "So chung tu goc - required if channel=THANH_TOAN_SONG_PHUONG"
        transactionDate:
          type: string
          format: date
          description: "Ngay chung tu - required if channel=THANH_TOAN_SONG_PHUONG"
        expType:
          type: string
          description: "Loai phi - required if transactionType=TT_NGOAI_TE"
        fnCode1:
          type: string
          description: "Ma ngoai te trich no - required if TT by foreign currency"
        fnCode2:
          type: string
          description: "Ma ngoai te TT - required if TT by foreign currency"
        fnAmount:
          type: number
          format: double
          description: "So tien ngoai te TT - required if TT by foreign currency"
        description:
          type: string
          maxLength: 1000
          description: "Noi dung thanh toan"
        # Nested objects
        details:
          type: array
          description: "Detail lines (khoan muc chi tiet). SUM(LINE_AMOUNT) must equal AMOUNT."
          minItems: 1
          items:
            $ref: "#/components/schemas/PaymentOrderDetailLine"
        senderInfo:
          $ref: "#/components/schemas/SenderInfo"
        receiverInfo:
          $ref: "#/components/schemas/ReceiverInfo"
        submit:
          type: boolean
          default: false
          description: |
            If true, validate fully and transition to READY_FOR_APPROVAL.
            If false, save as DRAFT with minimal validation.

    PaymentOrderUpdateRequest:
      type: object
      description: "Request to update an existing payment order (LTT.EDIT.SAVE)"
      properties:
        channel:
          type: string
          enum: [LIEN_NGAN_HANG, THANH_TOAN_SONG_PHUONG]
        transactionType:
          type: string
        lnhTransactionType:
          type: string
        sender:
          type: string
        receiver:
          type: string
        refNo:
          type: string
          maxLength: 50
        paymentDate:
          type: string
          format: date
        amount:
          type: number
          format: double
        currencyCode:
          type: string
        exchangeRate:
          type: number
          format: double
        originNum:
          type: string
        transactionDate:
          type: string
          format: date
        expType:
          type: string
        fnCode1:
          type: string
        fnCode2:
          type: string
        fnAmount:
          type: number
          format: double
        description:
          type: string
          maxLength: 1000
        details:
          type: array
          items:
            $ref: "#/components/schemas/PaymentOrderDetailLine"
        senderInfo:
          $ref: "#/components/schemas/SenderInfo"
        receiverInfo:
          $ref: "#/components/schemas/ReceiverInfo"

    PaymentOrderDetailLine:
      type: object
      description: "Single detail line (khoan muc) in the payment order"
      required:
        - glSegment2
        - glSegment3
        - lineDescription
        - lineAmount
      properties:
        lineNo:
          type: integer
          description: "STT - auto-generated, ignored on input"
        glSegment1:
          type: string
          maxLength: 2
          default: "01"
          description: "Ma quy (2 chars)"
        glSegment2:
          type: string
          maxLength: 4
          description: "TK tu nhien (4 chars) - required"
        glSegment3:
          type: string
          maxLength: 7
          description: "DVQHNS (7 chars) - required"
        glSegment4:
          type: string
          description: "Cap NS - conditional"
        glSegment5:
          type: string
          maxLength: 3
          default: "000"
          description: "Chuong (3 chars)"
        glSegment6:
          type: string
          maxLength: 3
          default: "000"
          description: "Nganh KT (3 chars)"
        glSegment7:
          type: string
          maxLength: 4
          default: "0000"
          description: "NDKT (4 chars)"
        glSegment8:
          type: string
          maxLength: 5
          default: "00000"
          description: "Dia ban (5 chars)"
        glSegment9:
          type: string
          maxLength: 5
          default: "00000"
          description: "CTMT (5 chars)"
        glSegment10:
          type: string
          maxLength: 2
          default: "00"
          description: "Ma nguyen kinh phi (2 chars)"
        glSegment11:
          type: string
          maxLength: 4
          default: "0000"
          description: "Kho bac (4 chars)"
        glSegment12:
          type: string
          maxLength: 3
          default: "00"
          description: "Du phong (3 chars)"
        lineDescription:
          type: string
          description: "Dien giai so tien chi tiet"
        lineAmount:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: 0
          description: "So tien cua dong chi tiet"

    SenderInfo:
      type: object
      description: "Thong tin nguoi chuyen (Sender information)"
      required:
        - senderName
        - senderAddress
        - senderGlSegment2
        - senderBankCode
      properties:
        senderName:
          type: string
          description: "Ten nguoi chuyen"
        senderAddress:
          type: string
          description: "Dia chi nguoi chuyen"
        senderGlSegment2:
          type: string
          description: "Tai khoan nguoi chuyen"
        senderNum:
          type: string
          description: "Ma KH"
        senderBankCode:
          type: string
          description: "Mo tai NH/KB"
        senderIdentifyId:
          type: string
          description: "CMND/CCCD/HC/Ma DN"
        senderIssuedDate:
          type: string
          format: date
          description: "Ngay cap - required if senderIdentifyId provided"
        senderIssuedPlace:
          type: string
          description: "Noi cap - required if senderIdentifyId provided"
        tpcpCode:
          type: string
          description: "Ma TPCP - required if transactionType=LENH_TRAI_PHIEU_CHINH_PHU"

    ReceiverInfo:
      type: object
      description: "Thong tin nguoi nhan (Receiver information)"
      required:
        - receiverName
        - receiverGlSegment2
        - receiverBankName
        - receiverBankCode
      properties:
        receiverName:
          type: string
          description: "Ten nguoi nhan"
        receiverAddress:
          type: string
          description: "Dia chi nguoi nhan"
        receiverGlSegment2:
          type: string
          description: "Tai khoan nguoi nhan"
        receiverBankName:
          type: string
          description: "Mo tai NH/KB"
        receiverBankCode:
          type: string
          description: "Ten tai khoan"
        receiverIdentifyId:
          type: string
          description: "CMND/CCCD/HC/Ma DN"
        receiverIssuedDate:
          type: string
          format: date
          description: "Ngay cap - required if receiverIdentifyId provided"
        receiverIssuedPlace:
          type: string
          description: "Noi cap - required if receiverIdentifyId provided"

    PaymentOrderPage:
      type: object
      description: "Paginated list of payment orders"
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/PaymentOrderListItem"
        page:
          type: object
          properties:
            number:
              type: integer
              description: "Current page number (0-indexed)"
            size:
              type: integer
              description: "Page size"
            totalElements:
              type: integer
              description: "Total matching records"
            totalPages:
              type: integer
              description: "Total pages"

    PaymentOrderListItem:
      type: object
      description: "Summary view of a payment order for list display"
      properties:
        id:
          type: string
          description: "F-ID (internal identifier)"
        refNo:
          type: string
          description: "So YCTT / So but toan"
        channel:
          type: string
          description: "Kenh"
        transactionType:
          type: string
          description: "Loai lenh"
        lnhTransactionType:
          type: string
          description: "Loai GD LNH - empty when channel != LNH"
        createdDate:
          type: string
          format: date-time
          description: "Ngay lap"
        paymentDate:
          type: string
          format: date
          description: "Ngay thanh toan"
        sender:
          type: string
          description: "NH/KB chuyen"
        receiver:
          type: string
          description: "NH/KB nhan"
        senderName:
          type: string
          description: "Ten nguoi chuyen"
        receiverName:
          type: string
          description: "Ten nguoi nhan"
        amount:
          type: number
          format: double
          description: "So tien chuyen"
        currencyCode:
          type: string
          description: "Loai tien"
        description:
          type: string
          description: "Noi dung TT"
        status:
          type: string
          enum:
            - DRAFT
            - READY_FOR_APPROVAL
            - PENDING_APPROVER
            - APPROVED
            - RETURNED_TO_MAKER
            - REJECTED
            - DELETED
            - TRANSFERRED_TO_GL
            - POSTED
          description: "F-STATUS"
        createdBy:
          type: string
          description: "Nguoi lap"
        checkedBy:
          type: string
          description: "Nguoi kiem soat"
        approvedBy:
          type: string
          description: "Nguoi phe duyet"
        version:
          type: integer
          description: "F-VER (optimistic lock version)"

    PaymentOrderDetail:
      type: object
      description: "Full detail of a payment order"
      properties:
        id:
          type: string
          description: "F-ID"
        refNo:
          type: string
        channel:
          type: string
        transactionType:
          type: string
        lnhTransactionType:
          type: string
        sender:
          type: string
        receiver:
          type: string
        paymentDate:
          type: string
          format: date
        amount:
          type: number
          format: double
        currencyCode:
          type: string
        exchangeRate:
          type: number
          format: double
        originNum:
          type: string
        transactionDate:
          type: string
          format: date
        expType:
          type: string
        fnCode1:
          type: string
        fnCode2:
          type: string
        fnAmount:
          type: number
          format: double
        description:
          type: string
        status:
          type: string
          enum:
            - DRAFT
            - READY_FOR_APPROVAL
            - PENDING_APPROVER
            - APPROVED
            - RETURNED_TO_MAKER
            - REJECTED
            - DELETED
            - TRANSFERRED_TO_GL
            - POSTED
        version:
          type: integer
          description: "F-VER for optimistic locking"
        # Audit fields
        createdBy:
          type: string
          description: "Nguoi lap (auto)"
        createdDate:
          type: string
          format: date-time
          description: "Ngay lap (auto)"
        lastUpdatedBy:
          type: string
          description: "Nguoi cap nhat cuoi"
        lastUpdatedDate:
          type: string
          format: date-time
          description: "Ngay cap nhat cuoi"
        checkedBy:
          type: string
        checkedDate:
          type: string
          format: date-time
        approvedBy:
          type: string
        approvedDate:
          type: string
          format: date-time
        # Nested data
        details:
          type: array
          items:
            $ref: "#/components/schemas/PaymentOrderDetailLineResponse"
        senderInfo:
          $ref: "#/components/schemas/SenderInfoResponse"
        receiverInfo:
          $ref: "#/components/schemas/ReceiverInfoResponse"
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentDetail"
        history:
          type: array
          items:
            $ref: "#/components/schemas/AuditHistoryEntry"
        approvalStatus:
          $ref: "#/components/schemas/ApprovalStatus"

    PaymentOrderDetailLineResponse:
      type: object
      description: "Detail line with auto-generated fields"
      allOf:
        - $ref: "#/components/schemas/PaymentOrderDetailLine"
        - type: object
          properties:
            id:
              type: string
              format: uuid
              description: "Detail line ID"

    SenderInfoResponse:
      type: object
      description: "Sender information in response"
      allOf:
        - $ref: "#/components/schemas/SenderInfo"

    ReceiverInfoResponse:
      type: object
      description: "Receiver information in response"
      allOf:
        - $ref: "#/components/schemas/ReceiverInfo"

    # --------------------------------------------------------
    # Approval / Workflow Schemas
    # --------------------------------------------------------
    SubmitRequest:
      type: object
      description: "Optional body for submit - can include idempotency key"
      properties:
        idempotencyKey:
          type: string
          description: "Client-generated idempotency key to prevent double-submit"

    CheckRequest:
      type: object
      description: "Checker approval request (LTT.APPROVE.CHECKER)"
      required:
        - checkResult
        - checklist
      properties:
        checkResult:
          type: string
          enum: [APPROVED]
          description: "Checker result - must be APPROVED for this endpoint"
        checkNote:
          type: string
          description: "Checker note (optional for approve)"
        checklist:
          type: array
          items:
            type: object
            required: [item, checked]
            properties:
              item:
                type: string
                description: "Checklist item code"
              checked:
                type: boolean
          description: "Checklist items that must all be ticked"
        idempotencyKey:
          type: string

    ApproveRequest:
      type: object
      description: "Approver final approval request (LTT.APPROVE.APPROVER)"
      required:
        - approveResult
        - authMethod
      properties:
        approveResult:
          type: string
          enum: [APPROVED]
          description: "Approver result - must be APPROVED for this endpoint"
        approveNote:
          type: string
          description: "Approver note"
        authMethod:
          type: string
          enum: [OTP, DIGITAL_SIGNATURE]
          description: "Authentication method. High-value (>=500M VND) requires DIGITAL_SIGNATURE."
        otpCode:
          type: string
          maxLength: 6
          description: "OTP code - required if authMethod=OTP"
        certSerial:
          type: string
          description: "Certificate serial - required if authMethod=DIGITAL_SIGNATURE"
        signature:
          type: string
          format: byte
          description: "Digital signature (CAdES/PAdES) - required if authMethod=DIGITAL_SIGNATURE"
        idempotencyKey:
          type: string

    RejectRequest:
      type: object
      description: "Reject request (LTT.APPROVE.REJECT) - Checker or Approver"
      required:
        - reason
      properties:
        reason:
          type: string
          minLength: 10
          maxLength: 500
          description: "Ly do tu choi (10-500 chars, BIZ-006)"
        errorCode:
          type: string
          description: "Ma loi nghiep vu (optional)"
        idempotencyKey:
          type: string

    ReturnRequest:
      type: object
      description: "Return to Maker request (LTT.APPROVE.RETURN) - Checker or Approver"
      required:
        - reason
      properties:
        reason:
          type: string
          minLength: 10
          maxLength: 500
          description: "Ly do tra lai (10-500 chars, BIZ-006)"
        errorCode:
          type: string
          description: "Ma loi nghiep vu (optional)"
        idempotencyKey:
          type: string

    DeleteRequest:
      type: object
      description: "Soft-delete request (LTT.DELETE.CONFIRM)"
      required:
        - reason
        - confirmReviewed
      properties:
        reason:
          type: string
          minLength: 10
          maxLength: 500
          description: "Ly do xoa (10-500 chars, VAL-16)"
        confirmReviewed:
          type: boolean
          description: "Must be true - confirms user has reviewed before deletion"

    ApprovalStatus:
      type: object
      description: "Workflow status showing the approval chain"
      properties:
        currentStatus:
          type: string
          description: "Current F-STATUS"
        steps:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [MAKER, CHECKER, APPROVER]
                description: "Role in the approval chain"
              action:
                type: string
                description: "Action taken (CREATE, SUBMIT, CHECK, APPROVE, REJECT, RETURN)"
              actor:
                type: string
                description: "Username of the actor"
              actionDate:
                type: string
                format: date-time
              note:
                type: string
                description: "Note or reason provided"
              status:
                type: string
                enum: [COMPLETED, PENDING, SKIPPED]
                description: "Whether this step is completed, pending, or skipped"

    # --------------------------------------------------------
    # Attachment Schemas
    # --------------------------------------------------------
    AttachmentDetail:
      type: object
      description: "Attachment metadata"
      properties:
        id:
          type: string
          format: uuid
          description: "Attachment ID"
        fileName:
          type: string
          description: "Original file name"
        docType:
          type: string
          enum: [CHUNG_TU_GOC, HOP_DONG, HOA_DON, BANG_KE, VAN_BAN_KHAC]
          description: "Loai tai lieu"
        note:
          type: string
          description: "Mo ta"
        fileSize:
          type: integer
          format: int64
          description: "File size in bytes"
        fileHash:
          type: string
          description: "SHA-256 hash"
        uploadedBy:
          type: string
          description: "Nguoi upload"
        uploadedDate:
          type: string
          format: date-time
          description: "Ngay upload"
        attachStatus:
          type: string
          enum: [ACTIVE, DELETED]
          description: "Attachment status"

    # --------------------------------------------------------
    # Audit / History Schemas
    # --------------------------------------------------------
    AuditHistoryEntry:
      type: object
      description: "Single audit history entry (LTT.VIEW.HISTORY)"
      properties:
        seqNo:
          type: integer
          description: "STT"
        actionDate:
          type: string
          format: date-time
          description: "Thoi diem thuc hien"
        actor:
          type: string
          description: "Nguoi thuc hien"
        actorRole:
          type: string
          enum: [MAKER, CHECKER, APPROVER, SYSTEM]
          description: "Vai tro"
        action:
          type: string
          description: "Hanh dong (Event ID reference)"
        statusFrom:
          type: string
          description: "Trang thai truoc"
        statusTo:
          type: string
          description: "Trang thai sau"
        version:
          type: integer
          description: "F-VER"
        note:
          type: string
          description: "Ly do / ghi chu"
        clientIp:
          type: string
          description: "IP may tram"
        hostName:
          type: string
          description: "Ten may"
        channel:
          type: string
          enum: [WEB, API, MOBILE]
          description: "Kenh truy cap"
        diff:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              oldValue:
                type: string
              newValue:
                type: string
          description: "Field-level changes (BIZ-007)"

    # --------------------------------------------------------
    # Role Schemas
    # --------------------------------------------------------
    RoleCreateRequest:
      type: object
      description: "Request to create or update a role"
      required:
        - roleCode
        - roleName
        - permissions
      properties:
        roleCode:
          type: string
          maxLength: 50
          description: "Unique role code"
        roleName:
          type: string
          maxLength: 200
          description: "Role display name"
        description:
          type: string
          maxLength: 500
          description: "Role description"
        permissions:
          type: array
          items:
            type: string
          description: "List of permission codes assigned to this role"
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
          default: ACTIVE

    RoleDetail:
      type: object
      description: "Role detail with metadata"
      properties:
        id:
          type: string
          format: uuid
        roleCode:
          type: string
        roleName:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [DRAFT, ACTIVE, INACTIVE]
        createdBy:
          type: string
        createdDate:
          type: string
          format: date-time
        updatedBy:
          type: string
        updatedDate:
          type: string
          format: date-time
        version:
          type: integer

    RolePage:
      type: object
      description: "Paginated list of roles"
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/RoleDetail"
        page:
          type: object
          properties:
            number:
              type: integer
            size:
              type: integer
            totalElements:
              type: integer
            totalPages:
              type: integer

    RoleApprovalRequest:
      type: object
      description: "Role approval/rejection request"
      required:
        - action
      properties:
        action:
          type: string
          enum: [APPROVE, REJECT]
          description: "Approval action"
        reason:
          type: string
          minLength: 10
          maxLength: 500
          description: "Required if action=REJECT"

    # --------------------------------------------------------
    # Report Schemas
    # --------------------------------------------------------
    ReportQueryRequest:
      type: object
      description: "Report query request (RPT-TT-LIST-001)"
      required:
        - rptCode
        - orgCode
        - dateField
        - fromDate
        - toDate
        - outputFormat
        - lang
      properties:
        rptCode:
          type: string
          description: "Report code, e.g., RPT-TT-LIST-001"
          example: "RPT-TT-LIST-001"
        orgCode:
          type: string
          description: "Don vi bao cao - must be within user's permission scope (VAL-RPT-01)"
        channel:
          type: string
          enum: [LIEN_NGAN_HANG, THANH_TOAN_SONG_PHUONG, ALL]
          description: "Kenh filter"
        transactionType:
          type: string
          description: "Loai lenh - cascading by channel"
        lnhTransactionType:
          type: string
          description: "Loai GD LNH"
        status:
          type: array
          items:
            type: string
            enum:
              - DRAFT
              - READY_FOR_APPROVAL
              - PENDING_APPROVER
              - APPROVED
              - RETURNED_TO_MAKER
              - REJECTED
              - DELETED
          description: "Status filter. Default: all except DELETED."
        dateField:
          type: string
          enum: [CREATED_DATE, PAYMENT_DATE, CHECKED_DATE, APPROVED_DATE]
          default: CREATED_DATE
          description: "Which date field to filter on"
        fromDate:
          type: string
          format: date
          description: "Tu ngay (YYYY-MM-DD)"
        toDate:
          type: string
          format: date
          description: "Den ngay (YYYY-MM-DD). Max range 366 days."
        currencyCode:
          type: string
          description: "Loai tien filter"
        amountFrom:
          type: number
          format: double
          description: "So tien tu"
        amountTo:
          type: number
          format: double
          description: "So tien den"
        sender:
          type: string
          description: "NH/KB chuyen filter"
        receiver:
          type: string
          description: "NH/KB nhan filter"
        glSegment3:
          type: string
          maxLength: 7
          description: "DVQHNS filter"
        createdBy:
          type: string
          description: "Nguoi lap filter"
        sortBy:
          type: string
          default: "CREATED_DATE,DESC"
          description: "Sort: CREATED_DATE/PAYMENT_DATE/AMOUNT, ASC/DESC"
        groupBy:
          type: string
          enum: [NONE, STATUS, CHANNEL, SENDER, CURRENCY]
          default: NONE
          description: "Grouping option"
        showSubtotal:
          type: boolean
          default: true
          description: "Show subtotals when grouped"
        outputFormat:
          type: string
          enum: [PDF, XLSX, CSV]
          default: PDF
          description: "Output format (VAL-RPT-06)"
        lang:
          type: string
          enum: [VI, EN]
          default: VI
          description: "Language (VAL-RPT-08)"
        templateCode:
          type: string
          description: "Template code (VAL-RPT-05)"
        maskPii:
          type: boolean
          default: true
          description: "Mask sensitive fields (VAL-RPT-07)"
        runMode:
          type: string
          enum: [AUTO, SYNC, ASYNC]
          default: AUTO
          description: "Run mode. AUTO switches based on dataset size (VAL-RPT-02)."
        notifyEmail:
          type: array
          items:
            type: string
            format: email
          description: "Email addresses for async notification"

    ReportQueryResult:
      type: object
      description: "Synchronous report query result"
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReportRow"
        summary:
          $ref: "#/components/schemas/ReportSummary"
        meta:
          type: object
          properties:
            rptCode:
              type: string
            rptName:
              type: string
            totalRecords:
              type: integer
            generatedAt:
              type: string
              format: date-time
            watermark:
              type: string
              description: "BAN NHAP / CHINH THUC / KIEM TRA SO LIEU"
            fileHash:
              type: string
              description: "SHA-256 hash"

    ReportRow:
      type: object
      description: "Single row in report output"
      properties:
        seqNo:
          type: integer
        refNo:
          type: string
          description: "So YCTT / So but toan"
        channel:
          type: string
        transactionType:
          type: string
        lnhTransactionType:
          type: string
        createdDate:
          type: string
          format: date-time
        paymentDate:
          type: string
          format: date
        sender:
          type: string
        senderName:
          type: string
        senderGlSegment2:
          type: string
        receiver:
          type: string
        receiverName:
          type: string
        receiverGlSegment2:
          type: string
        amount:
          type: number
          format: double
        currencyCode:
          type: string
        exchangeRate:
          type: number
          format: double
        originNum:
          type: string
        description:
          type: string
        status:
          type: string
        createdBy:
          type: string
        checkedBy:
          type: string
        approvedBy:
          type: string
        version:
          type: integer

    ReportSummary:
      type: object
      description: "Report footer summary"
      properties:
        totalRecords:
          type: integer
          description: "Total number of records"
        totalAmountByCurrency:
          type: object
          additionalProperties:
            type: number
          description: "Total amount grouped by currency code"
        totalByStatus:
          type: object
          additionalProperties:
            type: integer
          description: "Record count grouped by status (only when groupBy=STATUS)"

    ReportJobResponse:
      type: object
      description: "Async report job status"
      properties:
        jobId:
          type: string
          description: "F-RPT-RUN-ID"
        status:
          type: string
          enum: [QUEUED, RUNNING, SUCCESS, FAILED, CANCELLED, PARTIAL_SUCCESS, EXPIRED]
          description: "Job status"
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: "Progress percentage (0-100)"
        failReason:
          type: string
          enum: [TIMEOUT, TEMPLATE_ERROR, DATA_NOT_READY, OOM, DISK_FULL, SYSTEM]
          description: "Failure reason if status=FAILED"
        estimatedRows:
          type: integer
          description: "Estimated row count"
        estimatedPages:
          type: integer
          description: "Estimated page count"
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        downloadUrl:
          type: string
          description: "Signed download URL (only when status=SUCCESS or PARTIAL_SUCCESS)"
        expiresAt:
          type: string
          format: date-time
          description: "Download URL expiry time"

    # --------------------------------------------------------
    # Common Schemas
    # --------------------------------------------------------
    ErrorResponse:
      type: object
      description: "Standard error response following MSG-ERR-* convention"
      required: [code, message]
      properties:
        code:
          type: string
          description: "Error code from MSG-ERR-* catalog"
          enum:
            - MSG-ERR-REQUIRED
            - MSG-ERR-FORMAT
            - MSG-ERR-LOOKUP
            - MSG-ERR-RANGE
            - MSG-ERR-CROSS-FIELD
            - MSG-ERR-FILE
            - MSG-ERR-DUPLICATE
            - MSG-ERR-SYSTEM
            - MSG-ERR-TIMEOUT
            - MSG-ERR-PERMISSION
            - MSG-ERR-SESSION
            - MSG-ERR-STATUS
            - MSG-ERR-MAKER
            - MSG-ERR-LOCK
            - MSG-ERR-CONCURRENT
            - MSG-ERR-DELETE-CFM
            - MSG-ERR-LIMIT
            - MSG-ERR-RPT-LINK-EXPIRED
            - MSG-ERR-RPT-HASH-MISMATCH
            - MSG-ERR-RPT-DOWNLOAD-PERM
        message:
          type: string
          description: "Human-readable error message (VI)"
        traceId:
          type: string
          description: "Distributed trace ID for debugging"
        fieldErrors:
          type: array
          description: "Field-level validation errors (for 400 responses)"
          items:
            type: object
            properties:
              field:
                type: string
                description: "Field name (UPPER_SNAKE_CASE)"
              code:
                type: string
                description: "Error code"
              message:
                type: string
                description: "Field-specific error message"
              rejectedValue:
                description: "The rejected value"

    SuccessResponse:
      type: object
      description: "Standard success response following MSG-OK-* convention"
      required: [code, message]
      properties:
        code:
          type: string
          description: "Success code"
          enum:
            - MSG-OK-SAVE
            - MSG-OK-DELETE
            - MSG-OK-SUBMIT
            - MSG-INF-NOTIFY-CHECKER
        message:
          type: string
          description: "Human-readable success message (VI)"
        data:
          description: "Optional response payload"
