openapi: 3.0.3
info:
  title: MVP Kho Bạc - Lệnh Thanh Toán (LTT) API
  description: API phục vụ quản lý Lệnh Thanh Toán (LTT) cho hệ thống KBNN.
  version: 1.0.0
servers:
  - url: /api/v1
    description: v1 backend server

paths:
  /transactions:
    get:
      summary: Lấy danh sách lệnh thanh toán
      tags: [Transactions]
      parameters:
        - name: channel
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: fromDate
          in: query
          schema: { type: string, format: date }
        - name: toDate
          in: query
          schema: { type: string, format: date }
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Danh sách LTT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
    post:
      summary: Tạo mới lệnh thanh toán (Lưu nháp)
      tags: [Transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionCreate'
      responses:
        '201':
          description: Tạo mới thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'

  /transactions/{id}:
    get:
      summary: Xem chi tiết lệnh thanh toán
      tags: [Transactions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Chi tiết giao dịch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Cập nhật lệnh thanh toán (Sửa)
      tags: [Transactions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: If-Match
          in: header
          description: F-VER của bản ghi để kiểm tra optimistic lock
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionUpdate'
      responses:
        '200':
          description: Cập nhật thành công
        '409':
          description: Conflict (Optimistic Lock mismatch)
          $ref: '#/components/responses/Conflict'
    delete:
      summary: Xóa mềm lệnh thanh toán
      tags: [Transactions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, minLength: 10 }
      responses:
        '204':
          description: Xóa thành công

  /transactions/{id}/submit:
    post:
      summary: Gửi kiểm soát (Submit)
      tags: [Workflow]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Gửi thành công

  /transactions/{id}/approve:
    post:
      summary: Kiểm soát/Phê duyệt (Checker/Approver)
      tags: [Workflow]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action: { type: string, enum: [APPROVE, RETURN, REJECT] }
                note: { type: string }
                authMethod: { type: string, enum: [OTP, DIGITAL_SIGNATURE] }
                authPayload: { type: string }
      responses:
        '200':
          description: Phê duyệt thành công

components:
  responses:
    BadRequest:
      description: Dữ liệu không hợp lệ
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Không tìm thấy bản ghi
    Conflict:
      description: Xung đột dữ liệu
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    PageResponse:
      type: object
      properties:
        content:
          type: array
          items: { $ref: '#/components/schemas/Transaction' }
        totalElements: { type: integer }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }

    Transaction:
      type: object
      properties:
        id: { type: integer }
        refNo: { type: string }
        channel: { type: string }
        transType: { type: string }
        amount: { type: number }
        currencyCode: { type: string }
        status: { type: string }
        createdDate: { type: string, format: date-time }
        version: { type: integer }

    TransactionCreate:
      type: object
      required: [channel, transType, refNo, amount, currencyCode, description]
      properties:
        channel: { type: string }
        transType: { type: string }
        refNo: { type: string }
        senderBank: { type: string }
        receiverBank: { type: string }
        amount: { type: number }
        currencyCode: { type: string }
        description: { type: string }
        details:
          type: array
          items: { $ref: '#/components/schemas/TransactionLine' }

    TransactionUpdate:
      $ref: '#/components/schemas/TransactionCreate'

    TransactionDetail:
      allOf:
        - $ref: '#/components/schemas/Transaction'
        - type: object
          properties:
            description: { type: string }
            senderName: { type: string }
            receiverName: { type: string }
            details:
              type: array
              items: { $ref: '#/components/schemas/TransactionLine' }

    TransactionLine:
      type: object
      required: [glSegment2, glSegment3, amount]
      properties:
        glSegment1: { type: string }
        glSegment2: { type: string }
        glSegment3: { type: string }
        glSegment4: { type: string }
        # ... other segments
        amount: { type: number }
        description: { type: string }

    ErrorResponse:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        traceId: { type: string }
