openapi: 3.0.3
info:
  title: MVP Kho Bac - Lenh Thanh Toan (LTT) API
  description: >
    REST API contract for the BFF-service (Backend-for-Frontend) managing
    Lenh Thanh Toan (Payment Orders) in the KBNN State Treasury system.

    Covers the full Maker-Checker-Approver lifecycle:
    Draft -> Ready_For_Approval -> Pending_Approver -> Approved -> Transferred_to_GL -> Posted

    Feature: FT-001 - Quan ly Lenh Thanh Toan
  version: 1.0.0
  contact:
    name: SA Agent - MVP Kho Bac

servers:
  - url: http://localhost:8080
    description: Local development BFF-service

tags:
  - name: LTT CRUD
    description: Create, read, update, delete Lenh Thanh Toan
  - name: LTT Workflow
    description: Maker-Checker-Approver workflow transitions (submit, check, approve)
  - name: LTT Attachments
    description: File attachment management for LTT
  - name: LTT Audit
    description: Audit history and change log

security:
  - BearerAuth: []

paths:
  # ---------------------------------------------------------------------------
  # GET /api/v1/ltt - List / search LTT with filters
  # ---------------------------------------------------------------------------
  /api/v1/ltt:
    get:
      operationId: listLtt
      summary: List and search Lenh Thanh Toan
      description: >
        Paginated listing of payment orders with multi-criteria filtering.
        Default sort: CREATED_DATE DESC. Default date range: last 7 days.
      tags: [LTT CRUD]
      parameters:
        - name: channel
          in: query
          description: "Payment channel: LIEN_NGAN_HANG or THANH_TOAN_SONG_PHUONG"
          schema:
            type: string
            enum: [LIEN_NGAN_HANG, THANH_TOAN_SONG_PHUONG]
        - name: transactionType
          in: query
          description: "Order type (dynamic based on channel)"
          schema:
            type: string
        - name: status
          in: query
          description: "Filter by status (repeat param for multi-select)"
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              enum:
                - DRAFT
                - READY_FOR_APPROVAL
                - PENDING_APPROVER
                - APPROVED
                - TRANSFERRED_TO_GL
                - POSTED
                - RETURNED_TO_MAKER
                - REJECTED
                - DELETED
        - name: refNo
          in: query
          description: "So YCTT / So but toan - exact or starts-with match"
          schema:
            type: string
        - name: senderCode
          in: query
          description: "NH/KB chuyen (sender bank/treasury code)"
          schema:
            type: string
        - name: receiverCode
          in: query
          description: "NH/KB nhan (receiver bank/treasury code)"
          schema:
            type: string
        - name: fromDate
          in: query
          description: "Start date for date range filter (inclusive)"
          schema:
            type: string
            format: date
            example: "2026-05-11"
        - name: toDate
          in: query
          description: "End date for date range filter (inclusive). Max range 90 days."
          schema:
            type: string
            format: date
            example: "2026-05-18"
        - name: dateField
          in: query
          description: "Which date column to apply the date range filter on"
          schema:
            type: string
            enum: [CREATED_DATE, PAYMENT_DATE, CHECKED_DATE, APPROVED_DATE]
            default: CREATED_DATE
        - name: amountFrom
          in: query
          description: "Minimum amount filter (inclusive)"
          schema:
            type: number
            format: double
            minimum: 0
        - name: amountTo
          in: query
          description: "Maximum amount filter (inclusive). Must be >= amountFrom."
          schema:
            type: number
            format: double
            minimum: 0
        - name: currencyCode
          in: query
          description: "Currency code (VND, USD, etc.)"
          schema:
            type: string
            default: VND
        - name: createdBy
          in: query
          description: "Username of the maker who created the LTT"
          schema:
            type: string
        - name: page
          in: query
          description: "Page number (zero-based)"
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          description: "Page size"
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: sort
          in: query
          description: "Sort criteria in format: field,direction (e.g. CREATED_DATE,DESC). Repeat for multi-sort."
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
            default: ["CREATED_DATE,DESC"]
      responses:
        "200":
          description: Paginated list of LTT summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LttPageResponse"
              example:
                status: SUCCESS
                data:
                  content:
                    - fId: "LTT-2026-000001"
                      refNo: "YCTT-001234"
                      channel: LIEN_NGAN_HANG
                      transactionType: "LENH_THONG_THUONG"
                      lnhTransactionType: "GT_CAO_CO"
                      createdBy: "nguyenvt"
                      createdDate: "2026-05-18T09:30:00"
                      paymentDate: "2026-05-18"
                      senderCode: "01001"
                      senderName: "KBNN Ha Noi"
                      receiverCode: "02001"
                      receiverName: "KBNN TP HCM"
                      amount: 1500000000.00
                      currencyCode: VND
                      description: "Thanh toan hop dong so HD-2026-001"
                      fStatus: DRAFT
                      checkedBy: null
                      approvedBy: null
                      fVer: 1
                  totalElements: 1
                  totalPages: 1
                  page: 0
                  size: 20
                timestamp: "2026-05-18T09:35:00"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

    # -------------------------------------------------------------------------
    # POST /api/v1/ltt - Create new LTT (Draft)
    # -------------------------------------------------------------------------
    post:
      operationId: createLtt
      summary: Create a new Lenh Thanh Toan (Draft)
      description: >
        Creates a new payment order in DRAFT status with F_VER=1.
        The system auto-assigns F_ID, CREATED_BY, CREATED_DATE.
        Supports idempotency via X-Request-ID header.
      tags: [LTT CRUD]
      parameters:
        - name: X-Request-ID
          in: header
          description: >
            Idempotency key. If a previous request with the same key succeeded,
            the system returns the previous response without re-processing.
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLttRequest"
      responses:
        "201":
          description: LTT created successfully in DRAFT status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LttDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Duplicate X-Request-ID (idempotency conflict)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: ERROR
                code: "ERR-DUPLICATE-REQUEST"
                message: "A request with this X-Request-ID has already been processed."
                traceId: "abc123def456"
                timestamp: "2026-05-18T09:30:00"
        "500":
          $ref: "#/components/responses/InternalError"

  # ---------------------------------------------------------------------------
  # GET /api/v1/ltt/{id} - Get LTT detail
  # ---------------------------------------------------------------------------
  /api/v1/ltt/{id}:
    get:
      operationId: getLtt
      summary: Get LTT detail by F_ID
      description: >
        Returns the full payment order including header fields, detail lines (COA segments),
        sender info, receiver info, and attachment metadata.
      tags: [LTT CRUD]
      parameters:
        - $ref: "#/components/parameters/LttIdPath"
      responses:
        "200":
          description: Full LTT detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LttDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    # -------------------------------------------------------------------------
    # PUT /api/v1/ltt/{id} - Update LTT
    # -------------------------------------------------------------------------
    put:
      operationId: updateLtt
      summary: Update an existing LTT
      description: >
        Updates a payment order that is in DRAFT or RETURNED_TO_MAKER status.
        Only the original Maker may update. Uses optimistic locking via fVer field.
        On success, fVer increments by 1.
      tags: [LTT CRUD]
      parameters:
        - $ref: "#/components/parameters/LttIdPath"
        - name: X-Request-ID
          in: header
          description: Idempotency key for the update operation
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLttRequest"
      responses:
        "200":
          description: LTT updated successfully. fVer incremented.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LttDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >
            Optimistic lock conflict (fVer mismatch) or LTT is not in an editable status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: ERROR
                code: "ERR-OPTIMISTIC-LOCK"
                message: "Ban ghi da bi thay doi tu phien khac. Vui long tai lai truoc khi tiep tuc."
                traceId: "abc123def456"
                timestamp: "2026-05-18T10:00:00"
        "500":
          $ref: "#/components/responses/InternalError"

    # -------------------------------------------------------------------------
    # DELETE /api/v1/ltt/{id} - Soft-delete LTT
    # -------------------------------------------------------------------------
    delete:
      operationId: deleteLtt
      summary: Soft-delete an LTT
      description: >
        Marks a payment order as DELETED (soft-delete). Only allowed for DRAFT or
        RETURNED_TO_MAKER status, and only by the original Maker.
        Requires a reason (min 10 chars) and confirmation that the record has been reviewed.
      tags: [LTT CRUD]
      parameters:
        - $ref: "#/components/parameters/LttIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteLttRequest"
      responses:
        "200":
          description: LTT soft-deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
              example:
                status: SUCCESS
                data:
                  fId: "LTT-2026-000001"
                  fStatus: DELETED
                  deletedBy: "nguyenvt"
                  deletedDate: "2026-05-18T10:30:00"
                timestamp: "2026-05-18T10:30:00"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: LTT is not in a deletable status (not DRAFT/RETURNED_TO_MAKER)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: ERROR
                code: "ERR-STATUS"
                message: "Giao dich dang o trang thai [READY_FOR_APPROVAL], khong cho phep Xoa."
                traceId: "abc123def456"
                timestamp: "2026-05-18T10:30:00"
        "500":
          $ref: "#/components/responses/InternalError"

  # ---------------------------------------------------------------------------
  # POST /api/v1/ltt/{id}/submit - Submit for approval
  # ---------------------------------------------------------------------------
  /api/v1/ltt/{id}/submit:
    post:
      operationId: submitLtt
      summary: Submit LTT for Checker review
      description: >
        Transitions LTT from DRAFT or RETURNED_TO_MAKER to READY_FOR_APPROVAL.
        Runs full validation before submission. Sends notification to Checker.
        Only the original Maker can submit.
      tags: [LTT Workflow]
      parameters:
        - $ref: "#/components/parameters/LttIdPath"
        - name: X-Request-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: LTT submitted successfully. Status is now READY_FOR_APPROVAL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LttDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: LTT not in submittable status or validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  # ---------------------------------------------------------------------------
  # POST /api/v1/ltt/{id}/check - Checker approves/returns/rejects
  # ---------------------------------------------------------------------------
  /api/v1/ltt/{id}/check:
    post:
      operationId: checkLtt
      summary: Checker reviews LTT
      description: >
        Checker decision on a payment order in READY_FOR_APPROVAL status.
        - APPROVE: transitions to PENDING_APPROVER, notifies Approver.
        - RETURN: transitions to RETURNED_TO_MAKER, notifies Maker. Reason required (min 10 chars).
        - REJECT: transitions to REJECTED, locks the order. Reason required (min 10 chars).
        Enforces SoD: Checker must not be the same user as Maker.
      tags: [LTT Workflow]
      parameters:
        - $ref: "#/components/parameters/LttIdPath"
        - name: X-Request-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckLttRequest"
      responses:
        "200":
          description: Checker action processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LttDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: LTT not in READY_FOR_APPROVAL status, or SoD violation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  # ---------------------------------------------------------------------------
  # POST /api/v1/ltt/{id}/approve - Approver final decision
  # ---------------------------------------------------------------------------
  /api/v1/ltt/{id}/approve:
    post:
      operationId: approveLtt
      summary: Approver final decision on LTT
      description: >
        Approver decision on a payment order in PENDING_APPROVER status.
        - APPROVE: transitions to APPROVED, triggers downstream workflow.
        - RETURN: transitions to RETURNED_TO_MAKER, notifies Maker. Reason required.
        - REJECT: transitions to REJECTED, locks the order. Reason required.
        Enforces SoD: Approver must not be the same as Maker or Checker.
        Requires authentication via OTP or digital signature.
      tags: [LTT Workflow]
      parameters:
        - $ref: "#/components/parameters/LttIdPath"
        - name: X-Request-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveLttRequest"
      responses:
        "200":
          description: Approver action processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LttDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: LTT not in PENDING_APPROVER status, SoD violation, or auth failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  # ---------------------------------------------------------------------------
  # POST /api/v1/ltt/{id}/copy - Copy LTT to new draft
  # ---------------------------------------------------------------------------
  /api/v1/ltt/{id}/copy:
    post:
      operationId: copyLtt
      summary: Copy an existing LTT to a new Draft
      description: >
        Creates a new payment order by copying data from an existing one.
        The new LTT gets a new F_ID, F_VER=1, F_STATUS=DRAFT.
        REF_NO must be updated by the Maker before submission.
        Certain fields (CREATED_BY, CREATED_DATE, audit info) are reset.
      tags: [LTT CRUD]
      parameters:
        - $ref: "#/components/parameters/LttIdPath"
        - name: X-Request-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: New LTT draft created from copy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LttDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ---------------------------------------------------------------------------
  # GET /api/v1/ltt/{id}/audit - Get audit history
  # ---------------------------------------------------------------------------
  /api/v1/ltt/{id}/audit:
    get:
      operationId: getLttAudit
      summary: Get audit history for an LTT
      description: >
        Returns paginated audit log entries for a payment order, showing
        who changed what, when, with the diff of field-level changes.
        Sorted by ACTION_DATE DESC by default.
      tags: [LTT Audit]
      parameters:
        - $ref: "#/components/parameters/LttIdPath"
        - name: action
          in: query
          description: "Filter by action type (repeat for multi-select)"
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: fromDate
          in: query
          schema:
            type: string
            format: date-time
        - name: toDate
          in: query
          schema:
            type: string
            format: date-time
        - name: actorRole
          in: query
          description: "Filter by actor role: MAKER, CHECKER, APPROVER, SYSTEM"
          schema:
            type: string
            enum: [MAKER, CHECKER, APPROVER, SYSTEM]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated audit history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditPageResponse"
              example:
                status: SUCCESS
                data:
                  content:
                    - seqNo: 1
                      actionDate: "2026-05-18T09:30:00"
                      actor: "nguyenvt (Nguyen Van T - Maker)"
                      actorRole: MAKER
                      action: "LTT.NEW.SAVE"
                      statusFrom: null
                      statusTo: DRAFT
                      fVer: 1
                      note: null
                      clientIp: "192.168.1.100"
                      hostName: "WS-PC-001"
                      channel: WEB
                      diff:
                        - field: "AMOUNT"
                          oldValue: null
                          newValue: "1500000000.00"
                        - field: "CURRENCY_CODE"
                          oldValue: null
                          newValue: "VND"
                  totalElements: 1
                  totalPages: 1
                  page: 0
                  size: 20
                timestamp: "2026-05-18T10:00:00"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ---------------------------------------------------------------------------
  # POST /api/v1/ltt/{id}/attachments - Upload attachment
  # ---------------------------------------------------------------------------
  /api/v1/ltt/{id}/attachments:
    post:
      operationId: uploadAttachment
      summary: Upload a file attachment to an LTT
      description: >
        Uploads a file attachment. Constraints: max 10MB per file,
        accepted formats: pdf, jpg, png, docx, xlsx.
        MIME type and magic bytes are validated server-side.
        Total attachments per LTT must not exceed 50MB.
        Only allowed in DRAFT or RETURNED_TO_MAKER status by the original Maker.
      tags: [LTT Attachments]
      parameters:
        - $ref: "#/components/parameters/LttIdPath"
        - name: X-Request-ID
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadAttachmentRequest"
      responses:
        "201":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentResponse"
              example:
                status: SUCCESS
                data:
                  attachId: "ATT-2026-000001"
                  fId: "LTT-2026-000001"
                  fileName: "hop_dong_2026.pdf"
                  docType: "HOP_DONG"
                  note: "Hop dong nguyen thac"
                  fileSize: 2048576
                  fileHash: "a1b2c3d4e5f6..."
                  attachStatus: ACTIVE
                  uploadedBy: "nguyenvt"
                  uploadedDate: "2026-05-18T11:00:00"
                timestamp: "2026-05-18T11:00:00"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: File exceeds 10MB limit or total attachments exceed 50MB
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: ERROR
                code: "ERR-FILE-SIZE"
                message: "File vuot gioi han 10MB."
                traceId: "abc123def456"
                timestamp: "2026-05-18T11:00:00"
        "500":
          $ref: "#/components/responses/InternalError"

  # ---------------------------------------------------------------------------
  # DELETE /api/v1/ltt/{id}/attachments/{attachId} - Delete attachment
  # ---------------------------------------------------------------------------
  /api/v1/ltt/{id}/attachments/{attachId}:
    delete:
      operationId: deleteAttachment
      summary: Soft-delete an attachment
      description: >
        Marks an attachment as DELETED (soft-delete). Only the original Maker
        can delete attachments, and only when the LTT is in DRAFT or RETURNED_TO_MAKER.
      tags: [LTT Attachments]
      parameters:
        - $ref: "#/components/parameters/LttIdPath"
        - name: attachId
          in: path
          required: true
          description: "Attachment ID"
          schema:
            type: string
      responses:
        "200":
          description: Attachment deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
              example:
                status: SUCCESS
                data:
                  attachId: "ATT-2026-000001"
                  attachStatus: DELETED
                timestamp: "2026-05-18T11:30:00"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: LTT not in editable status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  # ---------------------------------------------------------------------------
  # GET /api/v1/ltt/{id}/attachments/{attachId}/download - Download attachment
  # ---------------------------------------------------------------------------
  /api/v1/ltt/{id}/attachments/{attachId}/download:
    get:
      operationId: downloadAttachment
      summary: Download an attachment file
      description: >
        Returns the binary content of an attachment. Sets Content-Disposition header
        for browser download. Validates that the attachment is in ACTIVE status.
      tags: [LTT Attachments]
      parameters:
        - $ref: "#/components/parameters/LttIdPath"
        - name: attachId
          in: path
          required: true
          description: "Attachment ID"
          schema:
            type: string
      responses:
        "200":
          description: File binary content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

# =============================================================================
# COMPONENTS
# =============================================================================
components:
  # ---------------------------------------------------------------------------
  # Security Schemes
  # ---------------------------------------------------------------------------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT token obtained from the authentication endpoint.
        Token contains claims: sub (username), roles (MAKER/CHECKER/APPROVER), org (bank code).

  # ---------------------------------------------------------------------------
  # Reusable Parameters
  # ---------------------------------------------------------------------------
  parameters:
    LttIdPath:
      name: id
      in: path
      required: true
      description: "Unique identifier of the Lenh Thanh Toan (F_ID)"
      schema:
        type: string
        example: "LTT-2026-000001"

  # ---------------------------------------------------------------------------
  # Reusable Responses
  # ---------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Invalid request data or validation failure
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            status: ERROR
            code: "ERR-VALIDATION"
            message: "Vui long nhap [So YCTT]."
            traceId: "abc123def456"
            timestamp: "2026-05-18T09:30:00"

    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            status: ERROR
            code: "ERR-AUTH"
            message: "Phien dang nhap da het han, vui long dang nhap lai."
            traceId: "abc123def456"
            timestamp: "2026-05-18T09:30:00"

    Forbidden:
      description: User lacks the required role or violates SoD
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            status: ERROR
            code: "ERR-PERMISSION"
            message: "Ban khong co quyen thuc hien thao tac nay."
            traceId: "abc123def456"
            timestamp: "2026-05-18T09:30:00"

    NotFound:
      description: LTT or referenced resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            status: ERROR
            code: "ERR-NOT-FOUND"
            message: "Khong tim thay ban ghi."
            traceId: "abc123def456"
            timestamp: "2026-05-18T09:30:00"

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            status: ERROR
            code: "ERR-SYSTEM"
            message: "Loi he thong, traceId: abc123def456. Vui long thu lai hoac lien he Quan tri."
            traceId: "abc123def456"
            timestamp: "2026-05-18T09:30:00"

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:
    # =========================================================================
    # Generic Wrappers
    # =========================================================================
    ApiResponse:
      type: object
      description: Generic API response wrapper
      properties:
        status:
          type: string
          enum: [SUCCESS, ERROR]
          description: "Overall response status"
        data:
          description: "Response payload (type varies by endpoint)"
        timestamp:
          type: string
          format: date-time
      required: [status, timestamp]

    PageMetadata:
      type: object
      description: Pagination metadata
      properties:
        totalElements:
          type: integer
          format: int64
          description: "Total number of records matching the filter"
          example: 150
        totalPages:
          type: integer
          description: "Total number of pages"
          example: 8
        page:
          type: integer
          description: "Current page number (zero-based)"
          example: 0
        size:
          type: integer
          description: "Page size"
          example: 20
      required: [totalElements, totalPages, page, size]

    ErrorResponse:
      type: object
      description: Standard error envelope
      properties:
        status:
          type: string
          enum: [ERROR]
        code:
          type: string
          description: "Machine-readable error code"
          example: "ERR-VALIDATION"
        message:
          type: string
          description: "Human-readable error message in Vietnamese"
          example: "Vui long nhap [So YCTT]."
        traceId:
          type: string
          description: "Distributed tracing ID for log correlation"
          example: "abc123def456"
        timestamp:
          type: string
          format: date-time
          example: "2026-05-18T09:30:00"
        fieldErrors:
          type: array
          description: "Per-field validation errors (present when code=ERR-VALIDATION)"
          items:
            type: object
            properties:
              field:
                type: string
                example: "refNo"
              message:
                type: string
                example: "Vui long nhap So YCTT."
              rejectedValue:
                description: "The rejected value, if any"
      required: [status, code, message, traceId, timestamp]

    # =========================================================================
    # LTT Summary (used in list responses)
    # =========================================================================
    LttSummary:
      type: object
      description: Payment order summary for list views
      properties:
        fId:
          type: string
          description: "Unique identifier of the payment order"
          example: "LTT-2026-000001"
        refNo:
          type: string
          description: "So YCTT / So but toan"
          example: "YCTT-001234"
        channel:
          type: string
          description: "Payment channel"
          enum: [LIEN_NGAN_HANG, THANH_TOAN_SONG_PHUONG]
          example: "LIEN_NGAN_HANG"
        transactionType:
          type: string
          description: "Order type (dynamic based on channel)"
          example: "LENH_THONG_THUONG"
        lnhTransactionType:
          type: string
          description: "LNH transaction type (only when channel = LIEN_NGAN_HANG)"
          enum: [GT_CAO_CO, GT_CAO_NO, GT_THAP_CO, GT_THAP_NO]
          example: "GT_CAO_CO"
        createdBy:
          type: string
          description: "Username of the maker"
          example: "nguyenvt"
        createdDate:
          type: string
          format: date-time
          description: "Creation timestamp"
          example: "2026-05-18T09:30:00"
        paymentDate:
          type: string
          format: date
          description: "Ngay thanh toan"
          example: "2026-05-18"
        senderCode:
          type: string
          description: "NH/KB chuyen (sender code)"
          example: "01001"
        senderName:
          type: string
          description: "Ten NH/KB chuyen"
          example: "KBNN Ha Noi"
        receiverCode:
          type: string
          description: "NH/KB nhan (receiver code)"
          example: "02001"
        receiverName:
          type: string
          description: "Ten NH/KB nhan"
          example: "KBNN TP HCM"
        amount:
          type: number
          format: double
          description: "So tien chuyen (total amount)"
          example: 1500000000.00
        currencyCode:
          type: string
          description: "Currency code"
          example: "VND"
        description:
          type: string
          description: "Noi dung thanh toan (truncated to 60 chars in list)"
          example: "Thanh toan hop dong so HD-2026-001"
        fStatus:
          type: string
          description: "Current status of the payment order"
          enum:
            - DRAFT
            - READY_FOR_APPROVAL
            - PENDING_APPROVER
            - APPROVED
            - TRANSFERRED_TO_GL
            - POSTED
            - RETURNED_TO_MAKER
            - REJECTED
            - DELETED
          example: "DRAFT"
        checkedBy:
          type: string
          description: "Username of the checker (null if not yet checked)"
          example: null
        approvedBy:
          type: string
          description: "Username of the approver (null if not yet approved)"
          example: null
        fVer:
          type: integer
          description: "Record version for optimistic locking"
          example: 1
      required: [fId, refNo, channel, transactionType, createdBy, createdDate, paymentDate, senderCode, receiverCode, amount, currencyCode, fStatus, fVer]

    # =========================================================================
    # LTT Detail (full record for GET by ID)
    # =========================================================================
    LttDetail:
      type: object
      description: Full payment order with all related data
      properties:
        fId:
          type: string
          example: "LTT-2026-000001"
        refNo:
          type: string
          description: "So YCTT / So but toan"
          example: "YCTT-001234"
        channel:
          type: string
          enum: [LIEN_NGAN_HANG, THANH_TOAN_SONG_PHUONG]
          example: "LIEN_NGAN_HANG"
        transactionType:
          type: string
          example: "LENH_THONG_THUONG"
        lnhTransactionType:
          type: string
          description: "Only applicable when channel = LIEN_NGAN_HANG"
          enum: [GT_CAO_CO, GT_CAO_NO, GT_THAP_CO, GT_THAP_NO]
          example: "GT_CAO_CO"
        paymentDate:
          type: string
          format: date
          example: "2026-05-18"
        amount:
          type: number
          format: double
          example: 1500000000.00
        currencyCode:
          type: string
          example: "VND"
        exchangeRate:
          type: number
          format: double
          description: "Ty gia (required only for foreign currency)"
          example: null
        orginNum:
          type: string
          description: "So chung tu goc (required when channel = TTSP)"
          example: null
        transactionDate:
          type: string
          format: date
          description: "Ngay chung tu (required when channel = TTSP)"
          example: null
        expType:
          type: string
          description: "Loai phi (required when transactionType = TT ngoai te khac)"
          example: null
        fnCode1:
          type: string
          description: "Ma ngoai te trich no (required when transactionType = TT ngoai te khac)"
          example: null
        fnCode2:
          type: string
          description: "Ma ngoai te TT (required when transactionType = TT ngoai te khac)"
          example: null
        fnAmount:
          type: number
          format: double
          description: "So tien ngoai te TT (required when transactionType = TT ngoai te khac)"
          example: null
        description:
          type: string
          description: "Noi dung thanh toan"
          example: "Thanh toan hop dong so HD-2026-001"
        fStatus:
          type: string
          enum:
            - DRAFT
            - READY_FOR_APPROVAL
            - PENDING_APPROVER
            - APPROVED
            - TRANSFERRED_TO_GL
            - POSTED
            - RETURNED_TO_MAKER
            - REJECTED
            - DELETED
          example: "DRAFT"
        fVer:
          type: integer
          description: "Version for optimistic locking"
          example: 1
        createdBy:
          type: string
          example: "nguyenvt"
        createdDate:
          type: string
          format: date-time
          example: "2026-05-18T09:30:00"
        lastUpdatedBy:
          type: string
          description: "Username of the last user who modified this record"
          example: null
        lastUpdatedDate:
          type: string
          format: date-time
          example: null
        checkedBy:
          type: string
          example: null
        checkedDate:
          type: string
          format: date-time
          example: null
        approvedBy:
          type: string
          example: null
        approvedDate:
          type: string
          format: date-time
          example: null
        deletedBy:
          type: string
          example: null
        deletedDate:
          type: string
          format: date-time
          example: null
        deleteReason:
          type: string
          example: null
        details:
          type: array
          description: "Detail lines (COA segments / khoan muc)"
          items:
            $ref: "#/components/schemas/LttDetailLine"
        sender:
          $ref: "#/components/schemas/LttSender"
        receiver:
          $ref: "#/components/schemas/LttReceiver"
        attachments:
          type: array
          description: "List of attachments (metadata only, no binary)"
          items:
            $ref: "#/components/schemas/AttachmentInfo"
      required: [fId, refNo, channel, transactionType, paymentDate, amount, currencyCode, description, fStatus, fVer, createdBy, createdDate, details, sender, receiver]

    # =========================================================================
    # LTT Detail Line (COA segments)
    # =========================================================================
    LttDetailLine:
      type: object
      description: "One line of payment detail with COA segments"
      properties:
        lineNo:
          type: integer
          description: "Auto-incremented line number"
          example: 1
        glSegment1:
          type: string
          description: "Ma quy (2 chars)"
          maxLength: 2
          example: "01"
        glSegment2:
          type: string
          description: "TK tu nhien (4 chars) - Natural account"
          maxLength: 4
          example: "1121"
        glSegment3:
          type: string
          description: "DVQHNS (7 chars) - Budget relationship unit"
          maxLength: 7
          example: "1010101"
        glSegment4:
          type: string
          description: "Cap NS - Budget level"
          example: null
        glSegment5:
          type: string
          description: "Chuong (3 chars) - Chapter"
          maxLength: 3
          example: "000"
        glSegment6:
          type: string
          description: "Nganh KT (3 chars) - Economic sector"
          maxLength: 3
          example: "000"
        glSegment7:
          type: string
          description: "NDKT (4 chars) - Economic content"
          maxLength: 4
          example: "0000"
        glSegment8:
          type: string
          description: "DB (5 chars) - Area code"
          maxLength: 5
          example: "00000"
        glSegment9:
          type: string
          description: "CTMT (5 chars) - Target program"
          maxLength: 5
          example: "00000"
        glSegment10:
          type: string
          description: "MN (2 chars) - Funding source"
          maxLength: 2
          example: "00"
        glSegment11:
          type: string
          description: "Kho bac (4 chars) - Treasury code"
          maxLength: 4
          example: "0000"
        glSegment12:
          type: string
          description: "DP (2 chars) - Reserve code"
          maxLength: 2
          example: "00"
        lineDescription:
          type: string
          description: "Dien giai dong chi tiet"
          example: "Thanh toan theo hop dong HD-2026-001"
        lineAmount:
          type: number
          format: double
          description: "So tien cua dong (sum of all lines must equal header amount)"
          example: 1500000000.00
      required: [lineNo, glSegment2, glSegment3, lineDescription, lineAmount]

    # =========================================================================
    # Sender
    # =========================================================================
    LttSender:
      type: object
      description: "Thong tin nguoi chuyen (Sender information)"
      properties:
        senderName:
          type: string
          description: "Ten nguoi chuyen"
          example: "KBNN Ha Noi"
        senderAddress:
          type: string
          example: "So 1, Pho Nguyen Thai Hoc, Ha Noi"
        senderGlSegment2:
          type: string
          description: "Tai khoan nguoi chuyen (Natural account)"
          example: "1121"
        senderNum:
          type: string
          description: "Ma KH"
          example: null
        senderBankCode:
          type: string
          description: "Mo tai NH/KB (auto from user's bank)"
          example: "01001"
        senderIdentifyId:
          type: string
          description: "CMND/CCCD/HC/Ma DN"
          example: null
        senderIssuedDate:
          type: string
          format: date
          example: null
        senderIssuedPlace:
          type: string
          example: null
        tpcpCode:
          type: string
          description: "Ma TPCP (required when transactionType = Lenh trai phieu chinh phu)"
          example: null
      required: [senderName, senderAddress, senderGlSegment2, senderBankCode]

    # =========================================================================
    # Receiver
    # =========================================================================
    LttReceiver:
      type: object
      description: "Thong tin nguoi nhan (Receiver information)"
      properties:
        receiverName:
          type: string
          example: "KBNN TP HCM"
        receiverAddress:
          type: string
          example: "So 2, Pho Ham Nghi, TP HCM"
        receiverGlSegment2:
          type: string
          description: "Tai khoan nguoi nhan (Natural account)"
          example: "1131"
        receiverBankName:
          type: string
          description: "Mo tai NH/KB"
          example: "KBNN TP HCM"
        receiverBankCode:
          type: string
          description: "Ten tai khoan"
          example: "02001"
        receiverIdentifyId:
          type: string
          description: "CMND/CCCD/HC/Ma DN"
          example: null
        receiverIssuedDate:
          type: string
          format: date
          example: null
        receiverIssuedPlace:
          type: string
          example: null
      required: [receiverName, receiverGlSegment2, receiverBankName, receiverBankCode]

    # =========================================================================
    # Attachment schemas
    # =========================================================================
    AttachmentInfo:
      type: object
      description: "Attachment metadata (no binary content)"
      properties:
        attachId:
          type: string
          example: "ATT-2026-000001"
        fileName:
          type: string
          example: "hop_dong_2026.pdf"
        docType:
          type: string
          description: "Loai tai lieu"
          enum: [CHUNG_TU_GOC, HOP_DONG, HOA_DON, BANG_KE, VAN_BAN_KHAC]
          example: "HOP_DONG"
        note:
          type: string
          example: "Hop dong nguyen thac"
        fileSize:
          type: integer
          format: int64
          description: "File size in bytes"
          example: 2048576
        fileHash:
          type: string
          description: "SHA-256 hash for integrity"
          example: "a1b2c3d4e5f6..."
        attachStatus:
          type: string
          enum: [ACTIVE, DELETED]
          example: "ACTIVE"
        uploadedBy:
          type: string
          example: "nguyenvt"
        uploadedDate:
          type: string
          format: date-time
          example: "2026-05-18T11:00:00"
      required: [attachId, fileName, docType, fileSize, fileHash, attachStatus, uploadedBy, uploadedDate]

    UploadAttachmentRequest:
      type: object
      description: "Multipart form for uploading an attachment"
      properties:
        file:
          type: string
          format: binary
          description: "File binary (max 10MB, formats: pdf/jpg/png/docx/xlsx)"
        docType:
          type: string
          description: "Document type"
          enum: [CHUNG_TU_GOC, HOP_DONG, HOA_DON, BANG_KE, VAN_BAN_KHAC]
          example: "HOP_DONG"
        note:
          type: string
          description: "Optional description (max 250 chars)"
          maxLength: 250
          example: "Hop dong nguyen thac"
      required: [file, docType]

    AttachmentResponse:
      allOf:
        - type: object
          properties:
            status:
              type: string
              enum: [SUCCESS]
            data:
              $ref: "#/components/schemas/AttachmentInfo"
            timestamp:
              type: string
              format: date-time
          required: [status, data, timestamp]

    # =========================================================================
    # Audit schemas
    # =========================================================================
    AuditEntry:
      type: object
      description: "Single audit log entry with field-level diff"
      properties:
        seqNo:
          type: integer
          example: 1
        actionDate:
          type: string
          format: date-time
          example: "2026-05-18T09:30:00"
        actor:
          type: string
          description: "Username + Full name + Role"
          example: "nguyenvt (Nguyen Van T - Maker)"
        actorRole:
          type: string
          enum: [MAKER, CHECKER, APPROVER, SYSTEM]
          example: "MAKER"
        action:
          type: string
          description: "Event ID matching the state machine events"
          example: "LTT.NEW.SAVE"
        statusFrom:
          type: string
          description: "Previous status (null for creation)"
          example: null
        statusTo:
          type: string
          description: "New status after action"
          example: "DRAFT"
        fVer:
          type: integer
          example: 1
        note:
          type: string
          description: "Ly do / Ghi chu"
          example: null
        clientIp:
          type: string
          example: "192.168.1.100"
        hostName:
          type: string
          example: "WS-PC-001"
        channel:
          type: string
          description: "Channel where the action was performed"
          enum: [WEB, API, MOBILE]
          example: "WEB"
        diff:
          type: array
          description: "Field-level change diff"
          items:
            $ref: "#/components/schemas/AuditDiffEntry"
      required: [seqNo, actionDate, actor, actorRole, action, statusTo, fVer]

    AuditDiffEntry:
      type: object
      description: "Single field-level diff entry"
      properties:
        field:
          type: string
          example: "AMOUNT"
        oldValue:
          type: string
          description: "Previous value (null for new fields)"
          example: null
        newValue:
          type: string
          description: "New value (null for deleted fields)"
          example: "1500000000.00"
      required: [field, newValue]

    # =========================================================================
    # Request schemas
    # =========================================================================
    CreateLttRequest:
      type: object
      description: "Request to create a new payment order (Draft)"
      properties:
        channel:
          type: string
          enum: [LIEN_NGAN_HANG, THANH_TOAN_SONG_PHUONG]
          description: "Payment channel"
          example: "LIEN_NGAN_HANG"
        transactionType:
          type: string
          description: "Order type (depends on channel)"
          example: "LENH_THONG_THUONG"
        refNo:
          type: string
          description: "So YCTT / So but toan"
          maxLength: 50
          example: "YCTT-001234"
        paymentDate:
          type: string
          format: date
          description: "Ngay thanh toan (defaults to current date)"
          example: "2026-05-18"
        amount:
          type: number
          format: double
          description: "So tien chuyen (must equal sum of detail lines)"
          example: 1500000000.00
          minimum: 0
        currencyCode:
          type: string
          description: "Currency code"
          default: "VND"
          example: "VND"
        exchangeRate:
          type: number
          format: double
          description: "Ty gia (required only for foreign currency)"
          example: null
        lnhTransactionType:
          type: string
          description: "LNH transaction type (only when channel = LIEN_NGAN_HANG)"
          enum: [GT_CAO_CO, GT_CAO_NO, GT_THAP_CO, GT_THAP_NO]
          example: "GT_CAO_CO"
        orginNum:
          type: string
          description: "So chung tu goc (required when channel = TTSP)"
          example: null
        transactionDate:
          type: string
          format: date
          description: "Ngay chung tu (required when channel = TTSP)"
          example: null
        expType:
          type: string
          description: "Loai phi (required when transactionType = TT ngoai te khac)"
          example: null
        fnCode1:
          type: string
          description: "Ma ngoai te trich no"
          example: null
        fnCode2:
          type: string
          description: "Ma ngoai te TT"
          example: null
        fnAmount:
          type: number
          format: double
          description: "So tien ngoai te TT"
          example: null
        description:
          type: string
          description: "Noi dung thanh toan"
          example: "Thanh toan hop dong so HD-2026-001"
        details:
          type: array
          description: "Detail lines with COA segments"
          minItems: 1
          items:
            $ref: "#/components/schemas/LttDetailLineRequest"
        sender:
          $ref: "#/components/schemas/LttSenderRequest"
        receiver:
          $ref: "#/components/schemas/LttReceiverRequest"
        attachments:
          type: array
          description: "Attachment metadata (files uploaded separately via multipart endpoint)"
          items:
            type: object
            properties:
              docType:
                type: string
                enum: [CHUNG_TU_GOC, HOP_DONG, HOA_DON, BANG_KE, VAN_BAN_KHAC]
              note:
                type: string
                maxLength: 250
      required: [channel, transactionType, refNo, amount, currencyCode, description, details, sender, receiver]

    LttDetailLineRequest:
      type: object
      description: "Detail line input for create/update requests"
      properties:
        glSegment1:
          type: string
          maxLength: 2
          default: "01"
          example: "01"
        glSegment2:
          type: string
          maxLength: 4
          example: "1121"
        glSegment3:
          type: string
          maxLength: 7
          example: "1010101"
        glSegment4:
          type: string
          example: null
        glSegment5:
          type: string
          maxLength: 3
          default: "000"
          example: "000"
        glSegment6:
          type: string
          maxLength: 3
          default: "000"
          example: "000"
        glSegment7:
          type: string
          maxLength: 4
          default: "0000"
          example: "0000"
        glSegment8:
          type: string
          maxLength: 5
          default: "00000"
          example: "00000"
        glSegment9:
          type: string
          maxLength: 5
          default: "00000"
          example: "00000"
        glSegment10:
          type: string
          maxLength: 2
          default: "00"
          example: "00"
        glSegment11:
          type: string
          maxLength: 4
          default: "0000"
          example: "0000"
        glSegment12:
          type: string
          maxLength: 2
          default: "00"
          example: "00"
        lineDescription:
          type: string
          example: "Thanh toan theo hop dong HD-2026-001"
        lineAmount:
          type: number
          format: double
          example: 1500000000.00
          minimum: 0
      required: [glSegment2, glSegment3, lineDescription, lineAmount]

    LttSenderRequest:
      type: object
      properties:
        senderName:
          type: string
          example: "KBNN Ha Noi"
        senderAddress:
          type: string
          example: "So 1, Pho Nguyen Thai Hoc, Ha Noi"
        senderGlSegment2:
          type: string
          example: "1121"
        senderNum:
          type: string
          example: null
        senderBankCode:
          type: string
          example: "01001"
        senderIdentifyId:
          type: string
          example: null
        senderIssuedDate:
          type: string
          format: date
          example: null
        senderIssuedPlace:
          type: string
          example: null
        tpcpCode:
          type: string
          description: "Ma TPCP (required when transactionType = Lenh trai phieu chinh phu)"
          example: null
      required: [senderName, senderAddress, senderGlSegment2, senderBankCode]

    LttReceiverRequest:
      type: object
      properties:
        receiverName:
          type: string
          example: "KBNN TP HCM"
        receiverAddress:
          type: string
          example: "So 2, Pho Ham Nghi, TP HCM"
        receiverGlSegment2:
          type: string
          example: "1131"
        receiverBankName:
          type: string
          example: "KBNN TP HCM"
        receiverBankCode:
          type: string
          example: "02001"
        receiverIdentifyId:
          type: string
          example: null
        receiverIssuedDate:
          type: string
          format: date
          example: null
        receiverIssuedPlace:
          type: string
          example: null
      required: [receiverName, receiverGlSegment2, receiverBankName, receiverBankCode]

    UpdateLttRequest:
      type: object
      description: >
        Request to update an existing payment order.
        Includes fVer for optimistic locking. Server rejects if fVer does not match current DB value.
        Only allowed when fStatus is DRAFT or RETURNED_TO_MAKER.
      properties:
        fVer:
          type: integer
          description: "Current version for optimistic lock check"
          example: 1
        channel:
          type: string
          enum: [LIEN_NGAN_HANG, THANH_TOAN_SONG_PHUONG]
          example: "LIEN_NGAN_HANG"
        transactionType:
          type: string
          example: "LENH_THONG_THUONG"
        refNo:
          type: string
          maxLength: 50
          example: "YCTT-001234"
        paymentDate:
          type: string
          format: date
          example: "2026-05-18"
        amount:
          type: number
          format: double
          example: 1500000000.00
        currencyCode:
          type: string
          example: "VND"
        exchangeRate:
          type: number
          format: double
          example: null
        lnhTransactionType:
          type: string
          enum: [GT_CAO_CO, GT_CAO_NO, GT_THAP_CO, GT_THAP_NO]
          example: "GT_CAO_CO"
        orginNum:
          type: string
          example: null
        transactionDate:
          type: string
          format: date
          example: null
        expType:
          type: string
          example: null
        fnCode1:
          type: string
          example: null
        fnCode2:
          type: string
          example: null
        fnAmount:
          type: number
          format: double
          example: null
        description:
          type: string
          example: "Thanh toan hop dong so HD-2026-001 (updated)"
        details:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/LttDetailLineRequest"
        sender:
          $ref: "#/components/schemas/LttSenderRequest"
        receiver:
          $ref: "#/components/schemas/LttReceiverRequest"
      required: [fVer, channel, transactionType, refNo, amount, currencyCode, description, details, sender, receiver]

    DeleteLttRequest:
      type: object
      description: "Request to soft-delete a payment order"
      properties:
        reason:
          type: string
          description: "Ly do xoa (min 10 chars, max 500 chars)"
          minLength: 10
          maxLength: 500
          example: "Khach hang yeu cau huy lenh do sai thong tin nguoi nhan."
        confirmReviewed:
          type: boolean
          description: "Must be true to confirm deletion review"
          example: true
      required: [reason, confirmReviewed]

    CheckLttRequest:
      type: object
      description: "Checker review request for a payment order"
      properties:
        result:
          type: string
          enum: [APPROVE, RETURN, REJECT]
          description: >
            APPROVE: transitions to PENDING_APPROVER.
            RETURN: transitions to RETURNED_TO_Maker (note required, min 10 chars).
            REJECT: transitions to REJECTED (note required, min 10 chars).
          example: "APPROVE"
        note:
          type: string
          description: "Required when result is RETURN or REJECT (min 10 chars)"
          minLength: 10
          maxLength: 500
          example: null
        errorCode:
          type: string
          description: "Business error code from catalog (when returning/rejecting)"
          example: null
        checklist:
          type: array
          description: "Review checklist items that must all be ticked before approval"
          items:
            type: object
            properties:
              itemCode:
                type: string
                description: "Checklist item code"
                example: "CHK-COA-VALID"
              itemName:
                type: string
                description: "Checklist item description"
                example: "COA hop le"
              checked:
                type: boolean
                example: true
            required: [itemCode, checked]
      required: [result, checklist]

    ApproveLttRequest:
      type: object
      description: "Approver final decision request"
      properties:
        result:
          type: string
          enum: [APPROVE, RETURN, REJECT]
          description: >
            APPROVE: transitions to APPROVED.
            RETURN: transitions to RETURNED_TO_MAKER (note required).
            REJECT: transitions to REJECTED (note required).
          example: "APPROVE"
        note:
          type: string
          description: "Required when result is RETURN or REJECT (min 10 chars)"
          minLength: 10
          maxLength: 500
          example: null
        authMethod:
          type: string
          description: "Authentication method for approval"
          enum: [OTP, DIGITAL_SIGN]
          example: "OTP"
        otpCode:
          type: string
          description: "OTP code (required when authMethod = OTP). 6 digits, TTL 60s."
          minLength: 6
          maxLength: 6
          example: "123456"
      required: [result, authMethod]

    # =========================================================================
    # Typed Response Wrappers
    # =========================================================================
    LttDetailResponse:
      allOf:
        - type: object
          properties:
            status:
              type: string
              enum: [SUCCESS]
            data:
              $ref: "#/components/schemas/LttDetail"
            timestamp:
              type: string
              format: date-time
          required: [status, data, timestamp]

    LttPageResponse:
      allOf:
        - type: object
          properties:
            status:
              type: string
              enum: [SUCCESS]
            data:
              type: object
              allOf:
                - type: object
                  properties:
                    content:
                      type: array
                      items:
                        $ref: "#/components/schemas/LttSummary"
                - $ref: "#/components/schemas/PageMetadata"
              required: [content]
            timestamp:
              type: string
              format: date-time
          required: [status, data, timestamp]

    AuditPageResponse:
      allOf:
        - type: object
          properties:
            status:
              type: string
              enum: [SUCCESS]
            data:
              type: object
              allOf:
                - type: object
                  properties:
                    content:
                      type: array
                      items:
                        $ref: "#/components/schemas/AuditEntry"
                - $ref: "#/components/schemas/PageMetadata"
              required: [content]
            timestamp:
              type: string
              format: date-time
          required: [status, data, timestamp]
