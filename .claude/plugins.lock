# Lock file Claude Code plugin — đảm bảo team đồng nhất
# Cập nhật: chỉnh file này → mọi máy chạy `scripts/install-claude-plugins.sh` để sync.
# Verify: `scripts/verify-env.sh` check version sau khi cài.

schema_version: 1
project: mvp-kho-bac
last_updated: 2026-05-08

plugins:
  - id: mattpocock-skills
    name: "mattpocock/skills"
    source: npm
    install_command: "npx -y skills@latest add mattpocock/skills"
    pinned_version: "latest"   # đổi sang version cụ thể khi stable
    skills_enabled:
      - grill-with-docs
      - tdd
      - diagnose
      - to-prd
      - to-issues
      - zoom-out
    skills_disabled:
      - caveman          # quá compressed, không phù hợp domain VN
      - exercise         # không phù hợp dự án thật
    rationale: "Stage 1 BA discovery + alignment + structured debugging"

  - id: obra-superpowers
    name: "obra/superpowers"
    source: claude_marketplace
    marketplace_command: "/plugin marketplace add obra/superpowers"
    install_command: "/plugin install superpowers"
    pinned_version: "latest"
    skills_enabled:
      - brainstorming
      - writing-plans
      - subagent-driven-development
      - using-git-worktrees
      - dispatching-parallel-agents
      - requesting-code-review
      - verification-before-completion
    skills_disabled:
      - test-driven-development   # trùng với mattpocock/tdd, dùng mattpocock thôi
    rationale: "Stage 3-5 dev loop + parallel work qua worktree"

  - id: wshobson-agents
    name: "wshobson/agents"
    source: claude_marketplace
    marketplace_command: "/plugin marketplace add wshobson/agents"
    pinned_version: "latest"
    cherry_pick_plugins:
      - kubernetes-operations    # cho Stage 5 (OpenShift/Helm/ArgoCD)
      - security-scanning        # cho Stage 4 (Trivy/ZAP/Semgrep)
      - java-development         # cho Stage 3 BE (Spring Boot patterns)
    skip_plugins:
      - python-development       # không dùng Python ngoài script
      - nodejs-development       # đã có frontend tooling riêng
    rationale: "Stage 3,5 — DevOps + security + Java domain agents (cherry-pick để tránh bloat)"

# Cấu hình Claude Code chuẩn cho team
claude_code:
  default_model: claude-opus-4-7
  default_thinking: medium
  hooks_enabled: true
  parallel_agents_max: 5
  output_style: concise

# Verification — verify-env.sh đối chiếu
verification:
  expected_global_path: "~/.claude/plugins/"
  expected_plugins_count: 5  # 1 mattpocock + 1 superpowers + 3 wshobson cherry-picked
  fail_on_missing: true
  fail_on_version_mismatch: false  # warn only — version `latest` linh động

# Plugin nội bộ (agent .md trong workspaces/<role>/.claude/agents/)
internal_agents:
  shared:
    - ci-reviewer        # .claude/agents/ci-reviewer.md
  per_workspace:
    ba: [ba-parser]
    sa: [sa-designer, threat-modeler]
    dev-be: [service-builder]
    dev-fe: [react-builder]
    qa: [test-writer]
    devops: [devops-builder]
