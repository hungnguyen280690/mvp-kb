# Lock file Claude Code plugin — đảm bảo team đồng nhất
# Cập nhật: chỉnh file này → mọi máy chạy `scripts/install-claude-plugins.sh` để sync.
# Verify: `scripts/verify-env.sh` check sau khi cài.

schema_version: 1
project: mvp-kho-bac
last_updated: 2026-05-13

plugins:
  - name: superpowers
    version: "5.1.0"
    rationale: "Dev loop: brainstorm → plan → parallel agents → verify"

  - name: security-scanning
    version: "1.3.1"
    rationale: "SAST/Trivy/Semgrep cho Dev Agent"

claude_code:
  default_model: claude-opus-4-7
  default_thinking: medium
  hooks_enabled: true
  parallel_agents_max: 5
  output_style: concise

verification:
  expected_plugins_count: 2
  fail_on_missing: true
  fail_on_version_mismatch: false
