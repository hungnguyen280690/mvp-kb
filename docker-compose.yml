# VDBAS LTT - Minimal Infrastructure
# Start: docker compose up --build

services:
  # Database: Oracle Free (23c slim)
  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: vdbas-oracle
    environment:
      ORACLE_PASSWORD: changeme
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./backend/db/init.sql:/container-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -S / as sysdba"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks: [vdbas]

  # Messaging: ActiveMQ Artemis
  artemis:
    image: apache/activemq-artemis:2.33.0-alpine
    container_name: vdbas-artemis
    environment:
      ARTEMIS_USER: admin
      ARTEMIS_PASSWORD: admin
    ports:
      - "61616:61616"
      - "8161:8161"
    networks: [vdbas]

  # Backend: Spring Boot App (Root)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vdbas-backend
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//oracle:1521/FREEPDB1
      SPRING_DATASOURCE_USERNAME: sys as sysdba
      SPRING_DATASOURCE_PASSWORD: changeme
      SPRING_ARTEMIS_BROKER_URL: tcp://artemis:61616
    ports:
      - "8080:8080"
    networks: [vdbas]

  # Frontend: React App (Root)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vdbas-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks: [vdbas]

networks:
  vdbas:
    driver: bridge

volumes:
  oracle-data:
