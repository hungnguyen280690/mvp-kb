server {
    listen 80;
    server_name localhost;

    # Support for client-side routing in Shell
    location / {
        root /usr/share/nginx/html/shell;
        try_files $uri $uri/ /index.html;
    }

    # Support for client-side routing in LTT-UI
    location /ltt/ {
        alias /usr/share/nginx/html/ltt/;
        try_files $uri $uri/ /ltt/index.html;
    }

    # Proxy API requests to ltt-core (BFF stub not yet implemented).
    # Use resolver + variable so nginx re-resolves Docker DNS on each request
    # instead of caching the IP at startup (avoids 502 after container restarts).
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        proxy_pass http://kb-ltt-core:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
