server {
    listen 80;
    server_name localhost;

    # Support for client-side routing in Shell
    location / {
        root /usr/share/nginx/html/shell;
        try_files $uri $uri/ /index.html;
    }

    # Support for client-side routing in LTT-UI
    location /ltt/ {
        alias /usr/share/nginx/html/ltt/;
        try_files $uri $uri/ /ltt/index.html;
    }

    # Proxy API requests to ltt-core (BFF stub not yet implemented)
    location /api/ {
        proxy_pass http://kb-ltt-core:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
