name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────────
  # 0. RISK CLASSIFICATION
  # ─────────────────────────────────────────────────
  risk-classify:
    name: Classify PR risk
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      risk: ${{ steps.classify.outputs.risk }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend: 'workspaces/dev-be/**'
            frontend: 'workspaces/dev-fe/**'
            contracts: 'workspaces/sa/contracts/**'
            db: 'workspaces/sa/db/migrations/**'
            critical: |
              workspaces/dev-be/services/**/saga/**
              workspaces/dev-be/services/**/audit/**
              workspaces/dev-be/services/**/outbox/**
              workspaces/dev-be/services/**/payment/**
              workspaces/dev-be/services/**/auth/**
              workspaces/sa/db/migrations/**
            docs: 'docs/**/*.md'
      - name: Classify risk
        id: classify
        run: |
          if [[ "${{ steps.filter.outputs.docs }}" == "true" && "${{ steps.filter.outputs.backend }}" != "true" && "${{ steps.filter.outputs.contracts }}" != "true" ]]; then
            echo "risk=low" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.filter.outputs.critical }}" == "true" || "${{ steps.filter.outputs.db }}" == "true" ]]; then
            echo "risk=high" >> $GITHUB_OUTPUT
          else
            echo "risk=medium" >> $GITHUB_OUTPUT
          fi
      - name: Report
        run: |
          echo "PR risk level: ${{ steps.classify.outputs.risk }}"


  # ─────────────────────────────────────────────────
  # 1. STATIC CHECKS
  # ─────────────────────────────────────────────────
  static:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend: 'workspaces/dev-be/**'
            frontend: 'workspaces/dev-fe/**'
            contracts: 'workspaces/sa/contracts/**'
            db: 'workspaces/sa/db/migrations/**'

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: DB migration check
        if: steps.filter.outputs.db == 'true'
        run: |
          git diff origin/main...HEAD --name-status -- workspaces/sa/db/migrations/ | \
            awk '$1=="M" {print "ERROR: Modified existing migration: "$2; exit 1}'

  # ─────────────────────────────────────────────────
  # 2. BUILD + UNIT TEST (Backend)
  # ─────────────────────────────────────────────────
  unit-backend:
    name: Unit test (Java)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('workspaces/dev-be/services/**/pom.xml') }}
          restore-keys: maven-
      - name: Maven build + test
        working-directory: workspaces/dev-be/services
        run: mvn -B verify --no-transfer-progress
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: 'workspaces/dev-be/**/target/surefire-reports/'

  # ─────────────────────────────────────────────────
  # 3. BUILD (Frontend)
  # ─────────────────────────────────────────────────
  unit-frontend:
    name: Build (React)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: workspaces/dev-fe/frontend/package-lock.json
      - name: Install + build
        working-directory: workspaces/dev-fe/frontend
        run: |
          npm ci
          npm run build

  # ─────────────────────────────────────────────────
  # 4. SECURITY SCAN
  # ─────────────────────────────────────────────────
  deps-scan:
    name: Dependency scan (Trivy)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'

  # ─────────────────────────────────────────────────
  # 5. AI REVIEW — reviewer dựa trên nghiệp vụ (GLM)
  # ─────────────────────────────────────────────────
  ai-review:
    name: "🤖 AI reviewer (GLM)"
    runs-on: ubuntu-latest
    needs: [static, unit-backend, unit-frontend, deps-scan]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Get PR diff
        id: diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git diff $BASE_SHA..$HEAD_SHA --stat > /tmp/pr-stat.txt
          git diff $BASE_SHA..$HEAD_SHA > /tmp/pr-diff.txt

      - name: Run AI review
        id: review
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: |
          # Write Python script to build payload and call API
          cat > /tmp/review.py << 'PYEOF'
          import json, subprocess, sys

          # Read context files
          context_parts = []
          for f in ["docs/CONTEXT.md", "docs/RULES.md", "docs/STATES.md", "docs/QUALITY_GATES.md", "CLAUDE.md"]:
              try:
                  with open(f) as fh:
                      context_parts.append(f"=== {f} ===\n" + fh.read()[:2000])
              except FileNotFoundError:
                  pass
          context = "\n\n".join(context_parts)

          # Read diff
          try:
              with open("/tmp/pr-stat.txt") as f:
                  stat = f.read()
          except:
              stat = ""
          try:
              with open("/tmp/pr-diff.txt") as f:
                  diff = f.read()[:30000]
          except:
              diff = ""

          prompt = f"""Ban la CI reviewer tu dong cho du an MVP Kho Bac (VDBAS TT.OUT.MANUAL).
          Xem PR diff, doi chieu chinh sach, dua ra LGTM=true hoac LGTM=false.

          Kiem tra theo thu tu:
          1. SAFETY (BLOCKING): hard-code credential, file .env/.pem/.key, sua migration cu, @Disabled/xit moi, rm -rf/sudo
          2. DOMAIN: state transition phai khop STATES.md, audit phai co test hash chain, POST moi phai check idempotency, maker khac checker khac approver, log phai mask so TK
          3. COVERAGE: code prod >50 dong phai co test, sua saga/audit/outbox phai co test moi
          4. CONVENTION: khong sua file generated, class PascalCase, endpoint kebab-case

          DOMAIN CONTEXT:
          {context}

          PR DIFF STAT:
          {stat}

          PR DIFF:
          {diff}

          Output bat buoc JSON o cuoi:
          {{"lgtm": true|false, "risk_level": "low|medium|high", "findings": [{{"severity": "block|warn|info", "file": "path", "line": 0, "category": "safety|domain|coverage|convention", "message": "mo ta", "suggestion": "cach sua"}}], "summary": "tom tat"}}
          """

          payload = {
              "model": "glm-4-flash",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 4096,
              "temperature": 0.1
          }

          with open("/tmp/payload.json", "w") as f:
              json.dump(payload, f, ensure_ascii=False)
          print("PAYLOAD_READY")
          PYEOF

          python3 /tmp/review.py

          # Call GLM API
          RESPONSE=$(curl -s -X POST \
            "https://open.bigmodel.cn/api/paas/v4/chat/completions" \
            -H "Authorization: Bearer $GLM_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json)

          # Debug: log response keys (mask sensitive data)
          echo "API response status check:"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print('Keys:', list(data.keys()))
              if 'error' in data:
                  print('Error:', data['error'])
              if 'choices' in data:
                  print('Choices count:', len(data['choices']))
          except Exception as e:
              print(f'Parse error: {e}')
              print('Raw (first 500):', sys.stdin.read()[:500])
          " 2>/dev/null

          # Extract text from response
          TEXT=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print(data['choices'][0]['message']['content'])
          except Exception as e:
              print(f'ERROR: {e}')
          " 2>/dev/null || echo "ERROR: API call failed")

          echo "$TEXT" > /tmp/review-response.txt
          {
            echo "response<<REVIEWEOF"
            echo "$TEXT"
            echo "REVIEWEOF"
          } >> $GITHUB_OUTPUT

          # Extract LGTM
          LGTM=$(echo "$TEXT" | grep -oP '"lgtm"\s*:\s*(true|false)' | tail -1 | grep -oP '(true|false)' || echo "true")
          echo "lgtm=$LGTM" >> $GITHUB_OUTPUT

          if [ "$LGTM" = "false" ]; then
            echo "::error::AI review: LGTM=false"
          fi

      - name: Post review comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          RESPONSE="${{ steps.review.outputs.response }}"

          COMMENT="## 🤖 AI Review (GLM-4-Flash)

          $(echo "$RESPONSE" | head -200)

          ---

          *Reviewed by AI reviewer | [Policy](docs/QUALITY_GATES.md)*"

          echo "$COMMENT" | gh pr comment "$PR_NUM" --body-file -

      - name: Set check status
        if: always()
        run: |
          LGTM="${{ steps.review.outputs.lgtm }}"
          if [ "$LGTM" = "false" ]; then
            echo "AI review: LGTM=false — blocking merge"
            exit 1
          else
            echo "AI review: LGTM=true"
          fi

  # ─────────────────────────────────────────────────
  # 6. DOC-LINT
  # ─────────────────────────────────────────────────
  doc-lint:
    name: Doc lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Check changed docs
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs: |
              docs/**/*.md
              features/**/*.md
      - name: Hedge phrase scan
        if: steps.filter.outputs.docs == 'true'
        run: |
          forbidden=("as needed" "depending on requirements" "as appropriate")
          for f in $(git diff --name-only origin/main...HEAD -- 'docs/**/*.md' 'features/**/*.md'); do
            for phrase in "${forbidden[@]}"; do
              if grep -qi "$phrase" "$f" 2>/dev/null; then
                echo "WARN: Found hedge phrase '$phrase' in $f"
              fi
            done
          done

  # ─────────────────────────────────────────────────
  # 7. AUTO-MERGE
  # ─────────────────────────────────────────────────
  auto-merge:
    name: Auto merge
    runs-on: ubuntu-latest
    needs: [static, unit-backend, unit-frontend, deps-scan, ai-review, doc-lint]
    if: |
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'auto-merge')
    steps:
      - name: Enable auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
