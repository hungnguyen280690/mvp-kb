name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────────
  # 0. RISK CLASSIFICATION
  # ─────────────────────────────────────────────────
  risk-classify:
    name: Classify PR risk
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      risk: ${{ steps.classify.outputs.risk }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend: 'workspaces/dev-be/**'
            frontend: 'workspaces/dev-fe/**'
            contracts: 'workspaces/sa/contracts/**'
            db: 'workspaces/sa/db/migrations/**'
            critical: |
              workspaces/dev-be/services/**/saga/**
              workspaces/dev-be/services/**/audit/**
              workspaces/dev-be/services/**/outbox/**
              workspaces/dev-be/services/**/payment/**
              workspaces/dev-be/services/**/auth/**
              workspaces/sa/db/migrations/**
            docs: 'docs/**/*.md'
      - name: Classify risk
        id: classify
        run: |
          if [[ "${{ steps.filter.outputs.docs }}" == "true" && "${{ steps.filter.outputs.backend }}" != "true" && "${{ steps.filter.outputs.contracts }}" != "true" ]]; then
            echo "risk=low" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.filter.outputs.critical }}" == "true" || "${{ steps.filter.outputs.db }}" == "true" ]]; then
            echo "risk=high" >> $GITHUB_OUTPUT
          else
            echo "risk=medium" >> $GITHUB_OUTPUT
          fi
      - name: Report
        run: |
          echo "PR risk level: ${{ steps.classify.outputs.risk }}"


  # ─────────────────────────────────────────────────
  # 1. STATIC CHECKS
  # ─────────────────────────────────────────────────
  static:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend: 'workspaces/dev-be/**'
            frontend: 'workspaces/dev-fe/**'
            contracts: 'workspaces/sa/contracts/**'
            db: 'workspaces/sa/db/migrations/**'

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: DB migration check
        if: steps.filter.outputs.db == 'true'
        run: |
          git diff origin/main...HEAD --name-status -- workspaces/sa/db/migrations/ | \
            awk '$1=="M" {print "ERROR: Modified existing migration: "$2; exit 1}'

  # ─────────────────────────────────────────────────
  # 2. BUILD + UNIT TEST (Backend)
  # ─────────────────────────────────────────────────
  unit-backend:
    name: Unit test (Java)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('workspaces/dev-be/**/pom.xml') }}
          restore-keys: maven-
      - name: Maven build + test
        working-directory: workspaces/dev-be
        run: mvn -B verify --no-transfer-progress
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: 'workspaces/dev-be/**/target/surefire-reports/'

  # ─────────────────────────────────────────────────
  # 3. BUILD (Frontend)
  # ─────────────────────────────────────────────────
  unit-frontend:
    name: Build (React)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: workspaces/dev-fe/frontend/package-lock.json
      - name: Install + build
        working-directory: workspaces/dev-fe/frontend
        run: |
          npm ci
          npm run build

  # ─────────────────────────────────────────────────
  # 4. SECURITY SCAN
  # ─────────────────────────────────────────────────
  deps-scan:
    name: Dependency scan (Trivy)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'

  # ─────────────────────────────────────────────────
  # 5. CLAUDE AI REVIEW — reviewer dựa trên nghiệp vụ
  # ─────────────────────────────────────────────────
  claude-review:
    name: "🤖 Claude AI reviewer"
    runs-on: ubuntu-latest
    needs: [static, unit-backend, unit-frontend, deps-scan]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff
        id: diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git diff $BASE_SHA..$HEAD_SHA --stat > /tmp/pr-stat.txt
          git diff $BASE_SHA..$HEAD_SHA > /tmp/pr-diff.txt
          echo "stat_file=/tmp/pr-stat.txt" >> $GITHUB_OUTPUT
          echo "diff_file=/tmp/pr-diff.txt" >> $GITHUB_OUTPUT

      - name: Build review prompt
        run: |
          cat > /tmp/review-prompt.txt << 'PROMPT_END'
          Bạn là CI reviewer tự động cho dự án MVP Kho Bạc (VDBAS TT.OUT.MANUAL).
          Xem PR diff, đối chiếu chính sách dự án, đưa ra LGTM=true hoặc LGTM=false.

          ## Bối cảnh bắt buộc
          Đọc: docs/CONTEXT.md, docs/RULES.md, docs/STATES.md, docs/QUALITY_GATES.md

          ## Kiểm tra theo thứ tự

          ### 1. SAFETY (BLOCKING)
          - Hard-code credential/password/secret/token → LGTM=false
          - File .env, .pem, .key thêm vào diff → LGTM=false
          - Sửa db/migrations/V*__*.sql đã tồn tại trên main → LGTM=false
          - @Disabled, it.skip, xit thêm mới → LGTM=false
          - rm -rf, sudo, force push → LGTM=false

          ### 2. DOMAIN (nghiệp vụ)
          - State transition mới nhưng STATES.md chưa cập nhật?
          - Sửa logic audit mà không có test hash chain?
          - API POST mới mà không check idempotency key?
          - Constraint maker_id ≠ checker_id ≠ approver_id còn không?
          - Sửa logic số tiền mà không có test?
          - Log có chứa số TK đầy đủ không (phải mask)?

          ### 3. COVERAGE / TEST
          - Code prod thêm > 50 dòng nhưng test thêm = 0 → LGTM=false
          - Sửa file critical (saga/, audit/, outbox/) mà test không tăng → LGTM=false

          ### 4. CONVENTION
          - File generated bị sửa tay → LGTM=false
          - Tên class Java không PascalCase → comment
          - Tên endpoint không kebab-case → comment

          ## Output format — bắt buộc JSON ở cuối
          ```json
          {
            "lgtm": true|false,
            "risk_level": "low|medium|high",
            "findings": [
              {
                "severity": "block|warn|info",
                "file": "path/to/file",
                "line": 42,
                "category": "safety|domain|coverage|convention",
                "message": "mô tả",
                "suggestion": "cách sửa"
              }
            ],
            "summary": "tóm tắt"
          }
          ```
          PROMPT_END

      - name: Run Claude review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Read domain context files for richer review
          CONTEXT=""
          for f in docs/CONTEXT.md docs/RULES.md docs/STATES.md docs/QUALITY_GATES.md CLAUDE.md; do
            if [ -f "$f" ]; then
              CONTEXT="${CONTEXT}
          === ${f} ===
          $(head -200 "$f")"
            fi
          done

          # Combine prompt + context + diff
          {
            cat /tmp/review-prompt.txt
            echo ""
            echo "## DOMAIN CONTEXT"
            echo "${CONTEXT}"
            echo ""
            echo "## PR DIFF STAT"
            cat /tmp/pr-stat.txt
            echo ""
            echo "## PR DIFF"
            head -3000 /tmp/pr-diff.txt
          } > /tmp/full-prompt.txt

          # Call Claude API
          RESPONSE=$(claude --print --model claude-sonnet-4-20250514 \
            --max-tokens 4096 \
            --dangerously-skip-permissions \
            "$(cat /tmp/full-prompt.txt)" 2>/dev/null || echo "ERROR: Claude invocation failed")

          echo "$RESPONSE" > /tmp/review-response.txt
          echo "response<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Extract LGTM from JSON
          LGTM=$(echo "$RESPONSE" | grep -oP '"lgtm"\s*:\s*(true|false)' | tail -1 | grep -oP '(true|false)')
          echo "lgtm=$LGTM" >> $GITHUB_OUTPUT

          if [ "$LGTM" = "false" ]; then
            echo "::error::Claude AI review: LGTM=false"
          fi

      - name: Post review comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          RESPONSE="${{ steps.review.outputs.response }}"

          # Build comment body
          COMMENT="## 🤖 Claude AI Review

          $(echo "$RESPONSE" | sed 's/```json//' | sed 's/```//' | head -200)

          ---

          *Reviewed by \`ci-reviewer\` agent | [Policy](docs/QUALITY_GATES.md)*"

          # Post to PR
          echo "$COMMENT" | gh pr comment "$PR_NUM" --body-file -

      - name: Set check status
        if: always()
        run: |
          LGTM="${{ steps.review.outputs.lgtm }}"
          if [ "$LGTM" = "false" ]; then
            echo "❌ Claude review: LGTM=false — blocking merge"
            exit 1
          else
            echo "✅ Claude review: LGTM=true"
          fi

  # ─────────────────────────────────────────────────
  # 6. DOC-LINT
  # ─────────────────────────────────────────────────
  doc-lint:
    name: Doc lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Check changed docs
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs: |
              docs/**/*.md
              features/**/*.md
      - name: Hedge phrase scan
        if: steps.filter.outputs.docs == 'true'
        run: |
          forbidden=("as needed" "depending on requirements" "as appropriate")
          for f in $(git diff --name-only origin/main...HEAD -- 'docs/**/*.md' 'features/**/*.md'); do
            for phrase in "${forbidden[@]}"; do
              if grep -qi "$phrase" "$f" 2>/dev/null; then
                echo "WARN: Found hedge phrase '$phrase' in $f"
              fi
            done
          done

  # ─────────────────────────────────────────────────
  # 7. AUTO-MERGE
  # ─────────────────────────────────────────────────
  auto-merge:
    name: Auto merge
    runs-on: ubuntu-latest
    needs: [static, unit-backend, unit-frontend, deps-scan, claude-review, doc-lint]
    if: |
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'auto-merge')
    steps:
      - name: Enable auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
