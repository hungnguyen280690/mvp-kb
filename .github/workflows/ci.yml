name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────
  # 0. RISK CLASSIFICATION
  # ─────────────────────────────────────────────────
  risk-classify:
    name: Classify PR risk
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      risk: ${{ steps.classify.outputs.risk }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend: 'backend/**'
            frontend: 'frontend/**'
            contracts: 'contracts/**'
            db: 'backend/db/**'
            critical: |
              backend/**/saga/**
              backend/**/audit/**
              backend/**/outbox/**
              backend/**/payment/**
              backend/**/auth/**
              backend/db/**
            docs: 'docs/**/*.md'
      - name: Classify risk
        id: classify
        run: |
          if [[ "${{ steps.filter.outputs.docs }}" == "true" && "${{ steps.filter.outputs.backend }}" != "true" && "${{ steps.filter.outputs.contracts }}" != "true" ]]; then
            echo "risk=low" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.filter.outputs.critical }}" == "true" || "${{ steps.filter.outputs.db }}" == "true" ]]; then
            echo "risk=high" >> $GITHUB_OUTPUT
          else
            echo "risk=medium" >> $GITHUB_OUTPUT
          fi
      - name: Report
        run: |
          echo "PR risk level: ${{ steps.classify.outputs.risk }}"

  # ─────────────────────────────────────────────────
  # 1. STATIC CHECKS
  # ─────────────────────────────────────────────────
  static:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────
  # 2. BUILD + UNIT TEST (Backend)
  # ─────────────────────────────────────────────────
  unit-backend:
    name: Unit test (Java)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('backend/**/pom.xml') }}
          restore-keys: maven-
      - name: Maven build + test
        working-directory: backend
        run: ./mvnw -B verify --no-transfer-progress

  # ─────────────────────────────────────────────────
  # 3. BUILD (Frontend)
  # ─────────────────────────────────────────────────
  unit-frontend:
    name: Build (React)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install + build
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile || pnpm install
          pnpm build

  # ─────────────────────────────────────────────────
  # 4. SECURITY SCAN
  # ─────────────────────────────────────────────────
  deps-scan:
    name: Dependency scan (Trivy)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

  # ─────────────────────────────────────────────────
  # 5. DOC-LINT
  # ─────────────────────────────────────────────────
  doc-lint:
    name: Doc lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Check changed docs
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs: |
              docs/**/*.md
              features/**/*.md
      - name: Hedge phrase scan
        if: steps.filter.outputs.docs == 'true'
        run: |
          forbidden=("as needed" "depending on requirements" "as appropriate")
          for f in $(git diff --name-only origin/main...HEAD -- 'docs/**/*.md' 'features/**/*.md'); do
            for phrase in "${forbidden[@]}"; do
              if grep -qi "$phrase" "$f" 2>/dev/null; then
                echo "WARN: Found hedge phrase '$phrase' in $f"
              fi
            done
          done
