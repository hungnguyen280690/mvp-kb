server:
  port: 8082

spring:
  application:
    name: integration-gateway
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin

ibm:
  mq:
    queue-manager: KBQM
    channel: DEV.APP.SVRCONN
    conn-name: localhost(1414)
    user: appuser

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
