server:
  port: 8083

spring:
  application:
    name: audit-service
  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/FREEPDB1
    username: kb
    password: kb
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
