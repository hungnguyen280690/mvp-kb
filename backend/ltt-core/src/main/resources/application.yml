server:
  port: 8081

spring:
  application:
    name: ltt-core
  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/FREEPDB1
    username: kb
    password: kb
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
