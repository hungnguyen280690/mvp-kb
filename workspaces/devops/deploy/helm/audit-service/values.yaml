# generated_by: Claude Opus 4.7 (DevOps/SRE)
# applies_adrs: [ADR-0007, ADR-SA-0001]
# classification: Public
#
# Audit Service — hash chain audit, outbox publisher, batch verification.

serviceName: audit-service
environment: dev

image:
  registry: "image-registry.openshift-image-registry.svc:5000"
  repository: "vdbas"
  pullPolicy: IfNotPresent
  tag: "latest"

replicaCount: 1

service:
  type: ClusterIP
  port: 8080
  managementPort: 8081

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

config:
  hashChain:
    algorithm: "SHA-256"
    verificationCron: "0 2 * * *"
    verificationBatchSize: 10000
  outbox:
    pollingIntervalMs: 500
    batchSize: 100
    retentionDays: 30
  auditLog:
    queryMaxDays: 90
    exportBatchSize: 5000

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 40
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 5
  failureThreshold: 30

serviceMonitor:
  enabled: true
  interval: "15s"
  path: "/actuator/prometheus"
  port: "management"

networkPolicy:
  enabled: true
