# generated_by: Claude Opus 4.7 (DevOps/SRE)
# applies_adrs: [ADR-0007]
# classification: Public
#
# Gateway Service — MQ integration, message transformation, callback handling, channel routing.

serviceName: gateway-service
environment: dev

image:
  registry: "image-registry.openshift-image-registry.svc:5000"
  repository: "vdbas"
  pullPolicy: IfNotPresent
  tag: "latest"

replicaCount: 1

service:
  type: ClusterIP
  port: 8080
  managementPort: 8081

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

config:
  nhnnBaseUrl: "https://nhnn-gateway.kbnn.gov.vn"
  callbackPath: "/api/v1/callbacks"
  retry:
    maxAttempts: 3
    backoffDelaysMs: "5000,15000,45000"
  mq:
    channels:
      lnh: "LNH.LTT.REQUEST"
      sp: "SP.LTT.REQUEST"
      lkb: "LKB.LTT.REQUEST"
    replyQueues:
      lnh: "LNH.LTT.REPLY"
      sp: "SP.LTT.REPLY"
      lkb: "LKB.LTT.REPLY"
    dlqPrefix: "DLQ."
  outbox:
    pollingIntervalMs: 500
    batchSize: 100

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 45
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8081
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 5
  failureThreshold: 30

serviceMonitor:
  enabled: true
  interval: "15s"
  path: "/actuator/prometheus"
  port: "management"

networkPolicy:
  enabled: true
