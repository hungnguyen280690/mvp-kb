# applies_adrs: [ADR-0007]
# classification: Public
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vdbas.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vdbas.labels" . | nindent 4 }}
  annotations:
    generated_by: "Claude Opus 4.7 (DevOps/SRE)"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vdbas.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "vdbas.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "vdbas.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "vdbas.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: management
              containerPort: {{ .Values.service.managementPort }}
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.environment }}
            - name: SERVER_PORT
              value: {{ .Values.service.port | quote }}
            - name: MANAGEMENT_SERVER_PORT
              value: {{ .Values.service.managementPort | quote }}
            - name: NHNN_BASE_URL
              value: {{ .Values.config.nhnnBaseUrl }}
            - name: CALLBACK_PATH
              value: {{ .Values.config.callbackPath }}
            - name: RETRY_MAX_ATTEMPTS
              value: {{ .Values.config.retry.maxAttempts | quote }}
            - name: RETRY_BACKOFF_DELAYS_MS
              value: {{ .Values.config.retry.backoffDelaysMs | quote }}
            - name: MQ_CHANNEL_LNH
              value: {{ .Values.config.mq.channels.lnh }}
            - name: MQ_CHANNEL_SP
              value: {{ .Values.config.mq.channels.sp }}
            - name: MQ_CHANNEL_LKB
              value: {{ .Values.config.mq.channels.lkb }}
            - name: MQ_REPLY_QUEUE_LNH
              value: {{ .Values.config.mq.replyQueues.lnh }}
            - name: MQ_REPLY_QUEUE_SP
              value: {{ .Values.config.mq.replyQueues.sp }}
            - name: MQ_REPLY_QUEUE_LKB
              value: {{ .Values.config.mq.replyQueues.lkb }}
            - name: MQ_DLQ_PREFIX
              value: {{ .Values.config.mq.dlqPrefix }}
            - name: OUTBOX_POLLING_INTERVAL_MS
              value: {{ .Values.config.outbox.pollingIntervalMs | quote }}
            - name: OUTBOX_BATCH_SIZE
              value: {{ .Values.config.outbox.batchSize | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ include "vdbas.name" . }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.tracing.endpoint }}
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ .Values.tracing.samplingRate | quote }}
            - name: SPRING_DATASOURCE_URL
              value: {{ include "vdbas.jdbcUrl" . }}
          envFrom:
            - configMapRef:
                name: {{ include "vdbas.fullname" . }}
            - secretRef:
                name: {{ .Values.database.secretName }}
                optional: false
            - secretRef:
                name: {{ .Values.mq.secretName }}
                optional: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
