{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "vdbas.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vdbas.labels" . | nindent 4 }}
    release: prometheus
  annotations:
    generated_by: "Claude Opus 4.7 (DevOps/SRE)"
spec:
  selector:
    matchLabels:
      {{- include "vdbas.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: management
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: "10s"
      honorLabels: true
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
