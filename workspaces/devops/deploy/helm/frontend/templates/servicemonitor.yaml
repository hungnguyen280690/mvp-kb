{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "vdbas.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vdbas.labels" . | nindent 4 }}
    release: prometheus
  annotations:
    generated_by: "Claude Opus 4.7 (DevOps/SRE)"
spec:
  selector:
    matchLabels:
      {{- include "vdbas.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: "5s"
      honorLabels: true
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
