{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vdbas.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vdbas.labels" . | nindent 4 }}
  annotations:
    generated_by: "Claude Opus 4.7 (DevOps/SRE)"
spec:
  podSelector:
    matchLabels:
      {{- include "vdbas.selectorLabels" . | nindent 6 }}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Release.Namespace }}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: bff
      ports:
        - port: 8080
          protocol: TCP
  policyTypes:
    - Ingress
    - Egress
{{- end }}
