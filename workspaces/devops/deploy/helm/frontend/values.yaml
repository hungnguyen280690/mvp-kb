# generated_by: Claude Opus 4.7 (DevOps/SRE)
# applies_adrs: [ADR-0007]
# classification: Public
#
# Frontend — React 18 SPA served by nginx.

serviceName: frontend
environment: dev

image:
  registry: "image-registry.openshift-image-registry.svc:5000"
  repository: "vdbas"
  pullPolicy: IfNotPresent
  tag: "latest"

replicaCount: 1

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

config:
  bffApiUrl: "http://bff:8080"
  keycloakUrl: "https://sso.kbnn.gov.vn/realms/vdbas"
  keycloakClientId: "vdbas-spa"

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

serviceMonitor:
  enabled: true
  interval: "30s"
  path: "/metrics"
  port: "http"

networkPolicy:
  enabled: true
