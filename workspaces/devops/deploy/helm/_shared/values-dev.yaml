# generated_by: Claude Opus 4.7 (DevOps/SRE)
# applies_adrs: [ADR-0007]
# classification: Public
#
# Shared values — DEV environment
# 1 replica, minimal resources, debug logging

replicaCount: 1

image:
  registry: "image-registry.openshift-image-registry.svc:5000"
  repository: "vdbas"
  pullPolicy: Always
  tag: "latest"

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: false

logging:
  level: "DEBUG"
  format: "text"

tracing:
  enabled: true
  endpoint: "http://otel-collector.vdbas-observability:4317"
  samplingRate: 1.0

metrics:
  enabled: true
  path: "/actuator/prometheus"

database:
  host: "oracle-dev.vdbas-dev.svc"
  port: 1521
  service: "VDBASDEV"
  # Credentials injected via External Secrets, not here
  secretName: "oracle-credentials"

mq:
  host: "ibm-mq-dev.vdbas-dev.svc"
  port: 1414
  queueManager: "QM_DEV"
  channel: "DEV.APP.SVRCONN"
  secretName: "mq-credentials"

serviceAccount:
  create: true
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

networkPolicy:
  enabled: true
  ingressFrom:
    - namespaceSelector:
        matchLabels:
          name: vdbas-dev

affinity: {}

tolerations: []

nodeSelector: {}
