# generated_by: Claude Opus 4.7 (DevOps/SRE)
# applies_adrs: [ADR-0007, ADR-SA-0001, ADR-SA-0002]
# classification: Public
#
# LTT Service — core business logic, Saga Orchestrator, State Machine, COA Validator.

serviceName: ltt-service
environment: dev

image:
  registry: "image-registry.openshift-image-registry.svc:5000"
  repository: "vdbas"
  pullPolicy: IfNotPresent
  tag: "latest"

replicaCount: 1

service:
  type: ClusterIP
  port: 8080
  managementPort: 8081

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "2Gi"

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

config:
  gatewayServiceUrl: "http://gateway-service:8080"
  auditServiceUrl: "http://audit-service:8080"
  tadcommUrl: "http://tadcomm:8080"
  glUrl: "http://gl-service:8080"
  ecmUrl: "http://ecm-service:8080"
  saga:
    timeoutSeconds: 300
    maxRetries: 3
    retryBackoffMs: 5000
  outbox:
    pollingIntervalMs: 500
    batchSize: 100
    retentionDays: 7
  fundReserve:
    timeoutSeconds: 30
  coaValidation:
    enabled: true
  idempotency:
    ttlHours: 24

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8081
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 20
  periodSeconds: 5
  failureThreshold: 40

serviceMonitor:
  enabled: true
  interval: "15s"
  path: "/actuator/prometheus"
  port: "management"

networkPolicy:
  enabled: true
