# generated_by: Claude Opus 4.7 (DevOps/SRE)
# applies_adrs: [ADR-0007]
# classification: Public
#
# BFF service-specific values. Override with _shared/values-{dev,uat,prod}.yaml.

serviceName: bff
environment: dev

image:
  registry: "image-registry.openshift-image-registry.svc:5000"
  repository: "vdbas"
  pullPolicy: IfNotPresent
  tag: "latest"

replicaCount: 1

service:
  type: ClusterIP
  port: 8080
  managementPort: 8081

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# BFF-specific config
config:
  lttServiceUrl: "http://ltt-service:8080"
  auditServiceUrl: "http://audit-service:8080"
  jwt:
    issuer: "https://sso.kbnn.gov.vn/realms/vdbas"
    jwkSetUri: "https://sso.kbnn.gov.vn/realms/vdbas/protocol/openid-connect/certs"
  rateLimit:
    requestsPerSecond: 50
    burst: 100
  cors:
    allowedOrigins: "https://vdbas.kbnn.gov.vn"
    allowedMethods: "GET,POST,PUT,PATCH,DELETE"

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8081
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 30

serviceMonitor:
  enabled: true
  interval: "15s"
  path: "/actuator/prometheus"
  port: "management"

networkPolicy:
  enabled: true
  allowedIngress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: vdbas-dev
          podSelector:
            matchLabels:
              app.kubernetes.io/name: frontend
      ports:
        - port: 8080
          protocol: TCP
