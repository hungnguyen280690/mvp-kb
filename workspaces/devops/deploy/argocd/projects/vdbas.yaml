---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: vdbas
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: vdbas
    managed-by: argocd
  annotations:
    generated_by: "Claude Opus 4.7 (DevOps/SRE)"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "VDBAS TT.OUT.MANUAL — Lenh thanh toan di NHNN thu cong"

  # Source repositories
  sourceRepos:
    - "https://github.com/kbnn/vdbas-tt-out-manual.git"
    - "https://charts.bitnami.com/bitnami"

  # Destination clusters and namespaces
  destinations:
    - server: "https://kubernetes.default.svc"
      namespace: "vdbas-dev"
    - server: "https://kubernetes.default.svc"
      namespace: "vdbas-uat"
    - server: "https://kubernetes.default.svc"
      namespace: "vdbas-prod"
    - server: "https://kubernetes.default.svc"
      namespace: "vdbas-ci"
    - server: "https://kubernetes.default.svc"
      namespace: "vdbas-observability"

  # Cluster-scoped resources allowed
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
    - group: "apiextensions.k8s.io"
      kind: CustomResourceDefinition
    - group: "monitoring.coreos.com"
      kind: Prometheus
    - group: "monitoring.coreos.com"
      kind: PrometheusRule
    - group: "monitoring.coreos.com"
      kind: ServiceMonitor

  # Namespace-scoped resources blacklisted
  namespaceResourceBlacklist:
    - group: ""
      kind: ResourceQuota
    - group: "networking.k8s.io"
      kind: Ingress
    - group: "route.openshift.io"
      kind: Route

  # Roles within the project
  roles:
    - name: devops-admin
      description: "DevOps team — full access to all VDBAS apps"
      policies:
        - "p, proj:vdbas:devops-admin, applications, *, vdbas/*, allow"
      groups:
        - "kbnn:devops-team"

    - name: developer
      description: "Developers — sync access to dev/uat only"
      policies:
        - "p, proj:vdbas:developer, applications, get, vdbas/*, allow"
        - "p, proj:vdbas:developer, applications, sync, vdbas/*-dev, allow"
        - "p, proj:vdbas:developer, applications, sync, vdbas/*-uat, allow"
      groups:
        - "kbnn:dev-team"

    - name: readonly
      description: "QA, BA — read-only access"
      policies:
        - "p, proj:vdbas:readonly, applications, get, vdbas/*, allow"
      groups:
        - "kbnn:qa-team"
        - "kbnn:ba-team"

  # Sync windows (restrict prod deployments)
  syncWindows:
    - kind: "allow"
      schedule: "Mon-Fri 08:00-18:00"
      duration: "10h"
      applications:
        - "vdbas-*-prod"
      manualSync: false
      timeZone: "Asia/Ho_Chi_Minh"
