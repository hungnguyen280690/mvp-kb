# generated_by: Claude Opus 4.7 (DevOps/SRE)
# applies_adrs: [ADR-0007]
# classification: Public
#
# SLO-based Alerting Rules — VDBAS TT.OUT.MANUAL
# Prometheus format (PrometheusRule CRD)
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vdbas-alerts
  namespace: vdbas-observability
  labels:
    app.kubernetes.io/part-of: vdbas
    app.kubernetes.io/component: observability
    release: prometheus
  annotations:
    generated_by: "Claude Opus 4.7 (DevOps/SRE)"
spec:
  groups:
    # ----------------------------------------------------------------
    # LTT Processing Latency
    # ----------------------------------------------------------------
    - name: vdbas.ltt.latency
      rules:
        - alert: LttProcessingLatencyP95High
          expr: |
            histogram_quantile(0.95,
              sum(rate(vdbas_ltt_state_transition_duration_seconds_bucket{from_state="SUBMITTED", to_state="CONFIRMED"}[5m]))
              by (le, environment)
            ) > 5
          for: 2m
          labels:
            severity: warning
            team: vdbas-devops
            runbook_url: "https://wiki.kbnn.gov.vn/vdbas/runbook/ltt-latency"
          annotations:
            summary: "LTT processing P95 latency exceeds 5s"
            description: >
              The 95th percentile latency for LTT state transition
              SUBMITTED -> CONFIRMED in environment {{ $labels.environment }}
              is {{ $value | printf "%.2f" }}s, exceeding the 5s SLO threshold.
            action: "Check Oracle query performance and MQ throughput."

        - alert: LttProcessingLatencyP99Critical
          expr: |
            histogram_quantile(0.99,
              sum(rate(vdbas_ltt_state_transition_duration_seconds_bucket{from_state="SUBMITTED", to_state="CONFIRMED"}[5m]))
              by (le, environment)
            ) > 10
          for: 1m
          labels:
            severity: critical
            team: vdbas-devops
            runbook_url: "https://wiki.kbnn.gov.vn/vdbas/runbook/ltt-latency"
          annotations:
            summary: "LTT processing P99 latency exceeds 10s — CRITICAL"
            description: >
              The 99th percentile latency for LTT state transition
              SUBMITTED -> CONFIRMED in environment {{ $labels.environment }}
              is {{ $value | printf "%.2f" }}s, exceeding the 10s critical threshold.
            action: "Escalate immediately. Check Oracle slow queries, MQ backlog, and service health."

    # ----------------------------------------------------------------
    # Outbox Stuck Events
    # ----------------------------------------------------------------
    - name: vdbas.outbox
      rules:
        - alert: OutboxStuckEvents
          expr: vdbas_outbox_pending_events > 100
          for: 5m
          labels:
            severity: critical
            team: vdbas-devops
            runbook_url: "https://wiki.kbnn.gov.vn/vdbas/runbook/outbox-stuck"
          annotations:
            summary: "Outbox has {{ $value }} pending events stuck for over 5 minutes"
            description: >
              Service {{ $labels.service }} in {{ $labels.environment }}
              has {{ $value }} outbox events in PENDING status for more than 5 minutes.
              This indicates the outbox publisher is not processing events.
            action: "Check MQ connectivity, outbox publisher logs, and runbook: outbox-stuck."

    # ----------------------------------------------------------------
    # IBM MQ
    # ----------------------------------------------------------------
    - name: vdbas.mq
      rules:
        - alert: MqQueueDepthHigh
          expr: vdbas_mq_queue_depth > 1000
          for: 3m
          labels:
            severity: warning
            team: vdbas-devops
            runbook_url: "https://wiki.kbnn.gov.vn/vdbas/runbook/mq-down"
          annotations:
            summary: "MQ queue {{ $labels.queue }} depth exceeds 1000"
            description: >
              IBM MQ queue {{ $labels.queue }} in {{ $labels.environment }}
              has {{ $value }} messages, exceeding the 1000 message warning threshold.
              Consumer may be down or processing slowly.
            action: "Check gateway-service pod health, MQ consumer logs."

    # ----------------------------------------------------------------
    # Gateway Callback
    # ----------------------------------------------------------------
    - name: vdbas.gateway
      rules:
        - alert: GatewayCallbackTimeoutRate
          expr: |
            sum(rate(vdbas_gateway_callback_timeout_total[5m]))
            /
            sum(rate(vdbas_gateway_callback_total[5m]))
            > 0.05
          for: 2m
          labels:
            severity: critical
            team: vdbas-devops
            runbook_url: "https://wiki.kbnn.gov.vn/vdbas/runbook/gateway-callback"
          annotations:
            summary: "Gateway callback timeout rate exceeds 5%"
            description: >
              {{ $value | printf "%.2f" }} of gateway callbacks in
              {{ $labels.environment }} are timing out, exceeding the 5% critical threshold.
            action: "Check NHNN gateway connectivity, network routes, and callback endpoint health."

    # ----------------------------------------------------------------
    # Audit Hash Chain
    # ----------------------------------------------------------------
    - name: vdbas.audit
      rules:
        - alert: AuditHashChainBroken
          expr: increase(vdbas_audit_hash_chain_broken_total[5m]) > 0
          for: 0m
          labels:
            severity: critical
            team: vdbas-devops
            team_security: vdbas-security
            runbook_url: "https://wiki.kbnn.gov.vn/vdbas/runbook/audit-chain-broken"
          annotations:
            summary: "Audit hash chain integrity violation detected"
            description: >
              Hash chain verification detected a broken link in the audit trail
              in {{ $labels.environment }}. This may indicate data tampering.
              {{ $value }} chain break(s) detected in the last 5 minutes.
            action: >
              IMMEDIATE ESCALATION REQUIRED.
              1. Notify security team and gatekeeper G5.
              2. Investigate affected audit records.
              3. Check for unauthorized DB access.
              4. Do NOT modify or delete affected records — preserve evidence.

    # ----------------------------------------------------------------
    # HTTP Error Rates
    # ----------------------------------------------------------------
    - name: vdbas.errors
      rules:
        - alert: HighErrorRate5xx
          expr: |
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[2m]))
            /
            sum(rate(http_server_requests_seconds_count[2m]))
            > 0.01
          for: 2m
          labels:
            severity: warning
            team: vdbas-devops
            runbook_url: "https://wiki.kbnn.gov.vn/vdbas/runbook/5xx-errors"
          annotations:
            summary: "5xx error rate exceeds 1%"
            description: >
              The 5xx error rate across all VDBAS services in
              {{ $labels.environment }} is {{ $value | printf "%.2f" }},
              exceeding the 1% SLO threshold for 2 minutes.
            action: "Check service logs, Oracle connectivity, and resource limits."

    # ----------------------------------------------------------------
    # Pod Health
    # ----------------------------------------------------------------
    - name: vdbas.pods
      rules:
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace=~"vdbas-.*"}[15m]) * 60 * 5 > 0
          for: 5m
          labels:
            severity: critical
            team: vdbas-devops
            runbook_url: "https://wiki.kbnn.gov.vn/vdbas/runbook/crashloop"
          annotations:
            summary: "Pod {{ $labels.pod }} is CrashLooping"
            description: >
              Pod {{ $labels.pod }} in namespace {{ $labels.namespace }}
              has restarted {{ $value | printf "%.0f" }} times in the last 15 minutes.
            action: "Check pod logs: `oc logs {{ $labels.pod }} -n {{ $labels.namespace }} --previous`"

    # ----------------------------------------------------------------
    # Saga
    # ----------------------------------------------------------------
    - name: vdbas.saga
      rules:
        - alert: SagaTimeoutRate
          expr: |
            sum(rate(vdbas_saga_timeout_total[10m]))
            /
            sum(rate(vdbas_saga_started_total[10m]))
            > 0.01
          for: 5m
          labels:
            severity: warning
            team: vdbas-devops
            runbook_url: "https://wiki.kbnn.gov.vn/vdbas/runbook/saga-timeout"
          annotations:
            summary: "Saga timeout rate exceeds 1%"
            description: >
              {{ $value | printf "%.2f" }} of saga instances in {{ $labels.environment }}
              are timing out, exceeding the 1% threshold.
            action: "Check downstream service availability (TAD-COMM, GL, MQ) and saga step durations."

        - alert: SagaCompensationRate
          expr: |
            sum(rate(vdbas_saga_compensating_total[10m]))
            /
            sum(rate(vdbas_saga_started_total[10m]))
            > 0.05
          for: 5m
          labels:
            severity: warning
            team: vdbas-devops
            runbook_url: "https://wiki.kbnn.gov.vn/vdbas/runbook/saga-compensation"
          annotations:
            summary: "Saga compensation rate exceeds 5%"
            description: >
              {{ $value | printf "%.2f" }} of saga instances in {{ $labels.environment }}
              are triggering compensating actions, exceeding the 5% threshold.
            action: "Review which saga steps are failing. Check fund reserve release correctness."
