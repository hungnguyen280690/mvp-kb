# generated_by: Claude Opus 4.7 (DevOps/SRE)
# applies_adrs: [ADR-0007]
# classification: Public
#
# OpenTelemetry Collector — VDBAS TT.OUT.MANUAL
# Receivers: OTLP (grpc + http)
# Processors: batch, attributes (add service.name)
# Exporters: Prometheus, Loki, Jaeger
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: vdbas-otel
  namespace: vdbas-observability
  labels:
    app.kubernetes.io/part-of: vdbas
    app.kubernetes.io/component: observability
  annotations:
    generated_by: "Claude Opus 4.7 (DevOps/SRE)"
spec:
  mode: deployment
  replicas: 2
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  image: "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.96.0"
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
            max_recv_msg_size_mib: 16
          http:
            endpoint: "0.0.0.0:4318"
            max_request_body_size: 16MiB

    processors:
      # Batch telemetry to reduce export calls
      batch:
        send_batch_size: 1024
        send_batch_max_size: 2048
        timeout: "5s"

      # Add deployment metadata to every span/metric/log
      attributes:
        actions:
          - key: deployment.environment
            value: "${env:DEPLOYMENT_ENV}"
            action: upsert
          - key: service.namespace
            value: "vdbas"
            action: upsert

      # Memory limiter — prevent OOM
      memory_limiter:
        check_interval: "5s"
        limit_percentage: 80
        spike_limit_percentage: 25

      # Filter out noisy health-check spans
      filter:
        error_mode: ignore
        traces:
          span:
            - 'attributes["http.route"] == "/actuator/health*"'
            - 'attributes["http.route"] == "/healthz"'

      # Transform: enrich with Kubernetes metadata
      transform:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              - set(attributes["k8s.namespace.name"], resource.attributes["k8s.namespace.name"]) where resource.attributes["k8s.namespace.name"] != nil
              - set(attributes["k8s.pod.name"], resource.attributes["k8s.pod.name"]) where resource.attributes["k8s.pod.name"] != nil

    exporters:
      # Export metrics to Prometheus (pull-based via ServiceMonitor)
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: "vdbas"
        const_labels:
          app: "vdbas"

      # Export logs to Grafana Loki
      otlphttp/loki:
        endpoint: "http://loki.vdbas-observability:3100/otlp"
        default_metadata:
          - key: "loki.format"
            value: "json"

      # Export traces to Jaeger
      otlp/jaeger:
        endpoint: "jaeger-collector.vdbas-observability:4317"
        tls:
          insecure: true

      # Debug exporter for dev environment
      debug:
        verbosity: basic
        sampling_initial: 5
        sampling_thereafter: 200

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, filter, attributes, transform, batch]
          exporters: [otlp/jaeger]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, attributes, batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, attributes, batch]
          exporters: [otphttp/loki]

      telemetry:
        logs:
          level: "info"
        metrics:
          address: "0.0.0.0:8888"
