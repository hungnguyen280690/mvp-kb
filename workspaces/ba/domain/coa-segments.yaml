# ============================================================================
# COA Composition — Cach ghep COA tu cac segment
# ============================================================================
coa_composition:
  description: >
    To hop cac segment Mã quy/TK/Cap NS/Chuong/Nganh KT/NDKT/DB/CTMT/MN/Kho bac/DP
    phai hop le theo bang cau hinh QLT/QLChi (doi chieu voi DMHT.COA-MATRIX).
    Moi dong khoan muc trong LTT la mot to hop COA day du.
  segments_order:
    - DM-MAQUY      # Ma quy (2 ky tu) — vi tri 1
    - DM-TK         # Tai khoan tu nhien (4 ky tu) — vi tri 2
    - DM-CAPNS      # Cap ngan sach (1 ky tu) — vi tri 3
    - DM-CHUONG     # Chuong (3 ky tu) — vi tri 4
    - DM-NGANHKT    # Nganh kinh te (3 ky tu) — vi tri 5
    - DM-NDKT       # Noi dung kinh te (4 ky tu) — vi tri 6
    - DM-DIABAN     # Dia ban (5 ky tu) — vi tri 7
    - DM-CTMT       # Chuong trinh muc tieu (5 ky tu) — vi tri 8
    - DM-MN         # Ma nguon kinh phi (2 ky tu) — vi tri 9
    - DM-KB         # Kho bac (4 ky tu) — vi tri 10
    - DM-DP         # Ma du phong (3 ky tu) — vi tri 11
  cross_validation_rules:
    - rule: BIZ-COA-CROSS
      description: >
        To hop cac segment phai hop le theo bang DMHT.COA-MATRIX.
        Doi chieu voi module QLT/QLChi de xac minh tinh hop le.
      enforcement: service_check + db_constraint
    - rule: BIZ-NDND-RULE
      description: >
        NDKT phai nam trong tap hop NDKT cho phep theo Loai lenh.
        Mot so NDKT dac thu chi ap dung cho TT tu Quy NSNN.
      enforcement: service_check + db_constraint
    - rule: DM-CAPNS-CHUONG
      description: >
        Cap NS va Chuong phai tuong thich (vd. Cap NS=1 thi Chuong thuoc NS Trung uong).
      enforcement: service_check
    - rule: DM-MAQUY-CAPNS
      description: >
        Ma quy va Cap NS phai tuong thich (vd. Ma quy=01 thi Cap NS=1).
      enforcement: service_check
    - rule: DM-DIABAN-KB
      description: >
        Dia ban va Kho bac phai tuong thich theo cau truc dia ly hanh chinh.
      enforcement: service_check

