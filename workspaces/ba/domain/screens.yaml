# ============================================================================
# Screen Definitions — TT.OUT.MANUAL
# Module: Lenh thanh toan di NHNN thu cong
# Source: SRS sheets "4-Giao dien chuc nang" + "5.3-Mo ta Field, Button"
# Generated: 2026-05-10
# ============================================================================

screens:

  # --------------------------------------------------------------------------
  # S01 — Man hinh tra cuu/danh sach LTT thu cong
  # --------------------------------------------------------------------------
  - id: S01
    code: "TT.OUT.MANUAL.S01"
    name: "Man hinh tra cuu/danh sach LTT thu cong"
    type: LIST
    roles: ["Nguoi lap", "Kiem soat", "Phe duyet"]
    layout_description: >
      Bo loc (Kenh, Loai lenh, Trang thai, Don vi, Khoang ngay, So YCTT,
      NH chuyen/nhan, So tien tu-den). Bang ket qua phan trang voi cac cot chinh:
      So YCTT, Ngay TT, Kenh, Loai lenh, NH chuyen, NH nhan, So tien, Trang thai.
    fields:
      - name: "Kenh"
        type: "Dropdown"
        required: false
        validation: ["VAL-001"]
        ref_dm: "DM-CHANNEL"
        description: "Loc theo kenh thanh toan"

      - name: "Loai lenh"
        type: "Dropdown"
        required: false
        validation: ["VAL-001"]
        ref_dm: "DM-ORDER-TYPE"
        description: "Loc theo loai lenh thanh toan"

      - name: "Trang thai"
        type: "Dropdown"
        required: false
        description: "Loc theo trang thai LTT"

      - name: "Don vi"
        type: "Dropdown"
        required: false
        description: "Loc theo don vi KBNN"

      - name: "Khoang ngay"
        type: "DateRangePicker"
        required: false
        validation: ["VAL-003"]
        description: "Loc theo khoang ngay thanh toan"

      - name: "So YCTT"
        type: "TextBox"
        required: false
        validation: ["VAL-002"]
        description: "Loc theo so yeu cau thanh toan"

      - name: "NH chuyen/nhan"
        type: "TextBox"
        required: false
        ref_dm: "DM-BANK"
        description: "Loc theo ma NH/KB chuyen hoac nhan"

      - name: "So tien tu-den"
        type: "NumberField"
        required: false
        validation: ["VAL-004"]
        description: "Loc theo khoang so tien"

    actions:
      - name: "Tra cuu"
        event: "EVT015-Search"
        type: PRIMARY
        description: "Ap dung dieu kien loc + phan trang"

      - name: "Xoa dieu kien"
        event: "EVT016-ClearFilter"
        type: SECONDARY
        description: "Reset toan bo bo loc ve mac dinh"

      - name: "Tao moi"
        event: "EVT002-New"
        type: PRIMARY
        description: "Mo man hinh lap LTT moi (S02)"

      - name: "Ket xuat Excel"
        event: "EVT017-Export"
        type: SECONDARY
        description: "Ket xuat ket qua ra .xlsx/.csv, gioi han 50.000 dong"

      - name: "Xem chi tiet"
        event: "EVT018-Detail"
        type: SECONDARY
        description: "Mo man hinh S03 read-only"

      - name: "Mo phe duyet"
        event: "EVT006-Approve"
        type: PRIMARY
        description: "Mo man hinh phe duyet tu danh sach"

      - name: "Huy"
        event: "EVT008-Cancel"
        type: DANGER
        description: "Huy LTT (phu hop vai tro va trang thai)"

      - name: "Sua"
        event: "EVT022-Edit"
        type: SECONDARY
        description: "Mo S02 o Edit-mode (chi Maker goc + DRAFT/RETURNED)"

      - name: "Sao chep"
        event: "EVT023-Copy"
        type: SECONDARY
        description: "Tao LTT moi bang cach clone LTT dang chon"

      - name: "In"
        event: "EVT012-Print"
        type: SECONDARY
        description: "Sinh ban in (PDF) theo mau"

      - name: "Xoa"
        event: "EVT014-Delete"
        type: DANGER
        description: "Xoa LTT (soft-delete), mo popup S07"

  # --------------------------------------------------------------------------
  # S02 — Man hinh lap LTT thu cong (Form)
  # --------------------------------------------------------------------------
  - id: S02
    code: "TT.OUT.MANUAL.S02"
    name: "Man hinh lap LTT thu cong (Form)"
    type: FORM
    roles: ["Nguoi lap"]
    layout_description: >
      Form chia 4 nhom: (a) Thong tin chung (Kenh, Loai lenh, NH/KB chuyen-nhan,
      So YCTT, Ngay TT, So tien, Loai tien, Ty gia...). (b) Khoan muc (luoi chi tiet
      COA: Ma quy, TK tu nhien, DVQHNS, Cap NS, Chuong, Nganh KT, NDKT, DB, CTMT, MN,
      KB, DP, Dien giai, So tien). (c) Thong tin nguoi chuyen. (d) Thong tin nguoi nhan.
    field_groups:

      # --- Nhom 1: Thong tin chung ---
      - group: "Thong tin chung"
        fields:
          - name: "So YCTT/ So but toan"
            type: "TextBox"
            required: true
            immutable: true
            data_type: "String"
            validation: ["VAL-002", "BIZ-IDGEN"]
            description: "Bat buoc nhap. He thong tu sinh theo cau hinh kenh neu Maker bo trong."

          - name: "Trang thai"
            type: "TextBox"
            required: false
            data_type: "String"
            description: "Khong hien thi khi tao lenh."

          - name: "Kenh"
            type: "Dropdown"
            required: true
            default: "Theo user dang nhap"
            data_type: "String"
            validation: ["VAL-001"]
            ref_dm: "DM-CHANNEL"
            description: "Mac dinh hien thi theo user dang nhap."

          - name: "Loai lenh"
            type: "Dropdown"
            required: true
            data_type: "String"
            validation: ["VAL-001"]
            ref_dm: "DM-ORDER-TYPE"
            description: "Bat buoc chon trong danh muc. Loc theo kenh da chon."

          - name: "NH/KB chuyen"
            type: "TextBox"
            required: true
            data_type: "String"
            ref_dm: "DM-BANK"
            description: "Tu hien thi ma NH truc tiep cua user, khong cho sua."

          - name: "NH/KB nhan"
            type: "TextBox"
            required: true
            data_type: "String"
            ref_dm: "DM-BANK"
            description: "Tu hien thi theo cap thiet lap song phuong (SP) hoac ma NH (LNH)."

          - name: "Ngay thanh toan"
            type: "DatePicker"
            required: true
            default: "Ngay hien tai"
            data_type: "Date"
            validation: ["VAL-003", "BIZ-COT-CHECK"]
            description: "Tu hien thi ngay hien tai, khong cho phep sua."

          - name: "So tien chuyen"
            type: "NumberField"
            required: true
            data_type: "Number"
            validation: ["VAL-004", "VAL-005", "BIZ-LIMIT"]
            description: "Tu hien thi bang tong tien o cac dong chi tiet khoan muc."

          - name: "Loai tien"
            type: "Dropdown"
            required: true
            default: "VND"
            data_type: "String"
            validation: ["VAL-001"]
            ref_dm: "DM-CURRENCY"
            description: "Mac dinh VND, cho phep chon lai."

          - name: "Loai giao dich"
            type: "Dropdown"
            required: false
            data_type: "String"
            validation: ["VAL-001"]
            ref_dm: "DM-TXN-TYPE"
            description: "Chi hien thi khi Kenh = LNH. Tu dong chon dua tren so tien."

          - name: "Ty gia"
            type: "NumberField"
            required: false
            data_type: "Number"
            validation: ["BIZ-FX-RATE"]
            description: "Chi hien thi va bat buoc nhap neu chon loai tien Ngoai te."

          - name: "So chung tu goc"
            type: "TextBox"
            required: false
            data_type: "Varchar"
            validation: ["VAL-002"]
            description: "Bat buoc nhap neu Kenh = Thanh toan song phuong."

          - name: "Ngay chung tu"
            type: "DatePicker"
            required: false
            data_type: "Date"
            validation: ["VAL-003"]
            description: "Bat buoc nhap neu Kenh = Thanh toan song phuong."

          - name: "Loai phi"
            type: "Dropdown"
            required: false
            data_type: "String"
            ref_dm: "DM-FEE-TYPE"
            description: "Bat buoc neu Loai lenh = TT bang ngoai te khac."

          - name: "Ma ngoai te trich no"
            type: "Dropdown"
            required: false
            data_type: "String"
            ref_dm: "DM-CURRENCY"
            description: "Bat buoc neu Loai lenh = TT bang ngoai te khac."

          - name: "Ma ngoai te TT"
            type: "Dropdown"
            required: false
            data_type: "String"
            ref_dm: "DM-CURRENCY"
            description: "Bat buoc neu Loai lenh = TT bang ngoai te khac."

          - name: "So tien ngoai te TT"
            type: "NumberField"
            required: false
            data_type: "String"
            description: "Bat buoc neu Loai lenh = TT bang ngoai te khac."

          - name: "Noi dung thanh toan"
            type: "TextArea"
            required: true
            data_type: "String"
            validation: ["VAL-002"]
            description: "Bat buoc nhap."

          - name: "Nguoi lap"
            type: "TextBox"
            required: false
            data_type: "String"
            immutable: true
            description: "He thong tu lay user hien tai, khong cho phep sua."

          - name: "Ngay lap"
            type: "DatePicker"
            required: false
            data_type: "Datetime"
            immutable: true
            description: "Tu dong hien thi thoi gian ngay lam viec hien tai."

      # --- Nhom 2: Thong tin khoan muc (luoi COA) ---
      - group: "Thong tin khoan muc"
        is_grid: true
        fields:
          - name: "Ma quy"
            type: "TextBox"
            required: false
            default: "01"
            data_type: "Varchar(2)"
            validation: ["VAL-001", "BIZ-COA-CROSS"]
            ref_dm: "DM-MAQUY"
            description: "2 ky tu. Mac dinh 01. Cho phep sua, tuan theo rang buoc ket hop cheo."

          - name: "TK tu nhien"
            type: "NumberField"
            required: false
            data_type: "Varchar(4)"
            validation: ["VAL-001", "BIZ-COA-CROSS"]
            ref_dm: "DM-TK"
            description: "Tai khoan tu nhien 4 ky tu."

          - name: "DVQHNS"
            type: "NumberField"
            required: false
            data_type: "Varchar(7)"
            validation: ["VAL-001", "BIZ-COA-CROSS"]
            ref_dm: "DM-DVQHNS"
            description: "Don vi quan he ngan sach 7 ky tu."

          - name: "Cap NS"
            type: "NumberField"
            required: false
            data_type: "Varchar(1)"
            validation: ["VAL-001", "BIZ-COA-CROSS"]
            ref_dm: "DM-CAPNS"
            description: "Cap ngan sach."

          - name: "Chuong"
            type: "NumberField"
            required: false
            default: "000"
            data_type: "Varchar(3)"
            validation: ["VAL-001", "BIZ-COA-CROSS"]
            ref_dm: "DM-CHUONG"
            description: "Ma chuong 3 ky tu. Mac dinh 000."

          - name: "Nganh KT"
            type: "NumberField"
            required: false
            default: "000"
            data_type: "Varchar(3)"
            validation: ["VAL-001", "BIZ-COA-CROSS"]
            ref_dm: "DM-NGANHKT"
            description: "Ma nganh kinh te 3 ky tu. Mac dinh 000."

          - name: "NDKT"
            type: "NumberField"
            required: false
            default: "0000"
            data_type: "Varchar(4)"
            validation: ["VAL-001", "BIZ-COA-CROSS", "BIZ-NDND-RULE"]
            ref_dm: "DM-NDKT"
            description: "Noi dung kinh te 4 ky tu. Mac dinh 0000."

          - name: "DB"
            type: "NumberField"
            required: false
            default: "00000"
            data_type: "Varchar(5)"
            validation: ["VAL-001", "BIZ-COA-CROSS"]
            ref_dm: "DM-DIABAN"
            description: "Ma dia ban 5 ky tu. Mac dinh 00000."

          - name: "CTMT"
            type: "NumberField"
            required: false
            default: "00000"
            data_type: "Varchar(5)"
            validation: ["VAL-001", "BIZ-COA-CROSS"]
            ref_dm: "DM-CTMT"
            description: "Chuong trinh muc tieu 5 ky tu. Mac dinh 00000."

          - name: "MN"
            type: "NumberField"
            required: false
            default: "00"
            data_type: "Varchar(2)"
            validation: ["VAL-001", "BIZ-COA-CROSS"]
            ref_dm: "DM-MN"
            description: "Ma nguon kinh phi 2 ky tu. Mac dinh 00."

          - name: "Kho bac"
            type: "NumberField"
            required: false
            default: "0000"
            data_type: "Varchar(4)"
            validation: ["VAL-001", "BIZ-COA-CROSS"]
            ref_dm: "DM-KB"
            description: "Ma kho bac 4 ky tu. Mac dinh 0000."

          - name: "DP"
            type: "NumberField"
            required: false
            default: "000"
            data_type: "Varchar(3)"
            validation: ["VAL-001", "BIZ-COA-CROSS"]
            ref_dm: "DM-DP"
            description: "Ma du phong 3 ky tu. Mac dinh 000."

          - name: "Dien giai"
            type: "TextArea"
            required: true
            data_type: "String"
            description: "Dien giai so tien chi tiet."

          - name: "So tien"
            type: "NumberField"
            required: true
            data_type: "Number"
            validation: ["VAL-004", "VAL-005"]
            description: "So tien chi tiet tung dong khoan muc."

      # --- Nhom 3: Thong tin nguoi chuyen ---
      - group: "Thong tin nguoi chuyen"
        fields:
          - name: "Ten"
            type: "TextBox"
            required: true
            data_type: "String"
            description: "Tu hien thi theo ma COA da nhap, cho phep sua."

          - name: "Dia chi"
            type: "TextBox"
            required: true
            data_type: "String"
            description: "Cho nhap."

          - name: "Tai khoan"
            type: "NumberField"
            required: true
            data_type: "Number"
            description: "Tu hien thi theo ma COA, khong cho sua."

          - name: "Ma KH"
            type: "NumberField"
            required: false
            data_type: "Number"
            description: "Cho nhap."

          - name: "Mo tai NH/KB"
            type: "TextBox"
            required: true
            data_type: "String"
            ref_dm: "DM-BANK"
            description: "Tu hien thi ma NH cua user dang nhap."

          - name: "CMND/CCCD/HC/Ma DN"
            type: "NumberField"
            required: false
            data_type: "Number"
            description: "Cho nhap."

          - name: "Ngay cap"
            type: "DatePicker"
            required: false
            data_type: "Date"
            description: "Bat buoc nhap neu da nhap so CMND/CCCD/HC/Ma DN."

          - name: "Noi cap"
            type: "TextBox"
            required: false
            data_type: "String"
            description: "Bat buoc nhap neu da nhap so CMND/CCCD/HC/Ma DN."

          - name: "Ma TPCP"
            type: "TextBox"
            required: false
            data_type: "String"
            description: "Bat buoc nhap neu Loai lenh = Trai phieu chinh phu."

      # --- Nhom 4: Thong tin nguoi nhan ---
      - group: "Thong tin nguoi nhan"
        fields:
          - name: "Ten"
            type: "TextBox"
            required: true
            data_type: "String"
            description: "Cho nhap."

          - name: "Dia chi"
            type: "TextBox"
            required: false
            data_type: "String"
            description: "Cho nhap."

          - name: "Tai khoan"
            type: "NumberField"
            required: true
            data_type: "Number"
            description: "Cho phep nhap so tai khoan cua nguoi nhan tien."

          - name: "Mo tai NH/KB"
            type: "NumberField"
            required: true
            data_type: "Number"
            ref_dm: "DM-BANK"
            description: "Cho nhap."

          - name: "Ten tai khoan"
            type: "TextBox"
            required: true
            data_type: "String"
            description: "Cho phep nhap ten tai khoan cua nguoi nhan tien."

          - name: "CMND/CCCD/HC/Ma DN"
            type: "NumberField"
            required: false
            data_type: "Number"
            description: "Cho nhap."

          - name: "Ngay cap"
            type: "DatePicker"
            required: false
            data_type: "Date"
            description: "Bat buoc nhap neu da nhap so CMND/CCCD/HC/Ma DN."

          - name: "Noi cap"
            type: "TextBox"
            required: false
            data_type: "String"
            description: "Bat buoc nhap neu da nhap so CMND/CCCD/HC/Ma DN."

    actions:
      - name: "Luu nap"
        event: "EVT003-SaveDraft"
        type: PRIMARY
        description: "Luu LTT o trang thai Nap/Draft. Ran buoc VAL toi thieu."

      - name: "Gui kiem soat"
        event: "EVT004-Submit"
        type: PRIMARY
        description: "Validate day du VAL-* + BIZ rules, chuyen trang thai Cho kiem soat."

      - name: "Thoat"
        event: "EVT020-Exit"
        type: SECONDARY
        description: "Dong form. Neu co thay doi chua luu, hien thi confirm."

      - name: "Xoa"
        event: "EVT014-Delete"
        type: DANGER
        description: "Xoa LTT (soft-delete), mo popup S07."

      - name: "In nap"
        event: "EVT013-PrintDraft"
        type: SECONDARY
        description: "In ban nap voi watermark NHAP."

      - name: "Them dong"
        type: SECONDARY
        description: "Them dong vao luoi khoan muc COA."

      - name: "Xoa dong"
        type: SECONDARY
        description: "Xoa dong khoi luoi khoan muc COA."

      - name: "Dinh kem tep"
        event: "EVT019-Attach"
        type: SECONDARY
        description: "Upload chung tu kem (<=10MB/file, PDF/JPG/PNG/DOC)."

  # --------------------------------------------------------------------------
  # S03 — Man hinh xem chi tiet LTT
  # --------------------------------------------------------------------------
  - id: S03
    code: "TT.OUT.MANUAL.S03"
    name: "Man hinh xem chi tiet LTT"
    type: DETAIL
    roles: ["Tat ca vai tro"]
    layout_description: >
      Read-only day du thong tin LTT, lich su thao tac (audit log), trang thai LTT,
      trang thai tich hop NHNN/NHTM/LKB, GL, QLT, QLChi, ECM, ket qua chu ky so.
    fields:
      - name: "Toan bo truong LTT"
        type: "Read-only"
        required: false
        description: "Hien thi day du thong tin header, khoan muc, nguoi chuyen, nguoi nhan."

      - name: "Lich su thao tac"
        type: "AuditLog"
        required: false
        description: "Danh sach cac thao tac da thuc hien tren LTT (create, edit, submit, approve...)."

      - name: "Trang thai tich hop"
        type: "Read-only"
        required: false
        description: "Trang thai tich hop voi NHNN/NHTM/LKB, GL, QLT, QLChi, ECM."

    actions:
      - name: "In"
        event: "EVT012-Print"
        type: SECONDARY
        description: "Sinh ban in (PDF) theo mau."

      - name: "Ket xuat Excel/PDF"
        event: "EVT017-Export"
        type: SECONDARY
        description: "Ket xuat chi tiet LTT ra file."

      - name: "Xem audit log"
        type: SECONDARY
        description: "Mo man hinh audit log chi tiet."

      - name: "Xem ma chung tu lien quan"
        type: SECONDARY
        description: "Hien thi danh sach ma chung tu lien quan (GL voucher, ECM doc...)."

      - name: "Quay lai"
        event: "EVT021-Back"
        type: SECONDARY
        description: "Tro ve man hinh S01, giu trang thai loc."

      - name: "Sua"
        event: "EVT022-Edit"
        type: SECONDARY
        description: "Mo S02 Edit-mode (chi Maker goc + DRAFT/RETURNED)."

      - name: "Sao chep"
        event: "EVT023-Copy"
        type: SECONDARY
        description: "Tao LTT moi clone tu LTT hien tai."

  # --------------------------------------------------------------------------
  # S04 — Hang doi kiem soat/phe duyet
  # --------------------------------------------------------------------------
  - id: S04
    code: "TT.OUT.MANUAL.S04"
    name: "Hang doi kiem soat/phe duyet"
    type: LIST
    roles: ["Nguoi kiem soat", "Nguoi phe duyet"]
    layout_description: >
      Danh sach LTT dang cho thao tac cua user theo don vi: cot Han xu ly,
      Muc do uu tien, Nguoi lap, So tien, Kenh, Trang thai.
    fields:
      - name: "Han xu ly"
        type: "Label"
        required: false
        description: "Thoi gian han xu ly cua LTT."

      - name: "Muc do uu tien"
        type: "Label"
        required: false
        description: "Muc do uu tien xu ly."

      - name: "Nguoi lap"
        type: "Label"
        required: false
        description: "Ten nguoi lap LTT."

      - name: "So tien"
        type: "Label"
        required: false
        description: "So tien LTT."

      - name: "Kenh"
        type: "Label"
        required: false
        description: "Kenh thanh toan."

      - name: "Trang thai"
        type: "Label"
        required: false
        description: "Trang thai hien tai cua LTT."

    actions:
      - name: "Phe duyet"
        event: "EVT006-Approve"
        type: PRIMARY
        description: "Phe duyet LTT (Checker -> Approver)."

      - name: "Tu choi/Tra lai"
        event: "EVT007-Reject"
        type: DANGER
        description: "Hien thi popup nhap ly do (S05)."

      - name: "Mo chi tiet"
        event: "EVT018-Detail"
        type: SECONDARY
        description: "Mo man hinh S03 read-only."

      - name: "Phe duyet hang loat"
        event: "EVT006-Approve"
        type: PRIMARY
        description: "Phe duyet nhieu LTT cung luc (multi-select)."

  # --------------------------------------------------------------------------
  # S05 — Man hinh tu choi/tra lai
  # --------------------------------------------------------------------------
  - id: S05
    code: "TT.OUT.MANUAL.S05"
    name: "Man hinh tu choi/tra lai"
    type: DIALOG
    roles: ["Nguoi kiem soat", "Nguoi phe duyet"]
    layout_description: >
      Popup nhap Ly do tu choi (Bat buoc, >=10 ky tu, <=500 ky tu).
      Luu nhat ky tu choi, gui notify cho Maker.
    fields:
      - name: "Ly do tu choi"
        type: "TextArea"
        required: true
        data_type: "String"
        validation: ["VAL-030", "BIZ-REJECT-REASON"]
        description: "Bat buoc nhap, do dai 10-500 ky tu."

    actions:
      - name: "Xac nhan tu choi"
        event: "EVT007-Reject"
        type: DANGER
        description: "Xac nhan tu choi, luu ly do, gui notify cho Maker/Checker."

      - name: "Huy thao tac"
        event: "EVT020-Exit"
        type: SECONDARY
        description: "Dong popup, khong thuc hien tu choi."

  # --------------------------------------------------------------------------
  # S06 — Man hinh huy/giam tru LTT da gui
  # --------------------------------------------------------------------------
  - id: S06
    code: "TT.OUT.MANUAL.S06"
    name: "Man hinh huy/giam tru LTT da gui"
    type: FORM
    roles: ["Nguoi phe duyet"]
    layout_description: >
      Cho phep huy LTT o trang thai da gui NH/KB nhung chua nhan callback success,
      hoac tao but toan dao (reverse) khi da thanh cong.
      Phai nhap Ly do huy va dinh kem chung tu minh chung.
    fields:
      - name: "Ly do huy"
        type: "TextArea"
        required: true
        data_type: "String"
        validation: ["VAL-030", "BIZ-REJECT-REASON"]
        description: "Bat buoc nhap, do dai 10-500 ky tu."

      - name: "Chung tu minh chung"
        type: "FileUpload"
        required: false
        description: "Dinh kem chung tu minh chung."

    actions:
      - name: "Huy LTT"
        event: "EVT008-Cancel"
        type: DANGER
