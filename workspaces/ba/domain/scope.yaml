mvp:

  # --------------------------------------------------------------------------
  # IN SCOPE — Cac tinh nang thuoc pham vi MVP
  # --------------------------------------------------------------------------
  in_scope:

    # === Core: Lap lenh thanh toan di thu cong ===

    - id: F01
      feature: "Lap lenh thanh toan di NHNN thu cong (TT.OUT.MANUAL)"
      description: "Maker tao, sua, xoa, gui LTT qua man hinh nhap tay. Ho tro da kenh (LNH/SP/LKB)."
      priority: MUST
      source_sheet: "1-Mo ta yeu cau, 2-Bang dac ta chuc nang"
      screens: [S01, S02, S07]
      rules_ref: [BIZ-IDGEN, BIZ-AUTOFILL, BIZ-EDIT-OWN, BIZ-DELETE-DRAFT, BIZ-EDIT-IMMUTABLE, BIZ-DELETE-SOFT]

    - id: F02
      feature: "Nhap thong tin LTT va kiem tra du lieu"
      description: "Nhap tay/chon tu DM cac truong thong tin LTT. Autofill tu DMHT09. Kiem tra rang buoc giua cac truong."
      priority: MUST
      source_sheet: "5.3-Mo ta Field Button, 5.4-Quy tac kiem tra du lieu"
      screens: [S02]
      rules_ref: [VAL-001..VAL-036, BIZ-COA-CROSS, BIZ-CROSS]

    - id: F03
      feature: "Kiem soat va phe duyet LTT (Maker-Checker-Approver)"
      description: "Quy trinh 3 cap: Maker gui → Checker kiem soat → Approver phe duyet. Tu choi tra lai kem ly do."
      priority: MUST
      source_sheet: "3-Phan quyen chuc nang, 2-Bang dac ta chuc nang"
      screens: [S03, S04]
      rules_ref: [BIZ-MAKER-CHECKER, BIZ-SOD, BIZ-REJECT-REASON, BIZ-NOTIFY]

    - id: F04
      feature: "Dinh tuyen kenh thanh toan (LNH/SP/LKB)"
      description: "He thong dinh tuyen kenh dua tren NH thu huong + COA. Uu tien theo bang Routing Priority."
      priority: MUST
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-CHANNEL-ROUTING]

    - id: F05
      feature: "Kiem soat gio cut-off (COT) cua kenh"
      description: "Chi cho phep tao/gui LTT trong gio giao dich. Sau COT chuyen sang ngay lam viec ke tiep (T+1)."
      priority: MUST
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-COT-CHECK]

    - id: F06
      feature: "Kiem tra han muc giao dich"
      description: "Kiem tra so tien LTT so voi han muc theo Kenh x Loai lenh x Vai tro x Don vi."
      priority: MUST
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-LIMIT]

    - id: F07
      feature: "Dat giu quy (Reserve fund) khi Submit"
      description: "Dat hold so du kha dung TK nguon = So tien LTT. Release khi Huy/Tu choi."
      priority: MUST
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-RESERVE-FUND, BIZ-RELEASE-HOLD]

    - id: F08
      feature: "Ky so LTT (TAD-COMM)"
      description: "Approver ky bang chung thu hop le, khong het han, dung ca nhan. Luu chu ky vao ECM, hash SHA-256."
      priority: MUST
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-SIGN-TAD-COMM]

    - id: F09
      feature: "Gui LTT qua gateway NHNN/KB"
      description: "Gui LTT qua gateway voi co che retry (3 lan, backoff 5/15/45s) va idempotency key."
      priority: MUST
      source_sheet: "7-Trang thai tich hop, 6-Outbound API Spec"
      rules_ref: [BIZ-RETRY, BIZ-CHANNEL-ROUTING]

    - id: F10
      feature: "Xu ly callback tu NH/KB"
      description: "Nhan callback success/fail tu NHNN/KB, chuyen trang thai LTT tuong ung."
      priority: MUST
      source_sheet: "7-Trang thai tich hop"
      states: [SENT → CONFIRMED / SEND_FAILED]

    - id: F11
      feature: "Hach toan GL (So cai) sau khi CONFIRMED"
      description: "GL post sau khi NH/KB xac nhan. Thanh cong → POSTED, That bai → POST_FAILED."
      priority: MUST
      source_sheet: "8-Trang thai giao dich"
      states: [CONFIRMED → POSTED / POST_FAILED]

    - id: F12
      feature: "State machine LTT (15 trang thai)"
      description: "Quan ly toan bo vong doi LTT: DRAFT → SUBMITTED → IN_CONTROL → APPROVED → SIGNED → SENT → CONFIRMED → POSTED + cac trang thai ngoai le."
      priority: MUST
      source_sheet: "8-Trang thai giao dich"
      rules_ref: [states.yaml]

    - id: F13
      feature: "Audit log moi thao tac"
      description: "Ghi nhan moi thao tac create/update/submit/approve/reject/cancel/sign/send voi user, timestamp, IP, oldValue→newValue."
      priority: MUST
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-AUDIT, BIZ-EDIT-AUDIT]

    - id: F14
      feature: "Publish event khi chuyen trang thai"
      description: "Sau moi chuyen trang thai LTT, publish event len message bus cho QLChi/QLT/So cai/ECM/Notification subscribe."
      priority: MUST
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-EVENT-PUBLISH]

    - id: F15
      feature: "Thong bao workflow (notification + email)"
      description: "Gui notification (in-app + email) cho user ke tiep trong workflow khi LTT chuyen trang thai."
      priority: MUST
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-NOTIFY]

    - id: F16
      feature: "Optimistic lock moi thao tac Sua/Xoa"
      description: "Su dung (id, version, updatedAt) cho moi thao tac Sua/Xoa. Version mismatch → tu choi (VAL-036)."
      priority: MUST
      source_sheet: "5.4-Quy tac kiem tra du lieu"
      rules_ref: [BIZ-OPTIMISTIC-LOCK, VAL-036]

    - id: F17
      feature: "Chong trung lap LTT"
      description: "Canh bao neu trong N phut gan nhat co LTT cung Don vi, NH nhan, So tien, So CT goc."
      priority: MUST
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-DUPLICATE]

    - id: F18
      feature: "Rang buoc ket hop cheo COA"
      description: "To hop cac segment COA phai hop le theo bang cau hinh QLT/QLChi (DMHT.COA-MATRIX)."
      priority: MUST
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-COA-CROSS]

    - id: F19
      feature: "Phan trang va sap xep danh sach LTT"
      description: "Phan trang mac dinh: page size=20, sort theo Ngay GD giam dan. Tuy chon page size 10/20/50/100."
      priority: MUST
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-001, BIZ-002]

    - id: F20
      feature: "Phan quyen chuc nang (4 vai tro + 5 SoD)"
      description: "Phan quyen theo Maker/Checker/Approver/Admin. Phan tach trach nhiem (SoD) ngiem ngat."
      priority: MUST
      source_sheet: "3-Phan quyen chuc nang"
      rules_ref: [permissions.yaml, SOD-001..SOD-005]

    - id: F21
      feature: "Xoa mem (Soft delete) LTT"
      description: "Xoa LTT la SOFT-DELETE: set is_deleted=true. So YCTT KHONG duoc tai su dung."
      priority: MUST
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-DELETE-SOFT]

    - id: F22
      feature: "Giao dien 7 man hinh chinh (S01-S07)"
      description: "Danh sach LTT (S01), Lap lenh (S02), Kiem soat (S03), Phe duyet (S04), Lich su (S05), Tra cuu DM (S06), Xac nhan Xoa (S07)."
      priority: MUST
      source_sheet: "4-Giao dien chuc nang"

    # === COULD / SHOULD — Tang gia tri nhung khong phai core ===

    - id: F23
      feature: "Tinh phi tu dong"
      description: "Tu dong tinh phi theo Kenh x Loai lenh x So tien theo bang phi. Lam tron theo quy dinh."
      priority: SHOULD
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-FEE-CALC]

    - id: F24
      feature: "Ty gia ngoai te"
      description: "Lay ty gia theo cau hinh (NHNN hang ngay). Vuot bien do ±2% canh bao Approver."
      priority: SHOULD
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-FX-RATE]

    - id: F25
      feature: "Lien ket hop dong/cam ket chi"
      description: "Kiem tra so du hop dong con lai >= So tien LTT, giam tru khi Approve."
      priority: SHOULD
      source_sheet: "5.5-Quy tac xu ly nghiep vu"
      rules_ref: [BIZ-CONTRACT-LINK]

    - id: F26
      feature: "Sao chep tu LTT mau / LTT da co"
      description: "Cho phep nhan ban tu LTT cu de giam thoi gian nhap."
      priority: COULD
      source_sheet: "2-Bang dac ta chuc nang"

    - id: F27
      feature: "Auto-save nhap dinh ky"
      description: "Tu dong luu nhap moi N giay khi Maker dang nhap."
      priority: COULD
      source_sheet: "2-Bang dac ta chuc nang"

    - id: F28
      feature: "Tu dong chuyen cap xu ly cao hon (Escalate SLA)"
      description: "Sau X gio chua kiem soat/phe duyet, tu dong chuyen sang cap xu ly cao hon."
      priority: COULD
      source_sheet: "2-Bang dac ta chuc nang"

    - id: F29
      feature: "Dao but toan (Reverse) cho LTT da POSTED"
      description: "Tao but toan dao cho LTT da hach toan. Cap phe duyet cao hon 1 cap."
      priority: COULD
      source_sheet: "2-Bang dac ta chuc nang"
      rules_ref: [BIZ-SIGN-TAD-COMM]

  # --------------------------------------------------------------------------
  # OUT OF SCOPE — Khong thuoc pham vi MVP
  # --------------------------------------------------------------------------
  out_of_scope:

    - feature: "TT.OUT.AUTO — Xu ly lenh thanh toan di tu dong"
      reason: "MVP chi tap trung vao LTT thu cong. LTT tu dong la chuc nang rieng (pattern F.3), can tich hop queue va gateway phuc tap hon."
      source_sheet: "0-Muc luc (III.1.1.1)"

    - feature: "TT.IN.* — Cac chuc nang lenh thanh toan den"
      reason: "MVP chi xu ly lenh di (TT.OUT). Lenh den (TT.IN.AUTO, TT.IN.MANUAL, TT.IN.COMPLETE) la pham vi tinh nang khac."
      source_sheet: "0-Muc luc (III.1.2)"

    - feature: "TT.RECALL.* — Thu hoi lenh thanh toan"
      reason: "Thu hoi lenh (TT.RECALL.REQ, TT.RECALL.RESP) la chuc nang phu, phu thuoc vao LTT da gui thanh cong."
      source_sheet: "0-Muc luc (III.1.3)"

    - feature: "TT.RECON.* — Doi soat (LNH, LKB, THCH, SETTLE)"
      reason: "Doi soat la chuc nang van hanh sau khi LTT da gui thanh cong va hach toan. Khong phai pham vi MVP."
      source_sheet: "0-Muc luc (III.1.4)"

    - feature: "TT.ERR.QUEUE / TT.ERR.RESEND — Xu ly giao dich loi hang doi"
      reason: "Xu ly giao dich loi trong hang doi la chuc nang van hanh. MVP chi can co DLQ co ban, xu ly chi tiet la phien ban sau."
      source_sheet: "0-Muc luc (III.1.5)"

    - feature: "TT.TRACE.OUT / TT.TRACE.IN — Tra soat giao dich"
      reason: "Tra soat la chuc nang xu ly lech trong doi soat. Phu thuoc vao doi soat da hoan thanh."
      source_sheet: "0-Muc luc (III.1.4.7, III.1.4.8)"

    - feature: "TT.IF.CALC — Tinh lai giao dich"
      reason: "Tinh lai la chuc nang rieng. MVP tap trung vao core thanh toan, tinh lai duoc day sang phien ban sau."
      source_sheet: "0-Muc luc (III.1.6)"

    - feature: "DMHT.* — Quan ly danh muc he thong (16 chuc nang)"
      reason: "Danh muc he thong (DMHT01-DMHT13, BANK_MAP, ROUTING...) la pham vi QLHT, khong thuoc pham vi TT.OUT.MANUAL. MVP su dung du lieu danh muc co san."
      source_sheet: "0-Muc luc (III.2)"

    - feature: "QLHT.* — Quan ly he thong (12 chuc nang)"
      reason: "Quan ly he thong (PERM_MANUAL, APPROVAL_TREE, PORT, BAL, CHANNEL...) la phan he rieng. MVP su dung cau hinh co san."
      source_sheet: "0-Muc luc (III.3)"

    - feature: "Kenh SP (Thanh toan song phuong) va LKB (Lien kho bac) — chi tiet gateway"
      reason: "MVP uu tien kenh LNH (CITAD). Cau hinh gateway chi tiet cho SP va LKB day sang phien ban sau. He thong van ho tro chon kenh SP/LKB tren giao dien nhung gateway chi tiet chua day du."
      source_sheet: "CONTEXT.md"

    - feature: "Bao cao / Thong ke nang cao"
      reason: "MVP chi cung cap xuat Excel/PDF co ban. Bao cao nang cao (dashboard, KPI, thong ke theo thoi gian) la phien ban sau."
      source_sheet: "1-Mo ta yeu cau"

    - feature: "Tich hop QLT (Quan ly thu)"
      reason: "Tich hop QLT (cap nhat phan he thu) la phien ban sau. MVP chi publish event cho QLT subscribe."
      source_sheet: "CONTEXT.md"

    - feature: "Tich hop ECM day du"
      reason: "MVP chi luu chu ky vao ECM co ban (BIZ-SIGN-TAD-COMM). Luu tru chung tu dien tu day du la phien ban sau."
      source_sheet: "CONTEXT.md"

  # --------------------------------------------------------------------------
  # ASSUMPTIONS — Gia dinh cua MVP
  # --------------------------------------------------------------------------
  assumptions:
    - "Kenh LNH (CITAD) la kenh uu tien va phat trien day du nhat trong MVP."
    - "He thong QLHT va DMHT da co san du lieu cau hinh truoc khi MVP vao van hanh."
    - " dich vu GL (So cai) da san sang nhan yeu cau hach toan tu MVP."
    - "IBM MQ da duoc trien khai va cau hinh cac hang doi LNH.SEND.Q / LNH.ACK.Q."
    - " dich vu TAD-COMM (ky so) da duoc tich hop va san sang."
    - "Oracle 19c da duoc cai dat va cau hinh, bao gom co che outbox."
    - "User co chung thu so hop le (HSM/USB token) de ky so."
    - "Bang gia han muc (BIZ-LIMIT) va bang phi (BIZ-FEE-CALC) duoc cau hinh truoc boi Admin."
    - "Cay phe duyet (APPROVAL_TREE) da duoc cau hinh cho cac KBNN tham gia MVP."
    - "Tieng Viet la ngon ngu chinh tren giao dien, tieng Anh dung cho code/log/audit."

  # --------------------------------------------------------------------------
  # DEPENDENCIES — Phu thuoc ben ngoai
  # --------------------------------------------------------------------------
  dependencies:
    - system: "GL (So cai)"
      type: "REST API"
      description: "Hach toan sau khi LTT CONFIRMED. Endpoint post journal entry."
      blocking: true

    - system: "IBM MQ"
      type: "Message Queue"
      description: "Gui/nhan tin nhan LNH. Hang doi SEND/ACK."
      blocking: true

    - system: "TAD-COMM"
      type: "External Service"
      description: "Ky so LTT bang chung thu so."
      blocking: true

    - system: "DMHT (Danh muc he thong)"
      type: "Database / API"
      description: "Cung cap du lieu danh muc (DMHT01-13, COA-MATRIX)."
      blocking: true

    - system: "QLHT.PERM_MANUAL + APPROVAL_TREE"
      type: "Database / API"
      description: "Cau hinh quyen va cay phe duyet."
      blocking: true

    - system: "QLHT.BAL"
      type: "REST API"
      description: "Kiem tra realtime so du TK NHTM/NHNN."
      blocking: true

    - system: "NHNN/CITAD Gateway"
      type: "External Gateway"
      description: "Gui LTT va nhan callback tu NHNN."
      blocking: true

    - system: "OpenShift (OCP 4.x)"
      type: "Infrastructure"
      description: "Hạ tang trien khai — Kubernetes, Helm, ArgoCD."
      blocking: true

    - system: "ECM"
      type: "External Service"
      description: "Luu tru chung tu, chu ky dien tu."
      blocking: false
      note: "MVP co the dung luu tru tam thoi, tich hop day du sau."

    - system: "QLChi"
      type: "Event Subscriber"
      description: "Giam tru so du hop dong khi Approve."
      blocking: false
      note: "MVP chi publish event, QLChi subscribe sau."

    - system: "Email / Notification"
      type: "External Service"
      description: "Gui thong bao cho user trong workflow."
      blocking: false
      note: "Co the dung in-app notification truoc, email sau."
