# ============================================================================
# OpenAPI 3.1 — Internal BFF API (Frontend -> BFF)
# Module: TT.OUT.MANUAL — Lenh thanh toan di NHNN thu cong
# Source: workspaces/ba/domain/api-spec.yaml + screens.yaml
# Generated: 2026-05-10 | Stage 2 — SA
# $comment: Generated by SA Agent. Contract-first: BE code sinh tu spec nay.
# ============================================================================
openapi: 3.1.0
info:
  title: VDBAS TT.OUT.MANUAL — Internal BFF API
  description: >
    API noi bo giua Frontend (React BFF) va Backend (Spring Boot).
    Ho tro toan bo vong doi LTT: tao, sua, gui kiem soat, phe duyet, ky so,
    gui NHNN/KB, nhan callback, hach toan GL, dao but toan.
    Tuân thu: Contract-first, Optimistic lock, Idempotency, Maker-Checker-Approver.
  version: 1.0.0
  contact:
    name: VDBAS SA Team
    email: sa@vdbas.kbnn.gov.vn
  license:
    name: Internal — KBNN
    url: https://vdbas.kbnn.gov.vn/license

servers:
  - url: https://vdbas-internal.kbnn.gov.vn
    description: Production (OCP on-prem)
  - url: https://vdbas-internal-staging.kbnn.gov.vn
    description: Staging
  - url: http://localhost:8080
    description: Local development

# ----------------------------------------------------------------------------
# Security — BFF token + Role-based
# ----------------------------------------------------------------------------
security:
  - BearerAuth: []
  - HeadersAuth: []

tags:
  - name: Payment Orders
    description: Quan ly LTT — CRUD + workflow (Maker/Checker/Approver)
  - name: Payment Order Actions
    description: Thao tac workflow — submit, approve, reject, sign, send, cancel, reverse
  - name: Reference Data
    description: Du lieu danh muc — kenh, COA segments, NH/KB
  - name: Balance
    description: Kiem tra so du tai khoan

paths:
  # ==========================================================================
  # Payment Orders — CRUD
  # ==========================================================================
  /api/internal/v1/payment-orders:
    get:
      operationId: listPaymentOrders
      summary: Tra cuu danh sach LTT
      description: >
        Tra cuu LTT voi phan trang, loc, sap xep.
        Mac dinh: page=0, size=20, sort=paymentDate,desc (BIZ-002).
        Chi hien thi LTT cua don vi user va theo vai tro (permissions.yaml).
      tags: [Payment Orders]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: So trang (0-based).
        - name: size
          in: query
          schema:
            type: integer
            enum: [10, 20, 50, 100]
            default: 20
          description: So ban ghi moi trang. Mac dinh 20 (BIZ-002).
        - name: sort
          in: query
          schema:
            type: string
            default: paymentDate,desc
          description: "Sap xep. Cu phap: field,direction. Vi du: paymentDate,desc"
        - name: channel
          in: query
          schema:
            type: string
            enum: [LNH, SP, LKB]
          description: Loc theo kenh thanh toan.
        - name: orderType
          in: query
          schema:
            type: string
          description: Loc theo loai lenh.
        - name: status
          in: query
          schema:
            type: string
            enum:
              - DRAFT
              - SUBMITTED
              - IN_CONTROL
              - RETURNED_TO_MAKER
              - RETURNED_TO_CHECKER
              - APPROVED
              - SIGNED
              - SENT
              - SEND_FAILED
              - CONFIRMED
              - POSTED
              - POST_FAILED
              - CANCELLED
              - REVERSED
              - BLOCKED
          description: Loc theo trang thai.
        - name: unitCode
          in: query
          schema:
            type: string
          description: Loc theo ma don vi KBNN.
        - name: paymentDateFrom
          in: query
          schema:
            type: string
            format: date
          description: Tu ngay thanh toan (VAL-004).
        - name: paymentDateTo
          in: query
          schema:
            type: string
            format: date
          description: Den ngay thanh toan (VAL-004).
        - name: requestNumber
          in: query
          schema:
            type: string
            maxLength: 30
          description: Loc theo so YCTT.
        - name: senderBankCode
          in: query
          schema:
            type: string
          description: Loc theo ma NH/KB chuyen.
        - name: receiverBankCode
          in: query
          schema:
            type: string
          description: Loc theo ma NH/KB nhan.
        - name: amountFrom
          in: query
          schema:
            type: number
            minimum: 0
          description: Loc tu so tien.
        - name: amountTo
          in: query
            schema:
            type: number
            minimum: 0
          description: Loc den so tien.
      responses:
        "200":
          description: Danh sach LTT phan trang.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrderListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      operationId: createPaymentOrder
      summary: Tao moi LTT (Lap lenh)
      description: >
        Tao LTT moi. Yeu cau Idempotency-Key header.
        He thong tu sinh requestNumber (BIZ-IDGEN), autofill thong tin (BIZ-AUTOFILL).
        Kiem tra VAL-* + BIZ rules khi submit.
      tags: [Payment Orders]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentOrderCreateRequest"
      responses:
        "201":
          description: Tao LTT thanh cong.
          headers:
            ETag:
              description: Version hien tai cua LTT (dung cho If-Match o PUT/DELETE).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ==========================================================================
  # Payment Orders — Detail / Update / Delete
  # ==========================================================================
  /api/internal/v1/payment-orders/{id}:
    get:
      operationId: getPaymentOrder
      summary: Xem chi tiet LTT
      description: >
        Lay chi tiet LTT theo id. Ho tro optimistic lock qua ETag header.
        Chi xem LTT trong pham vi don vi user va theo vai tro.
      tags: [Payment Orders]
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
      responses:
        "200":
          description: Chi tiet LTT.
          headers:
            ETag:
              description: Version hien tai (dung cho If-Match).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      operationId: updatePaymentOrder
      summary: Cap nhat LTT nhap (DRAFT / RETURNED_TO_MAKER)
      description: >
        Cap nhat LTT o trang thai DRAFT hoac RETURNED_TO_MAKER.
        Yeu cau If-Match header de optimistic lock (BIZ-OPTIMISTIC-LOCK, VAL-036).
        Chi Maker goc duoc sua (BIZ-EDIT-OWN, VAL-032).
        Immutable fields khong duoc thay doi (BIZ-EDIT-IMMUTABLE, VAL-034).
      tags: [Payment Orders]
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentOrderUpdateRequest"
      responses:
        "200":
          description: Cap nhat thanh cong.
          headers:
            ETag:
              description: Version moi sau cap nhat.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "423":
          $ref: "#/components/responses/Locked"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      operationId: deletePaymentOrder
      summary: Xoa LTT nhap (soft-delete)
      description: >
        Soft-delete LTT o trang thai DRAFT hoac RETURNED_TO_MAKER.
        Yeu cau If-Match header va ly do xoa (BIZ-DELETE-DRAFT, BIZ-DELETE-SOFT).
        Chi Maker goc duoc xoa (VAL-032). Ly do >= 10 ky tu (VAL-030).
        Release hold quy neu co (BIZ-RELEASE-HOLD).
      tags: [Payment Orders]
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteRequest"
      responses:
        "200":
          description: Xoa thanh cong (soft-delete).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ==========================================================================
  # Payment Order Actions — Workflow
  # ==========================================================================
  /api/internal/v1/payment-orders/{id}/submit:
    post:
      operationId: submitPaymentOrder
      summary: Gui kiem soat LTT
      description: >
        Maker gui LTT de Checker kiem soat. Validate day du VAL-* + BIZ rules.
        Dat giu quy (BIZ-RESERVE-FUND). Chuyen trang thai DRAFT -> SUBMITTED.
        Kiem tra duplicate (BIZ-DUPLICATE) va cut-off (BIZ-COT-CHECK).
      tags: [Payment Order Actions]
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Gui kiem soat thanh cong.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/internal/v1/payment-orders/{id}/approve:
    post:
      operationId: approvePaymentOrder
      summary: Phe duyet LTT (Checker hoac Approver)
      description: >
        Checker phe duyet kiem soat (SUBMITTED -> IN_CONTROL).
        Approver phe duyet cuoi (IN_CONTROL -> APPROVED).
        Enforce SoD: Checker != Maker, Approver != Checker != Maker (BIZ-SOD).
      tags: [Payment Order Actions]
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Phe duyet thanh cong.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/internal/v1/payment-orders/{id}/reject:
    post:
      operationId: rejectPaymentOrder
      summary: Tu choi LTT
      description: >
        Checker tu choi (SUBMITTED -> RETURNED_TO_MAKER).
        Approver tu choi (IN_CONTROL -> RETURNED_TO_CHECKER).
        Bat buoc nhap ly do 10-500 ky tu (VAL-030, BIZ-REJECT-REASON).
        Enforce SoD. Release hold quy (BIZ-RELEASE-HOLD).
      tags: [Payment Order Actions]
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectRequest"
      responses:
        "200":
          description: Tu choi thanh cong.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/internal/v1/payment-orders/{id}/sign:
    post:
      operationId: signPaymentOrder
      summary: Ky so LTT
      description: >
        Approver ky so LTT (APPROVED -> SIGNED).
        Yeu cau chung thu so hop le, chua het han (BIZ-SIGN-TAD-COMM).
        Luu chu ky vao ECM, hash SHA-256.
      tags: [Payment Order Actions]
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignRequest"
      responses:
        "200":
          description: Ky so thanh cong.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/internal/v1/payment-orders/{id}/send:
    post:
      operationId: sendPaymentOrder
      summary: Gui LTT sang NHNN/KB
      description: >
        Gui LTT da ky so qua Outbound Gateway (SIGNED -> SENT).
        Dinh tuyen theo kenh LNH/SP/LKB (BIZ-CHANNEL-ROUTING).
        Retry 3 lan voi backoff 5/15/45s (BIZ-RETRY).
      tags: [Payment Order Actions]
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Gui thanh cong, cho callback.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/internal/v1/payment-orders/{id}/cancel:
    post:
      operationId: cancelPaymentOrder
      summary: Huy LTT
      description: >
        Huy LTT (SIGNED -> CANCELLED). Release hold quy (BIZ-RELEASE-HOLD).
        Bat buoc nhap ly do 10-500 ky tu (VAL-030).
      tags: [Payment Order Actions]
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelRequest"
      responses:
        "200":
          description: Huy thanh cong.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/internal/v1/payment-orders/{id}/reverse:
    post:
      operationId: reversePaymentOrder
      summary: Tao but toan dao
      description: >
        Tao LTT dao cho LTT da POSTED (POSTED -> REVERSED).
        Sinh LTT dao moi, chay chu trinh Maker-Checker-Approver (BIZ-SOD).
        Approver dao phai khac Approver goc (SOD-005).
      tags: [Payment Order Actions]
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReverseRequest"
      responses:
        "201":
          description: Tao LTT dao thanh cong.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/internal/v1/payment-orders/{id}/audit-trail:
    get:
      operationId: getAuditTrail
      summary: Xem lich su thao tac LTT
      description: >
        Xem toan bo audit log cua LTT: create, edit, submit, approve, reject,
        sign, send, confirm, post, reverse, cancel.
        Bao gom diff cap truong khi sua (BIZ-EDIT-AUDIT).
      tags: [Payment Orders]
      parameters:
        - $ref: "#/components/parameters/PaymentOrderId"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Lich su thao tac LTT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditTrailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ==========================================================================
  # Reference Data
  # ==========================================================================
  /api/internal/v1/dm/channels:
    get:
      operationId: getChannels
      summary: Lay danh muc kenh thanh toan
      description: >
        Tra ve danh muc kenh thanh toan (LNH, SP, LKB).
        Nguon DM-CHANNEL trong coa-segments.yaml.
      tags: [Reference Data]
      responses:
        "200":
          description: Danh muc kenh.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RefDataItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/internal/v1/dm/coa-segments:
    get:
      operationId: getCoaSegments
      summary: Lay danh muc COA segments
      description: >
        Tra ve toan bo danh muc COA segments (18 danh muc).
        Nguon coa-segments.yaml. Ho tro loc theo loai danh muc.
      tags: [Reference Data]
      parameters:
        - name: segmentType
          in: query
          schema:
            type: string
            enum:
              - DM-MAQUY
              - DM-TK
              - DM-CAPNS
              - DM-CHUONG
              - DM-NGANHKT
              - DM-NDKT
              - DM-DVQHNS
              - DM-DIABAN
              - DM-CTMT
              - DM-MN
              - DM-KB
              - DM-DP
              - DM-ORDER-TYPE
              - DM-TXN-TYPE
              - DM-FEE-TYPE
              - DM-CURRENCY
              - DM-BANK
              - DM-CHANNEL
          description: Loc theo loai danh muc. Bo trong de lay tat ca.
        - name: keyword
          in: query
          schema:
            type: string
          description: Tim kiem theo ma hoac ten.
      responses:
        "200":
          description: Danh muc COA segments.
          content:
            application/json:
              schema:
                type: object
                properties:
                  segmentType:
                    type: string
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/CoaSegmentItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ==========================================================================
  # Balance
  # ==========================================================================
  /api/internal/v1/balance:
    get:
      operationId: getBalance
      summary: Kiem tra so du tai khoan
      description: >
        Kiem tra so du kha dung truoc khi Submit/Approve.
        Goi toi Core Account (API-008). Co cache 30s.
        Timeout 5s.
      tags: [Balance]
      parameters:
        - name: accountNumber
          in: query
          required: true
          schema:
            type: string
        - name: currency
          in: query
          schema:
            type: string
            default: VND
        - name: asOfDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Thong tin so du.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

# ============================================================================
# Components
# ============================================================================
components:

  # --------------------------------------------------------------------------
  # Security Schemes
  # --------------------------------------------------------------------------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    HeadersAuth:
      type: apiKey
      in: header
      name: X-User-Id

  # --------------------------------------------------------------------------
  # Parameters
  # --------------------------------------------------------------------------
  parameters:
    PaymentOrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID cua LTT (UUID v4).

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: >
        Ma dinh danh duy nhiem cho moi request POST.
        Dam bao khong xu ly trung lap. Server tra ket qua cu neu trung key.

    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
      description: >
        Version hien tai cua LTT (ETag) de optimistic lock.
        Neu khac version server thi tra 409 (VAL-036).

  # --------------------------------------------------------------------------
  # Reusable Responses
  # --------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Request khong hop le.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "400"
            message: "Tham so request khong hop le"

    Unauthorized:
      description: Chua xac thuc hoac token het han.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "401"
            message: "Chua xac thuc"

    Forbidden:
      description: Khong co quyen thuc hien thao tac.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "403"
            message: "Khong co quyen thuc hien thao tac nay"

    NotFound:
      description: Khong tim thay LTT.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "404"
            message: "Khong tim thay LTT"

    Conflict:
      description: Xung dot (version mismatch, duplicate, state conflict).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "409"
            message: "Ban ghi da bi thay doi tu phien khac. Vui long tai lai truoc khi tiep tuc"

    PreconditionFailed:
      description: Trang thai khong cho phep thao tac (VAL-031).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "412"
            message: "LTT dang o trang thai khong cho phep sua/xoa"

    ValidationError:
      description: Loi validate nghiep vu (VAL-* rules).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"

    Locked:
      description: LTT dang bi khoa boi user khac (VAL-033).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "423"
            message: "LTT dang duoc user khac chinh sua, vui long thu lai sau"

    InternalServerError:
      description: Loi he thong.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "500"
            message: "Loi he thong, vui long thu lai sau"

  # --------------------------------------------------------------------------
  # Schemas
  # --------------------------------------------------------------------------
  schemas:

    # ---- PaymentOrder (full canonical model) ----
    PaymentOrder:
      title: PaymentOrder
      description: >
        Model day du cua LTT. Tuong ung voi toan bo truong S02 (57 truong).
        Tham chieu JSON Schema: payment-order-v1.json.
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Khoa chinh LTT.
        version:
          type: integer
          description: Phien ban optimistic lock.
        status:
          type: string
          enum:
            - DRAFT
            - SUBMITTED
            - IN_CONTROL
            - RETURNED_TO_MAKER
            - RETURNED_TO_CHECKER
            - APPROVED
            - SIGNED
            - SENT
            - SEND_FAILED
            - CONFIRMED
            - POSTED
            - POST_FAILED
            - CANCELLED
            - REVERSED
            - BLOCKED
          description: Trang thai hien tai.
        requestNumber:
          type: string
          description: So YCTT.
        channel:
          type: string
          description: Kenh thanh toan.
        orderType:
          type: string
          description: Loai lenh.
        transactionType:
          type: string
          nullable: true
          description: Loai giao dich (chi LNH).
        senderBankCode:
          type: string
          description: Ma NH chuyen.
        senderBankName:
          type: string
          description: Ten NH chuyen.
        receiverBankCode:
          type: string
          description: Ma NH nhan.
        receiverBankName:
          type: string
          description: Ten NH nhan.
        paymentDate:
          type: string
          format: date
          description: Ngay thanh toan.
        amount:
          type: number
          description: So tien chuyen.
          examples: [150000000.00]
        currency:
          type: string
          description: Loai tien.
          examples: ["VND"]
        exchangeRate:
          type: number
          nullable: true
          description: Ty gia.
        originalDocNo:
          type: string
          nullable: true
          description: So chung tu goc.
        originalDocDate:
          type: string
          format: date
          nullable: true
          description: Ngay chung tu goc.
        feeType:
          type: string
          nullable: true
          description: Loai phi.
        debitCurrency:
          type: string
          nullable: true
          description: Ma ngoai te trich no.
        paymentCurrency:
          type: string
          nullable: true
          description: Ma ngoai te thanh toan.
        foreignAmount:
          type: number
          nullable: true
          description: So tien ngoai te.
        paymentContent:
          type: string
          description: Noi dung thanh toan.
        makerId:
          type: string
          description: Ma nguoi lap.
        makerName:
          type: string
          description: Ten nguoi lap.
        createdAt:
          type: string
          format: date-time
          description: Thoi gian tao.
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/LineItem"
          description: Danh sach khoan muc COA.
        senderInfo:
          $ref: "#/components/schemas/SenderInfo"
        receiverInfo:
          $ref: "#/components/schemas/ReceiverInfo"
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentInfo"
          description: Danh sach tep dinh kem.
        checkerId:
          type: string
          nullable: true
          description: Ma nguoi kiem soat.
        checkerName:
          type: string
          nullable: true
          description: Ten nguoi kiem soat.
        checkedAt:
          type: string
          format: date-time
          nullable: true
          description: Thoi gian kiem soat.
        approverId:
          type: string
          nullable: true
          description: Ma nguoi phe duyet.
        approverName:
          type: string
          nullable: true
          description: Ten nguoi phe duyet.
        approvedAt:
          type: string
          format: date-time
          nullable: true
          description: Thoi gian phe duyet.
        signedAt:
          type: string
          format: date-time
          nullable: true
          description: Thoi gian ky so.
        providerRefId:
          type: string
          nullable: true
          description: Ma tham chieu tu NH/KB.
        settlementDate:
          type: string
          format: date
          nullable: true
          description: Ngay quyet toan.
        glVoucherNo:
          type: string
          nullable: true
          description: So chung tu GL.
        reversalOfId:
          type: string
          format: uuid
          nullable: true
          description: ID LTT goc (neu la LTT dao).
        holdAmount:
          type: number
          nullable: true
          description: So tien giu quy.
        rejectReason:
          type: string
          nullable: true
          description: Ly do tu choi.
        isDeleted:
          type: boolean
          description: Danh dau xoa mem.
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: Thoi gian cap nhat cuoi.
        updatedBy:
          type: string
          nullable: true
          description: Nguoi cap nhat cuoi.

    # ---- LineItem (COA khoan muc) ----
    LineItem:
      type: object
      description: Khoan muc COA chi tiet (11 segment).
      properties:
        id:
          type: string
          format: uuid
        fundCode:
          type: string
          description: Ma quy (2 ky tu).
          examples: ["01"]
        naturalAccount:
          type: string
          description: TK tu nhien (4 ky tu).
          examples: ["1121"]
        dvqhns:
          type: string
          description: DVQHNS (7 ky tu).
          examples: ["1054321"]
        budgetLevel:
          type: string
          description: Cap NS (1 ky tu).
          examples: ["1"]
        chapter:
          type: string
          description: Chuong (3 ky tu).
          examples: ["168"]
        economicSector:
          type: string
          description: Nganh KT (3 ky tu).
          examples: ["080"]
        ndkt:
          type: string
          description: NDKT (4 ky tu).
          examples: ["6000"]
        area:
          type: string
          description: Dia ban (5 ky tu).
          examples: ["00001"]
        program:
          type: string
          description: CTMT (5 ky tu).
          examples: ["00000"]
        fundSource:
          type: string
          description: Ma nguon kinh phi (2 ky tu).
          examples: ["14"]
        treasuryCode:
          type: string
          description: Ma kho bac (4 ky tu).
          examples: ["0010"]
        reserve:
          type: string
          description: Ma du phong (3 ky tu).
          examples: ["000"]
        description:
          type: string
          description: Dien giai khoan muc.
        itemAmount:
          type: number
          description: So tien chi tiet.
          examples: [150000000.00]

    # ---- SenderInfo (Nguoi chuyen) ----
    SenderInfo:
      type: object
      description: Thong tin nguoi chuyen tien.
      properties:
        name:
          type: string
        address:
          type: string
        accountNumber:
          type: string
        customerCode:
          type: string
          nullable: true
        bankCode:
          type: string
        bankName:
          type: string
        identityDoc:
          type: string
          nullable: true
        identityDocIssueDate:
          type: string
          format: date
          nullable: true
        identityDocIssuePlace:
          type: string
          nullable: true
        tpcpCode:
          type: string
          nullable: true

    # ---- ReceiverInfo (Nguoi nhan) ----
    ReceiverInfo:
      type: object
      description: Thong tin nguoi nhan tien.
      properties:
        name:
          type: string
        address:
          type: string
          nullable: true
        accountNumber:
          type: string
        bankCode:
          type: string
        bankName:
          type: string
        accountName:
          type: string
        identityDoc:
          type: string
          nullable: true
        identityDocIssueDate:
          type: string
          format: date
          nullable: true
        identityDocIssuePlace:
          type: string
          nullable: true

    # ---- AttachmentInfo ----
    AttachmentInfo:
      type: object
      description: Thong tin tep dinh kem.
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
        fileSize:
          type: integer
        contentType:
          type: string
        uploadedBy:
          type: string
        uploadedAt:
          type: string
          format: date-time

    # ---- Request / Response DTOs ----
    PaymentOrderCreateRequest:
      type: object
      description: >
        Request tao moi LTT. Cac truong autofill bo qua: senderBankCode, makerId, makerName, createdAt.
        requestNumber co the bo trong de he thong tu sinh (BIZ-IDGEN).
      properties:
        requestNumber:
          type: string
          nullable: true
          maxLength: 30
          description: "So YCTT. Bo trong de tu sinh. Pattern LNH: ddMMyyyy + seq."
        channel:
          type: string
          enum: [LNH, SP, LKB]
          description: "Kenh thanh toan. Bat buoc."
        orderType:
          type: string
          description: "Loai lenh. Bat buoc."
        transactionType:
          type: string
          nullable: true
          description: "Loai giao dich. Bat buoc khi Kenh = LNH (VAL-017)."
        receiverBankCode:
          type: string
          description: "Ma NH nhan. Bat buoc."
        paymentDate:
          type: string
          format: date
          description: "Ngay thanh toan. Mac dinh ngay lam viec."
        amount:
          type: number
          description: "So tien chuyen. Phai > 0."
        currency:
          type: string
          default: VND
          description: "Loai tien."
        exchangeRate:
          type: number
          nullable: true
          description: "Ty gia. Bat buoc khi ngoai te."
        originalDocNo:
          type: string
          nullable: true
          description: "So chung tu goc. Bat buoc khi SP."
        originalDocDate:
          type: string
          format: date
          nullable: true
        feeType:
          type: string
          nullable: true
        debitCurrency:
          type: string
          nullable: true
        paymentCurrency:
          type: string
          nullable: true
        foreignAmount:
          type: number
          nullable: true
        paymentContent:
          type: string
          description: "Noi dung thanh toan. Bat buoc."
        lineItems:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/LineItem"
        senderInfo:
          $ref: "#/components/schemas/SenderInfo"
        receiverInfo:
          $ref: "#/components/schemas/ReceiverInfo"
      required:
        - channel
        - orderType
        - receiverBankCode
        - paymentDate
        - amount
        - currency
        - paymentContent
        - lineItems
        - senderInfo
        - receiverInfo

    PaymentOrderUpdateRequest:
      type: object
      description: >
        Request cap nhat LTT nhap. Chi bao gom cac truong duoc phep sua.
        Immutable fields (requestNumber, makerId, createdAt) se bi loai bo neu gui len (VAL-034).
      properties:
        channel:
          type: string
          enum: [LNH, SP, LKB]
        orderType:
          type: string
        transactionType:
          type: string
          nullable: true
        receiverBankCode:
          type: string
        paymentDate:
          type: string
          format: date
        amount:
          type: number
        currency:
          type: string
        exchangeRate:
          type: number
          nullable: true
        originalDocNo:
          type: string
          nullable: true
        originalDocDate:
          type: string
          format: date
          nullable: true
        feeType:
          type: string
          nullable: true
        debitCurrency:
          type: string
          nullable: true
        paymentCurrency:
          type: string
          nullable: true
        foreignAmount:
          type: number
          nullable: true
        paymentContent:
          type: string
        lineItems:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/LineItem"
        senderInfo:
          $ref: "#/components/schemas/SenderInfo"
        receiverInfo:
          $ref: "#/components/schemas/ReceiverInfo"

    PaymentOrderListResponse:
      type: object
      description: Phan trang danh sach LTT.
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/PaymentOrderSummary"
        page:
          type: object
          properties:
            number:
              type: integer
              description: So trang hien tai (0-based).
            size:
              type: integer
              description: So ban ghi moi trang.
            totalElements:
              type: integer
              description: Tong so ban ghi.
            totalPages:
              type: integer
              description: Tong so trang.

    PaymentOrderSummary:
      type: object
      description: Tom tat LTT cho danh sach.
      properties:
        id:
          type: string
          format: uuid
        requestNumber:
          type: string
        channel:
          type: string
        orderType:
          type: string
        senderBankCode:
          type: string
        senderBankName:
          type: string
        receiverBankCode:
          type: string
        receiverBankName:
          type: string
        paymentDate:
          type: string
          format: date
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
        makerName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer

    # ---- Workflow Request DTOs ----
    RejectRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          minLength: 10
          maxLength: 500
          description: "Ly do tu choi. Bat buoc 10-500 ky tu (VAL-030, BIZ-REJECT-REASON)."

    CancelRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          minLength: 10
          maxLength: 500
          description: "Ly do huy. Bat buoc 10-500 ky tu (VAL-030)."

    SignRequest:
      type: object
      required:
        - signatureData
        - signerCert
      properties:
        signatureData:
          type: string
          format: base64
          description: "Du lieu chu ky so (XML/JSON da ky). Bat buoc."
        signerCert:
          type: string
          description: "Chung thu so nguoi ky. Bat buoc (BIZ-SIGN-TAD-COMM)."

    ReverseRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          minLength: 10
          maxLength: 500
          description: "Ly do dao but toan. Bat buoc."
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentInfo"
          description: "Chung tu minh chung kem theo."

    DeleteRequest:
      type: object
      required:
        - reason
        - confirmed
      properties:
        reason:
          type: string
          minLength: 10
          maxLength: 500
          description: "Ly do xoa. Bat buoc 10-500 ky tu (VAL-030)."
        confirmed:
          type: boolean
          description: "Tick xac nhan da ra soat (VAL-035)."

    DeleteResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          examples: ["DELETED"]
        deletedAt:
          type: string
          format: date-time

    # ---- Audit ----
    AuditTrailResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
        page:
          type: object
          properties:
            number:
              type: integer
            size:
              type: integer
            totalElements:
              type: integer
            totalPages:
              type: integer

    AuditEntry:
      type: object
      description: Mot dong audit log.
      properties:
        id:
          type: string
          format: uuid
        paymentOrderId:
          type: string
          format: uuid
        action:
          type: string
          description: "Thao tac: CREATE, EDIT, SUBMIT, APPROVE_CHECK, APPROVE, REJECT, SIGN, SEND, CANCEL, REVERSE, DELETE_DRAFT, BLOCK, UNBLOCK, CONFIRM, POST, RELEASE_HOLD"
        userId:
          type: string
        userName:
          type: string
        userRole:
          type: string
        timestamp:
          type: string
          format: date-time
        previousStatus:
          type: string
          nullable: true
        newStatus:
          type: string
          nullable: true
        version:
          type: integer
          nullable: true
        diffs:
          type: array
          nullable: true
          items:
            type: object
            properties:
              field:
                type: string
              oldValue:
                type: string
                nullable: true
              newValue:
                type: string
                nullable: true
          description: "Diff cap truong khi EDIT (BIZ-EDIT-AUDIT)."
        reason:
          type: string
          nullable: true
          description: "Ly do (khi reject/cancel/delete)."
        ipAddress:
          type: string
          nullable: true
        auditHash:
          type: string
          description: "Hash kiem toan chuoi (SHA-256)."

    # ---- Balance ----
    BalanceResponse:
      type: object
      description: Thong tin so du tai khoan (API-008).
      properties:
        accountNumber:
          type: string
        currency:
          type: string
        balance:
          type: number
          description: So du hien tai.
        holdAmount:
          type: number
          description: So tien dang giu.
        availableBalance:
          type: number
          description: So du kha dung = balance - holdAmount.
        asOfTimestamp:
          type: string
          format: date-time
          description: Thoi diem so du.

    # ---- Reference Data ----
    RefDataItem:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string

    CoaSegmentItem:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        channel:
          type: string
          nullable: true
          description: "Kenh (chi cho DM-ORDER-TYPE, DM-TXN-TYPE)."
        status:
          type: string
        description:
          type: string
          nullable: true

    # ---- Error ----
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: "Ma loi. Vi du: 400, 404, 409, 500."
        message:
          type: string
          description: "Thong bao loi."
        traceId:
          type: string
          description: "ID truy vet de debug."
        timestamp:
          type: string
          format: date-time

    ValidationErrorResponse:
      type: object
      description: >
        Loi validate nghiep vu. Moi violation tuong ung voi 1 quy tac VAL-*.
        Ma loi VAL map truc tiep tu validation-rules.yaml (36 rules).
      required:
        - code
        - message
        - violations
      properties:
        code:
          type: string
          examples: ["422"]
        message:
          type: string
          examples: ["Validate that bai"]
        traceId:
          type: string
        timestamp:
          type: string
          format: date-time
        violations:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - rule
              - field
              - message
            properties:
              rule:
                type: string
                description: "Ma quy tac VAL. Vi du: E-VAL-001, E-VAL-005, E-VAL-014..."
                examples:
                  - "E-VAL-001"
                  - "E-VAL-005"
                  - "E-VAL-009"
                  - "E-VAL-014"
                  - "E-VAL-019"
                  - "E-VAL-030"
                  - "E-VAL-036"
              field:
                type: string
                description: "Ten truong bi loi.camelCase."
                examples:
                  - "channel"
                  - "amount"
                  - "receiverBankCode"
                  - "lineItems[0].ndkt"
                  - "reason"
              message:
                type: string
                description: "Thong bao loi chi tiet (tieng Viet)."
                examples:
                  - "Gia tri khong nam trong danh muc"
                  - "Vui long nhap So tien chuyen"
                  - "NH chuyen va NH nhan khong duoc trung nhau"
                  - "So tien phai lon hon 0"
                  - "To hop COA khong hop le tai ndkt"
                  - "Vui long nhap ly do toi thieu 10 ky tu"
                  - "Ban ghi da bi thay doi tu phien khac"

# ============================================================================
# Global Headers (applied via security scheme + parameters)
# ============================================================================
# Moi request phai kem theo:
#   X-Request-Id: UUID — ID truy vet request
#   X-User-Id: string — Ma nguoi dung hien tai
#   X-User-Role: MAKER | CHECKER | APPROVER | ADMIN — Vai tro
#   Idempotency-Key: UUID — Cho moi POST (tao, submit, approve, reject, sign, send, cancel, reverse)
#   If-Match: string — Cho PUT, DELETE (optimistic lock)
# ============================================================================