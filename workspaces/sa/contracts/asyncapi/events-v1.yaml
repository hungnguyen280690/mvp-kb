# ============================================================================
# AsyncAPI 3.0 — MQ Events (TT.OUT.MANUAL)
# Module: Lenh thanh toan di NHNN thu cong
# Source: workspaces/ba/domain/events.yaml (22 events) + states.yaml
# Generated: 2026-05-10 | Stage 2 — SA
# $comment: Generated by SA Agent. Contract-first: BE code sinh tu spec nay.
# ============================================================================
asyncapi: 3.0.0
info:
  title: VDBAS TT.OUT.MANUAL — MQ Event Contracts
  description: >
    Dinh nghia toan bo su kien MQ cho phan he Lenh thanh toan di NHNN thu cong.
    22 su kien tu events.yaml, phan loai theo 6 nhom:
    - CRUD (5): New, SaveDraft, Delete, Edit, Copy
    - Workflow (5): Submit, ControlAppr, Approve, Reject, Cancel
    - Signing/Sending (3): Sign, Send, Reverse
    - Callback/Integration (3): CallbackSuccess, CallbackFail, GlPost
    - Output (3): Print, PrintDraft, Export
    - Navigation/Other (3): Search, Detail, Attach

    Moi su kien duoc publish vao hang doi IBM MQ tuong ung.
    Su kien duoc gui qua Outbox pattern: ghi DB + push MQ trong cung 1 giao dich Oracle.
    Correlation ID + Causation ID dam bao truy vet toan bo chuoi su kien.
  version: 1.0.0
  contact:
    name: VDBAS SA Team
    email: sa@vdbas.kbnn.gov.vn
  license:
    name: Internal — KBNN

# ============================================================================
# Default content type
# ============================================================================
defaultContentType: application/json

# ============================================================================
# Servers — IBM MQ
# ============================================================================
servers:
  mq-prod:
    host: "mq://mq-cluster.kbnn.gov.vn:1414"
    protocol: ibm-mq
    description: >
      IBM MQ Production cluster (QM: VDBAS.QM).
      Kenh: LNH (LNH.SEND.Q, LNH.ACK.Q), SP (SP.SEND.Q, SP.ACK.Q), LKB (LKB.SEND.Q, LKB.ACK.Q).
      Event queue: TT.OUT.MANUAL.EVENTS.Q
      DLQ: TT.OUT.MANUAL.DLQ
    tags:
      - name: production
      - name: ibm-mq
  mq-staging:
    host: "mq://mq-staging.kbnn.gov.vn:1414"
    protocol: ibm-mq
    description: IBM MQ Staging.
    tags:
      - name: staging
      - name: ibm-mq
  mq-dev:
    host: "mq://localhost:1414"
    protocol: ibm-mq
    description: Local IBM MQ (Docker).
    tags:
      - name: development
      - name: ibm-mq

# ============================================================================
# Channels
# ============================================================================
channels:

  # --------------------------------------------------------------------------
  # Main event bus — VDBAS internal events
  # --------------------------------------------------------------------------
  ttOutManualEvents:
    address: "TT.OUT.MANUAL.EVENTS.Q"
    description: >
      Hang doi chinh cho toan bo su kien LTT thu cong.
      Tat ca 22 su kien deu duoc publish vao day.
      Subscriber (QLChi, QLT, GL, ECM, Notification) lang nghe tu hang doi nay.
    messages:
      event.created:
        $ref: "#/components/messages/PaymentOrderCreated"
      event.draftSaved:
        $ref: "#/components/messages/PaymentOrderDraftSaved"
      event.submitted:
        $ref: "#/components/messages/PaymentOrderSubmitted"
      event.checkApproved:
        $ref: "#/components/messages/PaymentOrderCheckApproved"
      event.approved:
        $ref: "#/components/messages/PaymentOrderApproved"
      event.rejected:
        $ref: "#/components/messages/PaymentOrderRejected"
      event.cancelled:
        $ref: "#/components/messages/PaymentOrderCancelled"
      event.signed:
        $ref: "#/components/messages/PaymentOrderSigned"
      event.sent:
        $ref: "#/components/messages/PaymentOrderSent"
      event.reversed:
        $ref: "#/components/messages/PaymentOrderReversed"
      event.confirmed:
        $ref: "#/components/messages/PaymentOrderConfirmed"
      event.sendFailed:
        $ref: "#/components/messages/PaymentOrderSendFailed"
      event.glPosted:
        $ref: "#/components/messages/PaymentOrderGlPosted"
      event.glFailed:
        $ref: "#/components/messages/PaymentOrderGlFailed"
      event.deleted:
        $ref: "#/components/messages/PaymentOrderDeleted"
      event.edited:
        $ref: "#/components/messages/PaymentOrderEdited"
      event.blocked:
        $ref: "#/components/messages/PaymentOrderBlocked"
      event.unblocked:
        $ref: "#/components/messages/PaymentOrderUnblocked"
      event.holdPlaced:
        $ref: "#/components/messages/PaymentOrderHoldPlaced"
      event.holdReleased:
        $ref: "#/components/messages/PaymentOrderHoldReleased"
      event.notificationSent:
        $ref: "#/components/messages/PaymentOrderNotificationSent"
      event.printRequested:
        $ref: "#/components/messages/PaymentOrderPrintRequested"
    bindings:
      ibmmq:
        queueManager: VDBAS.QM
        queueType: queue
        durable: true
        expiry: 0

  # --------------------------------------------------------------------------
  # Outbound gateway channels — LNH
  # --------------------------------------------------------------------------
  lnhSendQueue:
    address: "LNH.SEND.Q"
    description: >
      Hang doi gui LTT sang gateway LNH (NHNN/CITAD).
      Su kien: PaymentOrderSent khi kenh = LNH.
    messages:
      gateway.lnh.submit:
        $ref: "#/components/messages/GatewayLnhSubmit"
    bindings:
      ibmmq:
        queueManager: VDBAS.QM
        queueType: queue
        durable: true

  lnhAckQueue:
    address: "LNH.ACK.Q"
    description: Hang doi nhan callback tu LNH.
    messages:
      gateway.lnh.callback:
        $ref: "#/components/messages/GatewayLnhCallback"
    bindings:
      ibmmq:
        queueManager: VDBAS.QM
        queueType: queue
        durable: true

  # --------------------------------------------------------------------------
  # Outbound gateway channels — SP
  # --------------------------------------------------------------------------
  spSendQueue:
    address: "SP.SEND.Q"
    description: Hang doi gui LTT sang gateway SP (NHTM).
    messages:
      gateway.sp.submit:
        $ref: "#/components/messages/GatewaySpSubmit"
    bindings:
      ibmmq:
        queueManager: VDBAS.QM
        queueType: queue
        durable: true

  spAckQueue:
    address: "SP.ACK.Q"
    description: Hang doi nhan callback tu SP.
    messages:
      gateway.sp.callback:
        $ref: "#/components/messages/GatewaySpCallback"
    bindings:
      ibmmq:
        queueManager: VDBAS.QM
        queueType: queue
        durable: true

  # --------------------------------------------------------------------------
  # Outbound gateway channels — LKB
  # --------------------------------------------------------------------------
  lkbSendQueue:
    address: "LKB.SEND.Q"
    description: Hang doi gui LTT sang gateway LKB.
    messages:
      gateway.lkb.submit:
        $ref: "#/components/messages/GatewayLkbSubmit"
    bindings:
      ibmmq:
        queueManager: VDBAS.QM
        queueType: queue
        durable: true

  lkbAckQueue:
    address: "LKB.ACK.Q"
    description: Hang doi nhan callback tu LKB.
    messages:
      gateway.lkb.callback:
        $ref: "#/components/messages/GatewayLkbCallback"
    bindings:
      ibmmq:
        queueManager: VDBAS.QM
        queueType: queue
        durable: true

  # --------------------------------------------------------------------------
  # DLQ
  # --------------------------------------------------------------------------
  deadLetterQueue:
    address: "TT.OUT.MANUAL.DLQ"
    description: >
      Dead Letter Queue cho cac message khong xu ly duoc sau retry.
      Van hanh can kiem tra va xu ly thu cong.
    bindings:
      ibmmq:
        queueManager: VDBAS.QM
        queueType: queue
        durable: true
        expiry: 0

# ============================================================================
# Operations
# ============================================================================
operations:

  publishEvent:
    action: send
    channel:
      $ref: "#/channels/ttOutManualEvents"
    description: >
      Publish su kien LTT vao event bus.
      Duoc thuc hien boi PaymentOrder Service thuc hien Outbox pattern:
      ghi event vao outbox table + commit trong cung giao dich Oracle,
      sau do relay process lay tu outbox va push vao MQ.

  sendToLnhGateway:
    action: send
    channel:
      $ref: "#/channels/lnhSendQueue"
    description: Gui LTT da ky sang gateway LNH (NHNN/CITAD).

  sendToSpGateway:
    action: send
    channel:
      $ref: "#/channels/spSendQueue"
    description: Gui LTT da ky sang gateway SP (NHTM).

  sendToLkbGateway:
    action: send
    channel:
      $ref: "#/channels/lkbSendQueue"
    description: Gui LTT da ky sang gateway LKB.

  receiveLnhCallback:
    action: receive
    channel:
      $ref: "#/channels/lnhAckQueue"
    description: Nhan callback tu LNH.

  receiveSpCallback:
    action: receive
    channel:
      $ref: "#/channels/spAckQueue"
    description: Nhan callback tu SP.

  receiveLkbCallback:
    action: receive
    channel:
      $ref: "#/channels/lkbAckQueue"
    description: Nhan callback tu LKB.

# ============================================================================
# Components
# ============================================================================
components:

  # --------------------------------------------------------------------------
  # Message headers (shared)
  # --------------------------------------------------------------------------
  headers:
    eventHeaders:
      type: object
      required:
        - eventId
        - eventType
        - eventVersion
        - correlationId
        - causationId
        - timestamp
        - source
      properties:
        eventId:
          type: string
          format: uuid
          description: "ID duy nhat cua event. Dung cho idempotency."
        eventType:
          type: string
          description: "Loai event. Vi du: TT.OUT.MANUAL.SUBMITTED"
          examples:
            - "TT.OUT.MANUAL.CREATED"
            - "TT.OUT.MANUAL.SUBMITTED"
            - "TT.OUT.MANUAL.APPROVED"
        eventVersion:
          type: string
          description: "Phien ban event (semver). Dam bao backward compatibility."
          examples:
            - "1.0.0"
        correlationId:
          type: string
          format: uuid
          description: >
            ID tuong quan — lien ket toan bo event trong cung 1 LTT lifecycle.
            Gia tri = paymentOrderId.
        causationId:
          type: string
          format: uuid
          description: >
            ID nguyen nhan — ID cua event hoac thao tac khac truc tiep gay ra event nay.
            Vi du: event SUBMITTED co causationId = action "submit" cua user.
        timestamp:
          type: string
          format: date-time
          description: "Thoi gian event xay ra."
        source:
          type: string
          description: "Nguon phat event."
          examples:
            - "vdbas-payment-order-service"
        userId:
          type: string
          description: "Ma nguoi dung thuc hien thao tac."
        userRole:
          type: string
          description: "Vai tro nguoi dung."
          enum: [MAKER, CHECKER, APPROVER, ADMIN, SYSTEM]
        traceId:
          type: string
          description: "Distributed tracing ID (OpenTelemetry)."

  # --------------------------------------------------------------------------
  # Messages — Internal events (22 events from events.yaml)
  # --------------------------------------------------------------------------
  messages:

    # ---- CRUD Operations ----

    PaymentOrderCreated:
      name: TT.OUT.MANUAL.CREATED
      title: "E001 — Tao moi LTT"
      summary: Maker tao moi LTT (mo man hinh S02).
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi Maker mo man hinh tao LTT moi (S02) va he thong khoi tao ban ghi DRAFT.
        Autofill thong tin theo BIZ-AUTOFILL.

    PaymentOrderDraftSaved:
      name: TT.OUT.MANUAL.DRAFT_SAVED
      title: "E002 — Luu nap"
      summary: Maker luu LTT o trang thai Nap/Draft.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi Maker bam "Luu nap" tren S02. LTT o trang thai DRAFT.

    PaymentOrderDeleted:
      name: TT.OUT.MANUAL.DELETED
      title: "E013 — Xoa LTT"
      summary: Soft-delete LTT draft (S07 popup).
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi Maker xac nhan xoa LTT tren S07. Soft-delete (BIZ-DELETE-SOFT).
        Release hold quy (BIZ-RELEASE-HOLD).

    PaymentOrderEdited:
      name: TT.OUT.MANUAL.EDITED
      title: "E021 — Sua LTT"
      summary: Maker sua LTT DRAFT/RETURNED_TO_MAKER.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi Maker sua LTT o trang thai DRAFT hoac RETURNED_TO_MAKER.
        Chi Maker goc duoc sua (BIZ-EDIT-OWN). Optimistic lock (BIZ-OPTIMISTIC-LOCK).

    # ---- Workflow Events ----

    PaymentOrderSubmitted:
      name: TT.OUT.MANUAL.SUBMITTED
      title: "E003 — Gui kiem soat"
      summary: Maker gui LTT de Checker kiem soat.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi Maker bam "Gui kiem soat". DRAFT -> SUBMITTED.
        Validate day du VAL-* + BIZ rules. Dat giu quy (BIZ-RESERVE-FUND).
        Notify Checker (BIZ-NOTIFY).

    PaymentOrderCheckApproved:
      name: TT.OUT.MANUAL.CHECK_APPROVED
      title: "E004 — Kiem soat phe duyet"
      summary: Checker phe duyet kiem soat.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi Checker phe duyet kiem soat. SUBMITTED -> IN_CONTROL.
        Enforce SoD: Checker != Maker (SOD-001).
        Notify Approver (BIZ-NOTIFY).

    PaymentOrderApproved:
      name: TT.OUT.MANUAL.APPROVED
      title: "E005 — Phe duyet"
      summary: Approver phe duyet cuoi.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi Approver phe duyet. IN_CONTROL -> APPROVED.
        Enforce SoD: Approver != Checker != Maker (SOD-002, SOD-003).
        Kich hoat dinh tuyen kenh (BIZ-CHANNEL-ROUTING).

    PaymentOrderRejected:
      name: TT.OUT.MANUAL.REJECTED
      title: "E006 — Tu choi"
      summary: Checker/Approver tu choi LTT.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi Checker/Approver tu choi.
        SUBMITTED -> RETURNED_TO_MAKER (Checker tu choi).
        IN_CONTROL -> RETURNED_TO_CHECKER (Approver tu choi).
        Bat buoc ly do 10-500 ky tu (VAL-030).
        Release hold quy (BIZ-RELEASE-HOLD). Notify Maker/Checker.

    PaymentOrderCancelled:
      name: TT.OUT.MANUAL.CANCELLED
      title: "E007 — Huy"
      summary: Approver huy LTT da ky.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi Approver huy LTT. SIGNED -> CANCELLED.
        Release hold quy. Notify Maker.

    # ---- Signing/Sending Events ----

    PaymentOrderSigned:
      name: TT.OUT.MANUAL.SIGNED
      title: "E008 — Ky so"
      summary: Approver ky so LTT.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi Approver ky so. APPROVED -> SIGNED.
        Luu chu ky vao ECM, hash SHA-256 (BIZ-SIGN-TAD-COMM).

    PaymentOrderSent:
      name: TT.OUT.MANUAL.SENT
      title: "E009 — Gui NH"
      summary: Gui LTT sang NHNN/KB gateway.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi LTT duoc gui qua Outbound Gateway. SIGNED -> SENT.
        Dinh tuyen theo kenh LNH/SP/LKB (BIZ-CHANNEL-ROUTING).
        Retry 3 lan (BIZ-RETRY).

    PaymentOrderReversed:
      name: TT.OUT.MANUAL.REVERSED
      title: "E010 — Dao chung tu"
      summary: Tao but toan dao cho LTT da POSTED.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi Approver tao but toan dao. POSTED -> REVERSED.
        Sinh LTT dao moi, chay chu trinh Maker-Checker-Approver.
        Approver dao phai khac Approver goc (SOD-005).

    # ---- Callback/Integration Events ----

    PaymentOrderConfirmed:
      name: TT.OUT.MANUAL.CONFIRMED
      title: "Callback SUCCESS tu NH/KB"
      summary: NH/KB xac nhan thanh toan thanh cong.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi nhan callback SUCCESS tu NH/KB. SENT -> CONFIRMED.
        Trigger GL post, ECM archive, QLT/QLChi notify.

    PaymentOrderSendFailed:
      name: TT.OUT.MANUAL.SEND_FAILED
      title: "Callback FAIL tu NH/KB"
      summary: Gui that bai sau retry.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi nhan callback FAIL hoac timeout sau retry. SENT -> SEND_FAILED.
        Release hold quy. Notify Approver.

    PaymentOrderGlPosted:
      name: TT.OUT.MANUAL.GL_POSTED
      title: "GL post thanh cong"
      summary: Hach toan GL thanh cong.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi GL post thanh cong. CONFIRMED -> POSTED.
        Khoa LTT, cap nhat glVoucherNo.

    PaymentOrderGlFailed:
      name: TT.OUT.MANUAL.GL_FAILED
      title: "GL post that bai"
      summary: Hach toan GL that bai.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi GL post that bai. CONFIRMED -> POST_FAILED.
        Day vao DLQ, chặn LTT, canh bao van hanh.

    # ---- System Events ----

    PaymentOrderBlocked:
      name: TT.OUT.MANUAL.BLOCKED
      title: "He thong chan LTT"
      summary: Chan LTT vi pham SoD hoac duplicate.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi he thong phat hien vi pham SoD (BIZ-SOD) hoac duplicate (BIZ-DUPLICATE).
        LTT bi chặn moi thao tac cho den khi van hanh giai block.

    PaymentOrderUnblocked:
      name: TT.OUT.MANUAL.UNBLOCKED
      title: "Giai chan LTT"
      summary: Van hanh giai block sau xac minh.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"

    PaymentOrderHoldPlaced:
      name: TT.OUT.MANUAL.HOLD_PLACED
      title: "Dat giu quy"
      summary: Hold so du khi Submit.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi he thong dat giu quy (BIZ-RESERVE-FUND).
        Hold = So tien LTT tai tai khoan nguon.

    PaymentOrderHoldReleased:
      name: TT.OUT.MANUAL.HOLD_RELEASED
      title: "Giai phong giu quy"
      summary: Release hold khi Reject/Cancel/Delete.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"
      description: >
        Phat ra khi hold quy duoc giai phong (BIZ-RELEASE-HOLD).
        Khi Reject, Cancel, hoac Delete LTT.

    PaymentOrderNotificationSent:
      name: TT.OUT.MANUAL.NOTIFICATION_SENT
      title: "Gui thong bao"
      summary: Thong bao workflow cho user.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/NotificationPayload"
      description: >
        Phat ra khi he thong gui notification (BIZ-NOTIFY).
        In-app + email cho user ke tiep trong workflow.

    PaymentOrderPrintRequested:
      name: TT.OUT.MANUAL.PRINT_REQUESTED
      title: "Yeu cau in LTT"
      summary: In / In nap / Ket xuat.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/PaymentOrderEventPayload"

    # ---- Gateway Messages (Outbound) ----

    GatewayLnhSubmit:
      name: GATEWAY.LNH.SUBMIT
      title: "Gui LTT qua gateway LNH"
      summary: Gui LTT da ky sang NHNN/CITAD.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/GatewayLnhPayload"
      description: >
        Message gui sang gateway LNH (API-001).
        Chua toan bo thong tin LTT + chu ky XML.
        Retry 3 lan, backoff 5/15/45s, timeout 60s.

    GatewayLnhCallback:
      name: GATEWAY.LNH.CALLBACK
      title: "Callback tu LNH"
      summary: Nhan ket qua tu NHNN/CITAD.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/GatewayCallbackPayload"

    GatewaySpSubmit:
      name: GATEWAY.SP.SUBMIT
      title: "Gui LTT qua gateway SP"
      summary: Gui LTT da ky sang NHTM.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/GatewaySpPayload"

    GatewaySpCallback:
      name: GATEWAY.SP.CALLBACK
      title: "Callback tu SP"
      summary: Nhan ket qua tu NHTM.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/GatewayCallbackPayload"

    GatewayLkbSubmit:
      name: GATEWAY.LKB.SUBMIT
      title: "Gui LTT qua gateway LKB"
      summary: Gui LTT da ky sang KBNN khac.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/GatewayLkbPayload"

    GatewayLkbCallback:
      name: GATEWAY.LKB.CALLBACK
      title: "Callback tu LKB"
      summary: Nhan ket qua tu KBNN khac.
      contentType: application/json
      headers:
        $ref: "#/components/headers/eventHeaders"
      payload:
        $ref: "#/components/schemas/GatewayCallbackPayload"

  # --------------------------------------------------------------------------
  # Schemas
  # --------------------------------------------------------------------------
  schemas:

    # ---- Core Event Payload ----
    PaymentOrderEventPayload:
      type: object
      description: >
        Payload chinh cua moi event LTT.
        Chua thong tin can thiet de subscriber xu ly ma khong can goi lai DB.
      required:
        - paymentOrderId
        - requestNumber
        - status
        - previousStatus
        - version
        - timestamp
      properties:
        paymentOrderId:
          type: string
          format: uuid
          description: ID cua LTT.
        requestNumber:
          type: string
          description: So YCTT.
        channel:
          type: string
          description: Kenh thanh toan.
        orderType:
          type: string
          description: Loai lenh.
        status:
          type: string
          description: "Trang thai moi (sau event)."
        previousStatus:
          type: string
          description: "Trang thai cu (truoc event)."
        version:
          type: integer
          description: Version hien tai.
        amount:
          type: number
          description: So tien.
        currency:
          type: string
          description: Loai tien.
        paymentDate:
          type: string
          format: date
