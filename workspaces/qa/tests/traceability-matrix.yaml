traceability:

  # ==========================================================================
  # Business Rules (BIZ-*) — 29 rules
  # ==========================================================================
  rules:

    # ---- BIZ-001: Search with valid params ----
    - id: BIZ-001
      description: "Tim kiem chi khi tham so hop le"
      tests:
        - "ltt-crud.spec.ts::Search with all valid parameters returns filtered results"
        - "ltt-crud.spec.ts::Empty filter field means no filter on that field"
        - "ltt-crud.spec.ts::Search with from-date > to-date shows validation error"

    # ---- BIZ-002: Pagination default ----
    - id: BIZ-002
      description: "Phan trang/sort mac dinh: page size=20, sort ngay GD giam dan"
      tests:
        - "ltt-crud.spec.ts::Default pagination is 20 records sorted by payment date descending"
        - "ltt-crud.spec.ts::Change page size to 50 displays 50 records"

    # ---- BIZ-IDGEN: Auto-generate request number ----
    - id: BIZ-IDGEN
      description: "Sinh so YCTT tu dong theo kenh"
      tests:
        - "ltt-crud.spec.ts::System auto-generates request number when Maker leaves it empty (LNH)"
        - "ltt-crud.spec.ts::System auto-generates request number for SP channel"
        - "ltt-crud.spec.ts::System keeps Maker-entered request number unchanged"

    # ---- BIZ-AUTOFILL: Autofill defaults ----
    - id: BIZ-AUTOFILL
      description: "Autofill thong tin mac dinh khi tao LTT"
      tests:
        - "ltt-crud.spec.ts::Maker opens create form with autofill defaults"

    # ---- BIZ-COA-CROSS: COA cross validation ----
    - id: BIZ-COA-CROSS
      description: "Rang buoc ket hop cheo COA"
      tests:
        - "ltt-validation.spec.ts::Valid COA combination is accepted"
        - "ltt-validation.spec.ts::Invalid COA combination shows error"
        - "ltt-validation.spec.ts::Changing fund code revalidates entire COA combination"
        - "ltt-workflow.spec.ts::GL post success transitions CONFIRMED to POSTED"

    # ---- BIZ-COT-CHECK: Cut-off check ----
    - id: BIZ-COT-CHECK
      description: "Kiem soat phien (cut-off)"
      tests:
        - "ltt-workflow.spec.ts::Submit after cut-off shows warning about next working day"
        - "ltt-workflow.spec.ts::Submit DRAFT LTT successfully — happy path"

    # ---- BIZ-CHANNEL-ROUTING: Channel routing ----
    - id: BIZ-CHANNEL-ROUTING
      description: "Dinh tuyen kenh sau phe duyet"
      tests:
        - "ltt-workflow.spec.ts::Send LTT to LNH gateway"
        - "ltt-workflow.spec.ts::Send LTT to SP gateway"
        - "ltt-workflow.spec.ts::Send LTT to LKB gateway"

    # ---- BIZ-LIMIT: Transaction limit ----
    - id: BIZ-LIMIT
      description: "Han muc giao dich"
      tests:
        - "ltt-workflow.spec.ts::Amount exceeding limit requires higher-level approval"
        - "ltt-validation.spec.ts::Amount exceeding configured limit shows error"

    # ---- BIZ-MAKER-CHECKER: 3-level workflow ----
    - id: BIZ-MAKER-CHECKER
      description: "Quy trinh 3 cap Maker→Checker→Approver"
      tests:
        - "ltt-workflow.spec.ts::Checker approves submitted LTT — happy path"
        - "ltt-workflow.spec.ts::Same user as Maker cannot approve as Checker (SoD violation)"
        - "ltt-workflow.spec.ts::Approver approves LTT — happy path"
        - "ltt-cross-cutting.spec.ts::Three different users for 3 roles is accepted"
        - "ltt-cross-cutting.spec.ts::Maker cannot approve own LTT as Checker"
        - "ltt-cross-cutting.spec.ts::Checker cannot approve as Approver on same LTT"
        - "ltt-cross-cutting.spec.ts::Maker cannot approve as Approver on own LTT"

    # ---- BIZ-SOD: Segregation of Duties ----
    - id: BIZ-SOD
      description: "Phan tach trach nhiem (SoD)"
      tests:
        - "ltt-cross-cutting.spec.ts::Maker cannot approve own LTT as Checker"
        - "ltt-cross-cutting.spec.ts::Checker cannot approve as Approver on same LTT"
        - "ltt-error-flows.spec.ts::System blocks LTT on SoD violation"
        - "ltt-error-flows.spec.ts::Reverse LTT with SoD violation is rejected"

    # ---- BIZ-FEE-CALC: Fee calculation ----
    - id: BIZ-FEE-CALC
      description: "Tinh phi tu dong"
      tests:
        - "ltt-cross-cutting.spec.ts::Fee auto-calculated based on channel x order type x amount"
        - "ltt-cross-cutting.spec.ts::Fee recalculated when channel changes"

    # ---- BIZ-FX-RATE: FX rate check ----
    - id: BIZ-FX-RATE
      description: "Ty gia ngoai te"
      tests:
        - "ltt-cross-cutting.spec.ts::FX rate within ±2% accepted"
        - "ltt-cross-cutting.spec.ts::FX rate exceeding ±2% shows Approver warning"

    # ---- BIZ-SIGN-TAD-COMM: Digital signature ----
    - id: BIZ-SIGN-TAD-COMM
      description: "Ky so Approver"
      tests:
        - "ltt-workflow.spec.ts::Approver signs LTT with valid certificate — happy path"
        - "ltt-workflow.spec.ts::Signing with expired certificate is rejected"
        - "ltt-workflow.spec.ts::Signing with certificate belonging to different user is rejected"

    # ---- BIZ-AUDIT: Audit log ----
    - id: BIZ-AUDIT
      description: "Audit log moi thao tac"
      tests:
        - "ltt-crud.spec.ts::Creating LTT records full audit log"
        - "ltt-cross-cutting.spec.ts::Create LTT records audit log with user/timestamp/IP"
        - "ltt-cross-cutting.spec.ts::Submit LTT records audit with before/after status"
        - "ltt-crud.spec.ts::View audit history shows chronological list of actions"

    # ---- BIZ-EVENT-PUBLISH: Publish events ----
    - id: BIZ-EVENT-PUBLISH
      description: "Publish event khi chuyen trang thai"
      tests:
        - "ltt-state-machine.integration.test.ts::submit triggers reserve fund + audit + outbox + notify atomically"
        - "ltt-state-machine.integration.test.ts::completes the full lifecycle from DRAFT to POSTED"

    # ---- BIZ-RESERVE-FUND: Reserve fund on submit ----
    - id: BIZ-RESERVE-FUND
      description: "Dat giu quy khi Submit"
      tests:
        - "ltt-workflow.spec.ts::Submit DRAFT LTT successfully — happy path"
        - "ltt-workflow.spec.ts::Submit when insufficient balance is rejected"
        - "ltt-cross-cutting.spec.ts::Submit LTT places hold on account balance"
        - "ltt-cross-cutting.spec.ts::Insufficient balance blocks submit"

    # ---- BIZ-CONTRACT-LINK: Contract link ----
    - id: BIZ-CONTRACT-LINK
      description: "Lien ket hop dong/cam ket chi"
      tests:
        - "ltt-cross-cutting.spec.ts::Contract link with sufficient balance is accepted"
        - "ltt-cross-cutting.spec.ts::Contract link with insufficient balance is rejected"

    # ---- BIZ-NDND-RULE: NDKT by order type ----
    - id: BIZ-NDND-RULE
      description: "Rang buoc NDKT theo Loai lenh"
      tests:
        - "ltt-validation.spec.ts::NDKT invalid for order type shows error"

    # ---- BIZ-DUPLICATE: Duplicate detection ----
    - id: BIZ-DUPLICATE
      description: "Chong trung lap LTT"
      tests:
        - "ltt-workflow.spec.ts::Duplicate LTT warning displayed within N minutes"
        - "ltt-error-flows.spec.ts::System blocks LTT on duplicate detection"

    # ---- BIZ-RETRY: Retry/idempotency ----
    - id: BIZ-RETRY
      description: "Retry/idempotency gateway gui NH"
      tests:
        - "saga-compensation.integration.test.ts::releases hold and transitions to SEND_FAILED after all retries exhausted"
        - "ltt-error-flows.spec.ts::Approver can resend from SEND_FAILED"
        - "ltt-cross-cutting.spec.ts::Duplicate POST with same idempotency key returns original result"

    # ---- BIZ-REJECT-REASON: Reject reason required ----
    - id: BIZ-REJECT-REASON
      description: "Ly do tu choi/huy bat buoc"
      tests:
        - "ltt-workflow.spec.ts::Checker rejects submitted LTT — happy path"
        - "ltt-workflow.spec.ts::Reject without reason is blocked"
        - "ltt-workflow.spec.ts::Reject reason shorter than 10 characters is blocked"

    # ---- BIZ-NOTIFY: Workflow notifications ----
    - id: BIZ-NOTIFY
      description: "Thong bao workflow"
      tests:
        - "ltt-cross-cutting.spec.ts::Submit LTT sends notification to Checker"
        - "ltt-cross-cutting.spec.ts::Reject LTT sends notification to Maker"

    # ---- BIZ-EDIT-OWN: Edit ownership ----
    - id: BIZ-EDIT-OWN
      description: "Sua LTT — chi Maker goc"
      tests:
        - "ltt-crud.spec.ts::Original Maker can edit DRAFT LTT"
        - "ltt-crud.spec.ts::Non-owner Maker cannot edit LTT"

    # ---- BIZ-DELETE-DRAFT: Delete conditions ----
    - id: BIZ-DELETE-DRAFT
      description: "Xoa LTT — dieu kien bat buoc"
      tests:
        - "ltt-crud.spec.ts::Maker soft-deletes DRAFT LTT with reason and confirmation"
        - "ltt-crud.spec.ts::Delete LTT without reason blocks confirmation button"
        - "ltt-crud.spec.ts::Delete LTT without ticking confirmation checkbox is blocked"

    # ---- BIZ-OPTIMISTIC-LOCK: Optimistic lock ----
    - id: BIZ-OPTIMISTIC-LOCK
      description: "Optimistic lock moi thao tac Sua/Xoa"
      tests:
        - "ltt-crud.spec.ts::Optimistic lock rejects edit when version changed by another user"
        - "ltt-cross-cutting.spec.ts::Concurrent edit: second user gets version conflict"
        - "ltt-cross-cutting.spec.ts::Optimistic lock applies to delete operations too"

    # ---- BIZ-EDIT-IMMUTABLE: Immutable fields ----
    - id: BIZ-EDIT-IMMUTABLE
      description: "Truong immutable khi Edit"
      tests:
        - "ltt-crud.spec.ts::Immutable fields are disabled in edit mode"

    # ---- BIZ-DELETE-SOFT: Soft delete ----
    - id: BIZ-DELETE-SOFT
      description: "Soft-delete LTT"
      tests:
        - "ltt-crud.spec.ts::Maker soft-deletes DRAFT LTT with reason and confirmation"
        - "ltt-crud.spec.ts::Soft-deleted LTT request number cannot be reused"

    # ---- BIZ-EDIT-AUDIT: Field-level audit diff ----
    - id: BIZ-EDIT-AUDIT
      description: "Audit diff cap truong khi Sua"
      tests:
        - "ltt-crud.spec.ts::Edit LTT records field-level diff in audit log"
        - "ltt-cross-cutting.spec.ts::Edit LTT shows field-level diff in audit history"

    # ---- BIZ-RELEASE-HOLD: Release hold on reject/cancel ----
    - id: BIZ-RELEASE-HOLD
      description: "Release giu quy khi Xoa/Reject/Cancel"
      tests:
        - "ltt-cross-cutting.spec.ts::Reject LTT releases held amount"
        - "ltt-cross-cutting.spec.ts::Cancel LTT releases held amount"
        - "ltt-cross-cutting.spec.ts::Delete DRAFT LTT without prior reserve does not create RELEASE_HOLD audit"
        - "ltt-cross-cutting.spec.ts::SEND_FAILED releases held amount"

