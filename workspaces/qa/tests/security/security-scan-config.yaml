# ============================================================================
# Combined Security Scan Configuration — VDBAS TT.OUT.MANUAL
// Orchestrates: ZAP, Trivy, Semgrep, gitleaks, Syft
// Generated: 2026-05-10 | Stage 4 — QA
# ============================================================================

# Global configuration
global:
  projectName: "vdbas-tt-out-manual"
  environment: "${SCAN_ENV:staging}"
  reportDir: "./test-results/security"
  failFast: true  # Stop on first CRITICAL finding

# ---------------------------------------------------------------------------
# Scan stages (executed sequentially in CI pipeline)
# ---------------------------------------------------------------------------
stages:

  # Stage 1: Secret scanning (fastest, run first)
  - name: "secret-scan"
    tool: "gitleaks"
    enabled: true
    config:
      repoPath: "."
      configFilePath: ".gitleaks.toml"
      reportFormat: "sarif"
      reportFile: "gitleaks-report.sarif"
    thresholds:
      critical: 0
      high: 0
      medium: 0
      low: 0
    blockOnFailure: true

  # Stage 2: SAST — Semgrep (static code analysis)
  - name: "sast-scan"
    tool: "semgrep"
    enabled: true
    config:
      rulesets:
        - "p/java"           # Java Spring Boot
        - "p/typescript"     # TypeScript React
        - "p/owasp-top-ten"
        - "p/sql-injection"
        - "p/xss"
        - "p/jwt"
        - "p/insecure-transport"
      paths:
        - "workspaces/dev-be/services/"
        - "workspaces/dev-fe/frontend/"
      excludePaths:
        - "node_modules/"
        - "target/"
        - "build/"
        - "tests/"
      reportFormat: "json"
      reportFile: "semgrep-report.json"
    thresholds:
      critical: 0
      high: 0
      medium: 10
      low: -1  # unlimited
    blockOnFailure: true

  # Stage 3: Dependency scan — Trivy
  - name: "dependency-scan"
    tool: "trivy"
    enabled: true
    config:
      scanType: "fs"
      target: "."
      ignoreUnfixed: false
      skipUpdate: false
      severity: "CRITICAL,HIGH"
      reportFormat: "sarif"
      reportFile: "trivy-fs-report.sarif"
    thresholds:
      critical: 0
      high: 0
    blockOnFailure: true

  # Stage 4: Container image scan — Trivy
  - name: "image-scan"
    tool: "trivy-image"
    enabled: true
    configFile: "trivy-policy.yaml"
    images:
      - "vdbas/bff:latest"
      - "vdbas/ltt-service:latest"
      - "vdbas/integration-gateway:latest"
      - "vdbas/gl-pusher:latest"
    thresholds:
      critical: 0
      high: 0
    blockOnFailure: true

  # Stage 5: DAST — ZAP baseline scan
  - name: "dast-scan"
    tool: "zap"
    enabled: true
    configFile: "zap-baseline.yaml"
    scanType: "baseline"  # baseline, active, or full
    timeout: 600  # 10 minutes
    thresholds:
      critical: 0
      high: 0
      medium: 10
    blockOnFailure: true

  # Stage 6: SBOM generation — Syft
  - name: "sbom-generate"
    tool: "syft"
    enabled: true
    config:
      outputFormat: "cyclonedx-json"
      outputFile: "sbom-cyclonedx.json"
      scope: "squashed"
    blockOnFailure: false  # Non-blocking

# ---------------------------------------------------------------------------
# Notification configuration
# ---------------------------------------------------------------------------
notifications:
  onCritical:
    channels: ["slack:#vibe-pipeline-stuck"]
    template: "security-critical-alert"
  onHigh:
    channels: ["slack:#vibe-security"]
    template: "security-high-alert"
  onCompletion:
    channels: ["slack:#vibe-ci"]
    template: "security-scan-summary"

# ---------------------------------------------------------------------------
# Exception management
# ---------------------------------------------------------------------------
exceptions:
  # Exceptions must be documented in docs/exceptions/
  maxAge: 30  # days
  requireApproval: true
  approvers: ["G2-SA", "G5-SRE"]
  filePath: "docs/exceptions/security/"

# ---------------------------------------------------------------------------
# Quality gate integration
# ---------------------------------------------------------------------------
qualityGate:
  # Maps to QUALITY_GATES.md gates 7-11
  gate7_sast:
    tool: "semgrep"
    passCondition: "no HIGH/CRITICAL findings"
  gate8_dependency:
    tool: "trivy"
    passCondition: "no HIGH/CRITICAL CVEs with patch"
  gate9_secret:
    tool: "gitleaks"
    passCondition: "zero secrets found"
  gate10_license:
    tool: "trivy"
    passCondition: "no GPL/unapproved licenses"
  gate11_image:
    tool: "trivy-image"
    passCondition: "no HIGH/CRITICAL base image CVEs"
