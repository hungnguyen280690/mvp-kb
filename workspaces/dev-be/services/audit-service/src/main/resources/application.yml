server:
  port: 8083

spring:
  application:
    name: vdbas-audit-service
  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/VDBAS
    username: vdbas_audit
    password: ${ORACLE_PASSWORD:changeme}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    show-sql: false
    hibernate:
      ddl-auto: none
  artemis:
    mode: native
    broker-url: tcp://localhost:61616
    user: ${MQ_USER:admin}
    password: ${MQ_PASSWORD:admin}

# VDBAS audit config
vdbas:
  outbox:
    poll-interval-ms: 5000
    max-retry: 3
  audit:
    hash-algorithm: SHA-256

logging:
  level:
    vn.gov.kbnn.vdbas.audit: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
