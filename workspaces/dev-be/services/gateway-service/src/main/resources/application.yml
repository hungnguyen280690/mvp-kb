server:
  port: 8082

spring:
  application:
    name: vdbas-gateway-service
  artemis:
    mode: native
    broker-url: tcp://localhost:61616
    user: ${MQ_USER:admin}
    password: ${MQ_PASSWORD:admin}

# MQ Queue configuration
vdbas:
  mq:
    queues:
      lnh-send: LNH.SEND.Q
      lnh-ack: LNH.ACK.Q
      sp-send: SP.SEND.Q
      sp-ack: SP.ACK.Q
      lkb-send: LKB.SEND.Q
      lkb-ack: LKB.ACK.Q
      dlq: TT.OUT.MANUAL.DLQ
      events: TT.OUT.MANUAL.EVENTS.Q
    retry:
      max-attempts: 3
      backoff-ms: 5000,15000,45000
      timeout-ms: 60000

logging:
  level:
    vn.gov.kbnn.vdbas.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
