server:
  port: 8081

spring:
  application:
    name: vdbas-ltt-service
  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/VDBAS
    username: vdbas_app
    password: ${ORACLE_PASSWORD:changeme}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  artemis:
    mode: native
    broker-url: tcp://localhost:61616
    user: ${MQ_USER:admin}
    password: ${MQ_PASSWORD:admin}

# VDBAS-specific config
vdbas:
  duplicate:
    window-minutes: 5
  fund-reserve:
    enabled: true
  retry:
    max-attempts: 3
    backoff-ms: 5000,15000,45000

logging:
  level:
    vn.gov.kbnn.vdbas.ltt: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
